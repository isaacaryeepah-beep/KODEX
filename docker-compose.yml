# DIKLY Full Stack — app + MongoDB + Redis
# ─────────────────────────────────────────────────────────────────────────────
# Copy .env.example to .env and fill in real values, then:
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── DIKLY Node.js app ─────────────────────────────────────────────────────
  app:
    build: .
    image: dikly-app:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:5000:5000'
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/dikly
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - dikly-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - dikly-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - dikly-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  redis-data:
  uploads:

networks:
  dikly-net:
    driver: bridge
