<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KODEX — AI Quiz Generator Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh}
input,select,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const MOCK_QUESTIONS = [
  {
    questionText: "Which of the following best describes the primary function of chlorophyll in photosynthesis?",
    options: ["Transporting water from roots to leaves", "Absorbing light energy and converting it to chemical energy", "Breaking down glucose for cellular respiration", "Synthesising proteins for plant growth"],
    correctAnswers: [1], questionType: "single",
    explanation: "Chlorophyll absorbs light (mainly red and blue wavelengths) and uses that energy to drive the light-dependent reactions of photosynthesis."
  },
  {
    questionText: "Which reactants are required for the light-independent reactions (Calvin cycle) of photosynthesis?",
    options: ["Water and sunlight", "Carbon dioxide and ATP/NADPH", "Glucose and oxygen", "Chlorophyll and carbon dioxide"],
    correctAnswers: [1], questionType: "single",
    explanation: "The Calvin cycle uses CO₂ from the air and ATP/NADPH produced in the light reactions to synthesise glucose."
  },
  {
    questionText: "Which of the following are products of the light-dependent reactions of photosynthesis?",
    options: ["ATP", "NADPH", "Glucose", "Oxygen"],
    correctAnswers: [0, 1, 3], questionType: "multiple",
    explanation: "The light reactions split water (producing O₂) and use the released energy to generate ATP and NADPH. Glucose is made later in the Calvin cycle."
  },
  {
    questionText: "In which part of the chloroplast do the light-dependent reactions take place?",
    options: ["Stroma", "Thylakoid membrane", "Outer membrane", "Cytoplasm"],
    correctAnswers: [1], questionType: "single",
    explanation: "The thylakoid membranes contain the photosystems and electron transport chains needed for the light-dependent reactions."
  },
  {
    questionText: "What is the role of water in photosynthesis?",
    options: ["It acts as an electron donor in the light reactions", "It is produced as a by-product of the Calvin cycle", "It transports glucose out of the leaf", "It provides carbon atoms for glucose synthesis"],
    correctAnswers: [0], questionType: "single",
    explanation: "Water is split (photolysis) in the light reactions to release electrons, protons (H⁺), and oxygen as a by-product."
  }
];

const L = ['A','B','C','D'];

function TypeBadge({type}) {
  return type === 'multiple'
    ? <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,fontWeight:700,background:'#ede9fe',color:'#7c3aed',marginLeft:6}}>MULTI</span>
    : <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,fontWeight:700,background:'#f0f9ff',color:'#0369a1',marginLeft:6}}>SINGLE</span>;
}

function QuestionCard({q, index, visible}) {
  return (
    <div style={{border:'1.5px solid #e2e8f0',borderRadius:10,padding:'14px 16px',background:'#f8fafc',
      opacity:visible?1:0,transform:visible?'translateY(0)':'translateY(12px)',
      transition:`all 0.35s cubic-bezier(.16,1,.3,1) ${index*80}ms`}}>
      <div style={{fontWeight:600,fontSize:13.5,marginBottom:9,lineHeight:1.5,color:'#0f172a'}}>
        Q{index+1}.<TypeBadge type={q.questionType}/> {q.questionText}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:q.explanation?7:0}}>
        {q.options.map((o,oi) => (
          <span key={oi} style={{padding:'4px 10px',borderRadius:6,fontSize:12,fontWeight:500,
            background:q.correctAnswers.includes(oi)?'#f0fdf4':'#fff',
            color:q.correctAnswers.includes(oi)?'#166534':'#64748b',
            border:q.correctAnswers.includes(oi)?'1px solid #bbf7d0':'1px solid #e2e8f0'}}>
            {L[oi]}) {o}{q.correctAnswers.includes(oi)?' ✓':''}
          </span>
        ))}
      </div>
      {q.explanation && (
        <div style={{marginTop:7,padding:'6px 10px',background:'#fff',borderRadius:6,fontSize:11,color:'#64748b',borderLeft:'3px solid #7c3aed'}}>
          💡 {q.explanation}
        </div>
      )}
    </div>
  );
}

function Spinner() {
  return (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
      style={{animation:'spin 0.8s linear infinite',display:'inline-block',verticalAlign:'middle'}}>
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
  );
}

function App() {
  const [screen, setScreen] = useState('quiz-list');
  const [topic, setTopic] = useState('Photosynthesis');
  const [count, setCount] = useState('5');
  const [difficulty, setDifficulty] = useState('medium');
  const [qtype, setQtype] = useState('mixed');
  const [marks, setMarks] = useState('1');
  const [context, setContext] = useState('');
  const [generating, setGenerating] = useState(false);
  const [preview, setPreview] = useState(null);
  const [visibleCards, setVisibleCards] = useState(0);
  const [adding, setAdding] = useState(false);
  const [added, setAdded] = useState(false);
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [toast, setToast] = useState(null);

  const QUIZZES = [
    {id:'1',title:'Mid-Semester Biology',course:'BIO201',status:'Live',statusColor:'#166534',statusBg:'#f0fdf4',statusBorder:'#bbf7d0'},
    {id:'2',title:'Chemistry Fundamentals',course:'CHM101',status:'Scheduled',statusColor:'#64748b',statusBg:'#f8fafc',statusBorder:'#e2e8f0'},
    {id:'3',title:'Physics Wave Theory',course:'PHY301',status:'Closed',statusColor:'#991b1b',statusBg:'#fef2f2',statusBorder:'#fecaca'},
  ];

  function showToast(msg, type='ok') {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 3000);
  }

  function runGenerate() {
    if (!topic.trim()) return;
    setGenerating(true); setPreview(null); setVisibleCards(0); setAdded(false);
    setTimeout(()=>{ setGenerating(false); setPreview(MOCK_QUESTIONS.slice(0,parseInt(count))); }, 2400);
  }

  useEffect(()=>{
    if (preview) {
      let i=0;
      const t=setInterval(()=>{ i++; setVisibleCards(i); if(i>=preview.length) clearInterval(t); }, 100);
      return ()=>clearInterval(t);
    }
  },[preview]);

  function runAddAll() {
    setAdding(true);
    setTimeout(()=>{
      setAdding(false); setAdded(true);
      setQuizQuestions(prev=>[...prev,...preview]);
      showToast(`✓ ${preview.length} questions added to quiz!`);
      setTimeout(()=>{ setScreen('questions'); }, 900);
    }, 1500);
  }

  const sidebarItems = [
    {label:'Dashboard',id:'dash',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>},
    {label:'Sessions',id:'sess',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
    {label:'Assignments',id:'assign',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>},
    {label:'Reports',id:'rep',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {/* Topbar */}
      <header style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'0 24px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:28,height:28,borderRadius:7,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <span style={{fontWeight:800,fontSize:15,letterSpacing:-.3,color:'#0f172a'}}>KODEX</span>
          <span style={{fontSize:11,color:'#94a3b8',fontWeight:500,marginLeft:4}}>Lecturer Portal</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:13,color:'#64748b',fontWeight:500}}>Dr. Mensah</span>
          <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700}}>DM</div>
        </div>
      </header>

      <div style={{display:'flex',flex:1,minHeight:0}}>
        {/* Sidebar */}
        <aside style={{width:200,background:'linear-gradient(180deg,#1e1b4b 0%,#312e81 100%)',flexShrink:0,display:'flex',flexDirection:'column',padding:'14px 8px',overflowY:'auto'}}>
          {sidebarItems.map(item=>{
            const active = item.id==='assign' && (screen==='quiz-list'||screen==='questions'||screen==='ai-modal');
            return (
              <div key={item.id} onClick={()=>item.id==='assign'&&setScreen('quiz-list')}
                style={{display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:8,
                  background:active?'rgba(255,255,255,.18)':'transparent',
                  color:active?'#fff':'rgba(255,255,255,.5)',
                  fontSize:13,fontWeight:active?600:400,cursor:'pointer',marginBottom:2,transition:'all .15s'}}>
                {item.icon}{item.label}
              </div>
            );
          })}
        </aside>

        {/* Main */}
        <main style={{flex:1,overflowY:'auto',padding:'24px',position:'relative'}}>

          {/* Quiz List */}
          {screen==='quiz-list' && (
            <div style={{animation:'fadeUp .3s ease'}}>
              <div style={{display:'flex',gap:2,background:'#e2e8f0',borderRadius:10,padding:3,marginBottom:22,width:'fit-content'}}>
                {['Assignments','Quizzes'].map(tab=>(
                  <button key={tab} style={{padding:'7px 18px',borderRadius:8,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',
                    background:tab==='Quizzes'?'#fff':'transparent',
                    color:tab==='Quizzes'?'#4f46e5':'#64748b',
                    boxShadow:tab==='Quizzes'?'0 1px 4px rgba(0,0,0,.08)':'none',transition:'all .15s'}}>{tab}</button>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:20}}>
                <div>
                  <h2 style={{fontSize:20,fontWeight:700,letterSpacing:-.4,marginBottom:2,color:'#0f172a'}}>Quizzes</h2>
                  <p style={{color:'#64748b',fontSize:13}}>Create proctored quizzes and manage questions</p>
                </div>
                <button style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,cursor:'pointer',boxShadow:'0 4px 12px rgba(79,70,229,.3)'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Create Quiz
                </button>
              </div>
              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead>
                    <tr style={{background:'#f8fafc'}}>
                      {['Title','Course','Questions','Status','Actions'].map(h=>(
                        <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.8,color:'#94a3b8',borderBottom:'1.5px solid #e2e8f0'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {QUIZZES.map((q,i)=>(
                      <tr key={q.id} style={{borderBottom:i<QUIZZES.length-1?'1px solid #f1f5f9':'none'}}>
                        <td style={{padding:'13px 16px',fontWeight:600,color:'#0f172a'}}>{q.title}</td>
                        <td style={{padding:'13px 16px',color:'#64748b'}}>{q.course}</td>
                        <td style={{padding:'13px 16px',color:'#0f172a'}}>{q.id==='1'?12+quizQuestions.length:q.id==='2'?8:0}</td>
                        <td style={{padding:'13px 16px'}}>
                          <span style={{background:q.statusBg,color:q.statusColor,border:`1px solid ${q.statusBorder}`,padding:'3px 9px',borderRadius:20,fontSize:11,fontWeight:600}}>
                            {q.status==='Live'?'● ':''}{q.status}
                          </span>
                        </td>
                        <td style={{padding:'13px 16px'}}>
                          <button onClick={()=>q.id==='1'&&setScreen('questions')} style={{background:q.id==='1'?'#4f46e5':'#e2e8f0',color:q.id==='1'?'#fff':'#94a3b8',border:'none',borderRadius:7,padding:'5px 12px',fontSize:12,fontWeight:600,marginRight:6,cursor:q.id==='1'?'pointer':'default'}}>
                            Questions
                          </button>
                          <button style={{background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0',borderRadius:7,padding:'5px 10px',fontSize:12,fontWeight:500,cursor:'pointer'}}>📋 ID</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Question Builder */}
          {screen==='questions' && (
            <div style={{animation:'fadeUp .3s ease'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
                <button onClick={()=>setScreen('quiz-list')} style={{background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 12px',fontSize:13,fontWeight:500,color:'#64748b',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                  Back to Quizzes
                </button>
                <div>
                  <h2 style={{fontSize:18,fontWeight:700,letterSpacing:-.3,color:'#0f172a'}}>Mid-Semester Biology</h2>
                  <p style={{color:'#64748b',fontSize:12}}>BIO201 · Total marks: <strong>{12+quizQuestions.length}</strong></p>
                </div>
              </div>

              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'18px 20px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:14,color:'#0f172a'}}>Add New Question</div>
                <div style={{marginBottom:12}}>
                  <textarea rows={2} placeholder="Enter question text…" style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,resize:'vertical',outline:'none',color:'#94a3b8'}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                  {['Option A *','Option B *','Option C','Option D'].map((l,i)=>(
                    <input key={i} placeholder={l} style={{width:'100%',padding:'8px 11px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,outline:'none',color:'#94a3b8'}}/>
                  ))}
                </div>
                <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                  <button style={{background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Question
                  </button>
                  <button onClick={()=>setScreen('ai-modal')} style={{background:'linear-gradient(135deg,#7c3aed,#4f46e5)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:7,cursor:'pointer',boxShadow:'0 4px 14px rgba(124,58,237,.35)'}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    ✨ AI Generate Questions
                  </button>
                </div>
              </div>

              <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'18px 20px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:14,display:'flex',alignItems:'center',gap:8,color:'#0f172a'}}>
                  Questions
                  <span style={{background:'#f1f5f9',border:'1px solid #e2e8f0',padding:'1px 8px',borderRadius:20,fontSize:11,color:'#64748b',fontWeight:400}}>{12+quizQuestions.length}</span>
                </div>
                {quizQuestions.length>0 && (
                  <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
                    {quizQuestions.map((q,i)=><QuestionCard key={i} q={q} index={i} visible={true}/>)}
                  </div>
                )}
                <div style={{textAlign:'center',padding:20,color:'#94a3b8',fontSize:13,border:'1.5px dashed #e2e8f0',borderRadius:8}}>
                  {quizQuestions.length===0?'12 existing questions — click ✨ AI Generate to add more quickly':`+ 12 more pre-existing questions`}
                </div>
              </div>
            </div>
          )}

          {/* AI Modal */}
          {screen==='ai-modal' && (
            <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.55)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(4px)'}}>
              <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:540,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 25px 80px rgba(0,0,0,.25)',animation:'slideIn .3s cubic-bezier(.16,1,.3,1)'}}>

                {/* Header */}
                <div style={{padding:'18px 22px',borderBottom:'1px solid #e2e8f0',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'#fff',zIndex:1,borderRadius:'18px 18px 0 0'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#7c3aed,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(124,58,237,.3)'}}>
                      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    </div>
                    <div>
                      <h3 style={{fontSize:16,fontWeight:700,color:'#0f172a',margin:0}}>AI Question Generator</h3>
                      <p style={{fontSize:11,color:'#94a3b8',margin:0}}>Powered by Claude AI</p>
                    </div>
                  </div>
                  <button onClick={()=>{setScreen('questions');setPreview(null);setAdded(false);}} style={{width:28,height:28,borderRadius:7,border:'1px solid #e2e8f0',background:'#f8fafc',cursor:'pointer',fontSize:14,color:'#64748b',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>

                <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:15}}>
                  {/* Topic */}
                  <div>
                    <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:6,display:'block'}}>Topic / Subject <span style={{color:'#dc2626'}}>*</span></label>
                    <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. Photosynthesis, World War II, Python functions…"
                      style={{width:'100%',padding:'10px 13px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:14,outline:'none',transition:'border-color .15s'}}
                      onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
                  </div>

                  {/* Count + Difficulty */}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:6,display:'block'}}>Number of Questions</label>
                      <select value={count} onChange={e=>setCount(e.target.value)} style={{width:'100%',padding:'10px 13px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:13,outline:'none',background:'#fff',cursor:'pointer'}}>
                        {['3','5','8','10','15'].map(n=><option key={n} value={n}>{n} questions</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:6,display:'block'}}>Difficulty</label>
                      <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={{width:'100%',padding:'10px 13px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:13,outline:'none',background:'#fff',cursor:'pointer'}}>
                        {['easy','medium','hard','mixed'].map(d=><option key={d} value={d}>{d.charAt(0).toUpperCase()+d.slice(1)}</option>)}
                      </select>
                    </div>
                  </div>

                  {/* Question Type */}
                  <div>
                    <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:8,display:'block'}}>Question Type</label>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {[{v:'single',l:'Single Answer'},{v:'multiple',l:'Multiple Answers'},{v:'mixed',l:'Mixed'}].map(({v,l})=>(
                        <label key={v} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',padding:'7px 13px',
                          border:`1.5px solid ${qtype===v?'#7c3aed':'#e2e8f0'}`,borderRadius:8,fontSize:13,fontWeight:500,
                          background:qtype===v?'#f5f3ff':'#fff',color:qtype===v?'#7c3aed':'#64748b',transition:'all .15s'}}>
                          <input type="radio" name="qtype" value={v} checked={qtype===v} onChange={()=>setQtype(v)} style={{accentColor:'#7c3aed'}}/>
                          {l}
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* Marks + Context */}
                  <div style={{display:'grid',gridTemplateColumns:'90px 1fr',gap:12,alignItems:'start'}}>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:6,display:'block'}}>Marks/Q</label>
                      <input type="number" value={marks} onChange={e=>setMarks(e.target.value)} min="1" style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:14,outline:'none'}}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.4,color:'#64748b',marginBottom:6,display:'block'}}>
                        Additional Context <span style={{fontWeight:400,textTransform:'none',color:'#94a3b8'}}>(optional)</span>
                      </label>
                      <textarea value={context} onChange={e=>setContext(e.target.value)} rows={2}
                        placeholder="e.g. Year 10 level, focus on cellular respiration only…"
                        style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:13,resize:'vertical',outline:'none',fontFamily:'inherit'}}/>
                    </div>
                  </div>

                  {/* Generating state */}
                  {generating && (
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12,padding:'24px 0',animation:'fadeUp .3s ease'}}>
                      <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg,#7c3aed,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 20px rgba(124,58,237,.35)'}}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:'spin .8s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                      </div>
                      <div style={{fontSize:15,fontWeight:600,color:'#0f172a'}}>Claude is thinking…</div>
                      <div style={{fontSize:12,color:'#94a3b8',textAlign:'center',maxWidth:270,lineHeight:1.6}}>Generating {count} {difficulty} questions about <strong>"{topic}"</strong></div>
                      <div style={{display:'flex',gap:5,marginTop:2}}>
                        {[0,1,2].map(i=>(
                          <div key={i} style={{width:7,height:7,borderRadius:'50%',background:'#7c3aed',animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Preview */}
                  {preview && !generating && (
                    <div style={{animation:'fadeUp .3s ease'}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:8,color:'#0f172a'}}>
                        Preview — Review before adding
                        <span style={{background:'#ede9fe',color:'#7c3aed',padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600}}>{preview.length} questions</span>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:9,maxHeight:300,overflowY:'auto',paddingRight:3}}>
                        {preview.map((q,i)=><QuestionCard key={i} q={q} index={i} visible={visibleCards>i}/>)}
                      </div>
                    </div>
                  )}

                  {added && (
                    <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:9,padding:'12px 14px',display:'flex',alignItems:'center',gap:9,animation:'fadeUp .3s ease'}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      <span style={{fontSize:13,fontWeight:600,color:'#166534'}}>{preview?.length} questions added to your quiz!</span>
                    </div>
                  )}
                </div>

                {/* Footer */}
                <div style={{padding:'13px 22px',borderTop:'1px solid #e2e8f0',display:'flex',gap:9,justifyContent:'flex-end',position:'sticky',bottom:0,background:'#fff',borderRadius:'0 0 18px 18px'}}>
                  <button onClick={()=>{setScreen('questions');setPreview(null);setAdded(false);}} style={{background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Cancel</button>
                  <button onClick={runGenerate} disabled={generating}
                    style={{background:'linear-gradient(135deg,#7c3aed,#4f46e5)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:7,cursor:'pointer',opacity:generating?.7:1,boxShadow:'0 4px 14px rgba(124,58,237,.3)'}}>
                    {generating?<Spinner/>:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>}
                    {generating?'Generating…':preview?'Regenerate':'Generate Questions'}
                  </button>
                  {preview && !added && (
                    <button onClick={runAddAll} disabled={adding}
                      style={{background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,cursor:'pointer',boxShadow:'0 4px 12px rgba(5,150,105,.25)'}}>
                      {adding?<Spinner/>:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>}
                      {adding?'Adding…':`Add All ${preview.length} to Quiz`}
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}
        </main>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',bottom:22,right:22,zIndex:999,background:toast.type==='ok'?'#16a34a':'#dc2626',color:'#fff',padding:'11px 18px',borderRadius:9,fontSize:13,fontWeight:600,boxShadow:'0 8px 24px rgba(0,0,0,.15)',animation:'fadeUp .25s ease',display:'flex',alignItems:'center',gap:8}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
