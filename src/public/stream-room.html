<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Class — Dikly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0d14;
      --surface: #111622;
      --tile-bg: #141b2d;
      --border: rgba(255,255,255,.06);
      --accent: #2563eb;
      --accent2: #7c3aed;
      --green: #10b981;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --sat: env(safe-area-inset-top,0px);
      --sab: env(safe-area-inset-bottom,0px);
      --sil: env(safe-area-inset-left,0px);
      --sir: env(safe-area-inset-right,0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }

    /* ── CONNECT SCREEN ── */
    #connectScreen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      background: var(--bg);
    }
    .connect-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-size: 24px; font-weight: 800; color: #fff;
      box-shadow: 0 8px 32px rgba(37,99,235,.4);
    }
    .connect-msg { font-size: 16px; font-weight: 600; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .connect-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(37,99,235,.15); border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }

    /* ── ERROR SCREEN ── */
    #errorScreen {
      position: fixed; inset: 0; z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      background: var(--bg); padding: 24px;
    }
    .error-card {
      width: 100%; max-width: 380px;
      background: #151c2e; border: 1px solid rgba(239,68,68,.2); border-radius: 20px;
      padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center;
    }
    .error-icon { font-size: 36px; }
    .error-title { font-size: 18px; font-weight: 700; }
    .error-msg { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .btn-back {
      padding: 13px 28px; background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 12px; color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    /* ── CALL SCREEN ── */
    #callScreen {
      display: none; flex-direction: column;
      height: 100vh; height: -webkit-fill-available;
      padding-top: var(--sat); padding-bottom: var(--sab);
    }

    /* Top bar */
    #topBar {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: rgba(10,13,20,.85);
      backdrop-filter: blur(12px) saturate(1.5);
      -webkit-backdrop-filter: blur(12px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .brand-row { display: flex; align-items: center; gap: 10px; }
    .brand-logo-sm {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center; font-weight: 800; font-size: 14px; color: #fff;
    }
    .call-title-text {
      font-size: 14px; font-weight: 600; max-width: 160px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25);
      color: #34d399; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; letter-spacing: .3px; text-transform: uppercase;
    }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #10b981; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    .top-right { display: flex; align-items: center; gap: 12px; }
    .pcount { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
    .call-timer { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* Video grid */
    #videoGrid {
      flex: 1; overflow: hidden;
      display: grid;
      gap: 4px; padding: 4px;
      background: var(--bg);
      align-content: center;
    }
    /* Grid layout by participant count */
    #videoGrid.n1  { grid-template-columns: 1fr; }
    #videoGrid.n2  { grid-template-columns: 1fr 1fr; }
    #videoGrid.n3  { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; }
    #videoGrid.n3  .tile:first-child { grid-column: span 2; }
    #videoGrid.n4  { grid-template-columns: 1fr 1fr; }
    #videoGrid.n5,
    #videoGrid.n6  { grid-template-columns: repeat(3, 1fr); }
    #videoGrid.many { grid-template-columns: repeat(4, 1fr); }

    /* Video tile */
    .tile {
      position: relative; border-radius: 12px; overflow: hidden;
      background: var(--tile-bg);
      aspect-ratio: 16/9;
      min-height: 80px;
    }
    .tile video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .tile-no-video {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    }
    .tile-avatar {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-size: 22px; font-weight: 700; color: #fff;
    }
    .tile-display-name {
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    /* Bottom overlay: name + audio indicator */
    .tile-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px;
      background: linear-gradient(to top, rgba(10,13,20,.8) 0%, transparent 100%);
    }
    .tile-name { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
    .tile-muted { font-size: 14px; opacity: .8; }
    /* Speaking ring */
    .tile.speaking { box-shadow: 0 0 0 2px var(--green); }
    /* Local tile label */
    .tile.local .tile-name::after { content: ' (You)'; color: var(--muted); font-weight: 400; }

    /* Controls bar */
    #controlBar {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 20px;
      background: rgba(10,13,20,.9);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border-top: 1px solid var(--border);
    }
    .ctrl-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      width: 56px; padding: 10px 0; border-radius: 14px; border: none;
      background: rgba(255,255,255,.06); color: var(--text);
      cursor: pointer; touch-action: manipulation; font-family: inherit;
      transition: background .15s, transform .1s;
    }
    .ctrl-btn:active { transform: scale(.93); }
    .ctrl-btn.off { background: rgba(239,68,68,.15); color: var(--danger); }
    .ctrl-btn .ctrl-icon { font-size: 20px; line-height: 1; }
    .ctrl-btn .ctrl-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .3px; }
    .ctrl-btn.leave { background: var(--danger); color: #fff; width: 64px; }
    .ctrl-btn.leave .ctrl-label { color: rgba(255,255,255,.7); }
    .ctrl-btn.leave:hover { background: #dc2626; }

    @media (max-width: 480px) {
      #videoGrid.n2, #videoGrid.n3, #videoGrid.n4 { grid-template-columns: 1fr; }
      #videoGrid.n3 .tile:first-child { grid-column: span 1; }
      .ctrl-btn { width: 50px; }
    }
  </style>
</head>
<body>

<!-- CONNECT / LOADING -->
<div id="connectScreen">
  <div class="connect-logo">D</div>
  <div class="connect-msg" id="connectMsg">Joining class…</div>
  <div class="connect-spinner"></div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <div class="error-card">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Could Not Join</div>
    <div class="error-msg" id="errMsg">Something went wrong.</div>
  </div>
  <button class="btn-back" onclick="history.back()">Go Back</button>
</div>

<!-- CALL -->
<div id="callScreen">
  <div id="topBar">
    <div class="brand-row">
      <div class="brand-logo-sm">D</div>
      <span class="call-title-text" id="callTitle">Class</span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>
    <div class="top-right">
      <span class="pcount">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span id="pCount">1</span>
      </span>
      <span class="call-timer" id="callTimer">00:00</span>
    </div>
  </div>

  <div id="videoGrid" class="n1"></div>

  <div id="controlBar">
    <button class="ctrl-btn" id="btnMic" onclick="toggleMic()">
      <span class="ctrl-icon" id="micIcon">🎤</span>
      <span class="ctrl-label">Mic</span>
    </button>
    <button class="ctrl-btn" id="btnCam" onclick="toggleCam()">
      <span class="ctrl-icon" id="camIcon">📷</span>
      <span class="ctrl-label">Camera</span>
    </button>
    <button class="ctrl-btn" id="btnShare" onclick="toggleShare()">
      <span class="ctrl-icon" id="shareIcon">🖥</span>
      <span class="ctrl-label">Share</span>
    </button>
    <button class="ctrl-btn leave" onclick="leaveCall()">
      <span class="ctrl-icon">📵</span>
      <span class="ctrl-label">Leave</span>
    </button>
  </div>
</div>

<script type="module">
'use strict';

const _p       = new URLSearchParams(location.search);
const callId   = _p.get('callId')   || '';
const token    = _p.get('token')    || '';
const userId   = _p.get('userId')   || '';
const userName = _p.get('userName') || 'Participant';
const apiKey   = _p.get('apiKey')   || '';
const isMod    = _p.get('isMod') === '1';
const title    = _p.get('title')    || 'Class';

if (!callId || !token || !userId || !apiKey) {
  showError('Missing required parameters. Please go back and try again.');
  throw new Error('bad params');
}

document.getElementById('callTitle').textContent = title;

let call, client;
let micOn   = true;
let camOn   = isMod; // students start camera-off by default
let sharing = false;
let startedAt = Date.now();
let timerInterval = null;
let subs = [];

// ── Load GetStream SDK ────────────────────────────────────────────────────────
let StreamVideoClient;
try {
  const sdk = await import('https://esm.sh/@stream-io/video-client@1');
  StreamVideoClient = sdk.StreamVideoClient;
} catch (e) {
  showError('Failed to load video SDK. Please check your connection and try again.');
  throw e;
}

// ── Init client ───────────────────────────────────────────────────────────────
setConnectMsg('Connecting to server…');
try {
  client = new StreamVideoClient({
    apiKey,
    user: { id: userId, name: userName },
    token,
  });
} catch (e) {
  showError('Failed to connect: ' + (e.message || 'Unknown error'));
  throw e;
}

// ── Get call and join ─────────────────────────────────────────────────────────
setConnectMsg('Joining class…');
try {
  call = client.call('default', callId);
  await call.join({ create: isMod });
} catch (e) {
  showError('Could not join: ' + (e.message || 'Unknown error'));
  throw e;
}

// ── Enable local media ────────────────────────────────────────────────────────
setConnectMsg('Setting up your camera…');
await safeEnable(call.microphone, micOn);
await safeEnable(call.camera, camOn);

// ── Show call UI ──────────────────────────────────────────────────────────────
showCall();
startTimer();

// ── Subscribe to participant state ────────────────────────────────────────────
if (call.state?.participants$) {
  const sub = call.state.participants$.subscribe(ps => renderGrid(ps));
  subs.push(sub);
} else {
  // fallback: poll events
  for (const ev of ['participantJoined', 'participantLeft', 'participantUpdated',
                     'trackPublished', 'trackUnpublished', 'dominantSpeakerChanged']) {
    call.on(ev, () => renderGrid(call.state?.participants || []));
  }
  renderGrid(call.state?.participants || []);
}

// ── Controls ──────────────────────────────────────────────────────────────────
window.toggleMic = async () => {
  micOn = !micOn;
  await safeEnable(call.microphone, micOn);
  const btn = document.getElementById('btnMic');
  document.getElementById('micIcon').textContent = micOn ? '🎤' : '🔇';
  btn.classList.toggle('off', !micOn);
};

window.toggleCam = async () => {
  camOn = !camOn;
  await safeEnable(call.camera, camOn);
  const btn = document.getElementById('btnCam');
  document.getElementById('camIcon').textContent = camOn ? '📷' : '🚫';
  btn.classList.toggle('off', !camOn);
};

window.toggleShare = async () => {
  try {
    if (!sharing) {
      await call.screenShare.enable();
      sharing = true;
      document.getElementById('shareIcon').textContent = '⏹';
      document.getElementById('btnShare').classList.add('off');
    } else {
      await call.screenShare.disable();
      sharing = false;
      document.getElementById('shareIcon').textContent = '🖥';
      document.getElementById('btnShare').classList.remove('off');
    }
  } catch (e) {
    sharing = false;
    document.getElementById('shareIcon').textContent = '🖥';
    document.getElementById('btnShare').classList.remove('off');
  }
};

window.leaveCall = async () => {
  clearInterval(timerInterval);
  subs.forEach(s => s?.unsubscribe?.());
  try { await call.leave(); } catch (_) {}
  try { await client.disconnectUser(); } catch (_) {}
  history.back();
};

// ── Render participant grid ───────────────────────────────────────────────────
function renderGrid(participants) {
  const grid = document.getElementById('videoGrid');
  const n = participants.length;

  // Update grid layout class
  grid.className = n <= 1 ? 'n1' : n === 2 ? 'n2' : n === 3 ? 'n3' : n === 4 ? 'n4'
                 : n <= 6 ? (n <= 5 ? 'n5' : 'n6') : 'many';

  document.getElementById('pCount').textContent = n;

  // Remove tiles for gone participants
  const activeIds = new Set(participants.map(p => p.sessionId));
  grid.querySelectorAll('.tile').forEach(t => {
    if (!activeIds.has(t.dataset.sid)) t.remove();
  });

  // Add / update tiles
  for (const p of participants) {
    let tile = grid.querySelector(`[data-sid="${p.sessionId}"]`);
    if (!tile) {
      tile = buildTile(p);
      grid.appendChild(tile);
    }
    updateTile(tile, p);
  }
}

function buildTile(p) {
  const tile = document.createElement('div');
  tile.className = 'tile' + (p.isLocalParticipant ? ' local' : '');
  tile.dataset.sid = p.sessionId;
  tile.innerHTML = `
    <video id="vid-${p.sessionId}" autoplay playsinline muted></video>
    <audio id="aud-${p.sessionId}" autoplay></audio>
    <div class="tile-no-video" id="nov-${p.sessionId}">
      <div class="tile-avatar">${(p.name || p.userId || 'P').charAt(0).toUpperCase()}</div>
      <div class="tile-display-name">${esc(p.name || p.userId || 'Participant')}</div>
    </div>
    <div class="tile-footer">
      <span class="tile-name">${esc(p.name || p.userId || 'Participant')}</span>
      <span class="tile-muted" id="mute-${p.sessionId}"></span>
    </div>
  `;
  return tile;
}

function updateTile(tile, p) {
  const videoEl = document.getElementById('vid-' + p.sessionId);
  const audioEl = document.getElementById('aud-' + p.sessionId);
  const noVideo = document.getElementById('nov-' + p.sessionId);
  const muteEl  = document.getElementById('mute-' + p.sessionId);

  const hasVideo = p.videoStream && (p.publishedTracks || []).includes('video');
  const hasAudio = p.audioStream && (p.publishedTracks || []).includes('audio');

  // Video
  if (hasVideo) {
    if (videoEl.srcObject !== p.videoStream) videoEl.srcObject = p.videoStream;
    noVideo.style.display = 'none';
    videoEl.style.display = 'block';
  } else {
    videoEl.srcObject = null;
    videoEl.style.display = 'none';
    noVideo.style.display = 'flex';
  }

  // Audio (never play back local participant to avoid echo)
  if (!p.isLocalParticipant && hasAudio) {
    if (audioEl.srcObject !== p.audioStream) audioEl.srcObject = p.audioStream;
  } else {
    audioEl.srcObject = null;
  }

  // Mute indicator
  muteEl.textContent = hasAudio ? '' : '🔇';

  // Speaking ring
  tile.classList.toggle('speaking', !!p.isSpeaking);
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startedAt) / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    const mm = String(m % 60).padStart(2,'0');
    const ss = String(s % 60).padStart(2,'0');
    document.getElementById('callTimer').textContent = h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }, 1000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function safeEnable(device, enable) {
  try { enable ? await device.enable() : await device.disable(); } catch (_) {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setConnectMsg(msg) {
  document.getElementById('connectMsg').textContent = msg;
}

function showCall() {
  document.getElementById('connectScreen').style.display = 'none';
  document.getElementById('callScreen').style.display = 'flex';
  document.getElementById('btnCam').classList.toggle('off', !camOn);
  if (!camOn) document.getElementById('camIcon').textContent = '🚫';
}

function showError(msg) {
  document.getElementById('connectScreen').style.display = 'none';
  document.getElementById('callScreen').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errorScreen').style.display = 'flex';
}
</script>
</body>
</html>
