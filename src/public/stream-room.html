<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Class — Dikly</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0d14;--surface:#111622;--tile:#141b2d;--border:rgba(255,255,255,.07);
      --accent:#2563eb;--accent2:#7c3aed;--green:#10b981;--danger:#ef4444;--warning:#f59e0b;
      --text:#f1f5f9;--muted:#64748b;
      --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif}
    .overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:20px;background:var(--bg);padding:24px}
    .overlay.hidden{display:none}
    .ov-logo{width:56px;height:56px;border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:24px;font-weight:800;color:#fff;
      box-shadow:0 8px 32px rgba(37,99,235,.4)}
    .ov-msg{font-size:15px;font-weight:600;color:var(--muted)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(37,99,235,.15);
      border-top-color:var(--accent);animation:spin .8s linear infinite}
    .err-card{width:100%;max-width:380px;background:#151c2e;border:1px solid rgba(239,68,68,.2);
      border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;
      align-items:center;gap:14px;text-align:center}
    .err-icon{font-size:36px}.err-title{font-size:18px;font-weight:700}
    .err-txt{font-size:14px;color:var(--muted);line-height:1.6}
    .btn-back{padding:12px 32px;background:var(--accent);border:none;
      border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
      box-shadow:0 4px 20px rgba(37,99,235,.4);transition:opacity .15s}
    .btn-back:hover{opacity:.85}
    #callScreen{display:none;height:100vh;height:-webkit-fill-available;
      flex-direction:column;padding-top:var(--sat);padding-bottom:var(--sab)}
    #topBar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;background:rgba(10,13,20,.9);backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:10}
    .brand-row{display:flex;align-items:center;gap:10px}
    .brand-sm{width:30px;height:30px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff}
    .call-title{font-size:14px;font-weight:600;max-width:140px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .live-pill{display:inline-flex;align-items:center;gap:5px;
      background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);
      color:#34d399;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase}
    .live-dot{width:5px;height:5px;border-radius:50%;background:#10b981;animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .top-right{display:flex;align-items:center;gap:12px}
    .pcount,.timer{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
    #mainArea{flex:1;display:flex;overflow:hidden;min-height:0}
    #videoGrid{flex:1;overflow:hidden;display:grid;gap:3px;padding:3px;
      background:var(--bg);align-content:center;transition:flex .2s}
    #videoGrid.n1{grid-template-columns:1fr}
    #videoGrid.n2{grid-template-columns:1fr 1fr}
    #videoGrid.n3{grid-template-columns:1fr 1fr}
    #videoGrid.n3 .tile:first-child{grid-column:span 2}
    #videoGrid.n4{grid-template-columns:1fr 1fr}
    #videoGrid.n5,#videoGrid.n6{grid-template-columns:repeat(3,1fr)}
    #videoGrid.many{grid-template-columns:repeat(4,1fr)}
    .tile{position:relative;border-radius:10px;overflow:hidden;background:var(--tile);
      aspect-ratio:16/9;min-height:60px;cursor:default}
    .tile video{width:100%;height:100%;object-fit:cover;display:block}
    .tile-nov{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:8px}
    .tile-av{width:48px;height:48px;border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:20px;font-weight:700;color:#fff}
    .tile-dname{font-size:12px;font-weight:500;color:var(--muted)}
    .tile-footer{position:absolute;bottom:0;left:0;right:0;display:flex;
      align-items:center;justify-content:space-between;padding:5px 9px;
      background:linear-gradient(to top,rgba(10,13,20,.85) 0%,transparent 100%)}
    .tile-name{font-size:11px;font-weight:600;color:#fff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75%}
    .tile-icons{display:flex;gap:4px;align-items:center;font-size:12px}
    .tile.speaking{box-shadow:0 0 0 2px var(--green)}
    .tile.local .tile-name::after{content:' (You)';color:var(--muted);font-weight:400}
    .tile-menu{position:absolute;top:7px;right:7px;display:none}
    .tile-menu-btn{width:26px;height:26px;border-radius:8px;border:none;
      background:rgba(10,13,20,.7);color:var(--muted);cursor:pointer;
      font-size:14px;display:grid;place-items:center;font-family:inherit}
    .tile-menu-popup{position:absolute;top:30px;right:0;background:#1e2640;
      border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;z-index:50;min-width:110px}
    .tile-menu-popup button{width:100%;padding:8px 12px;border:none;background:none;
      color:var(--text);font-size:13px;text-align:left;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;gap:8px}
    .tile-menu-popup button:hover{background:rgba(255,255,255,.06)}
    .tile-menu-popup button.danger{color:var(--danger)}
    .tile:hover .tile-menu{display:block}
    .tile-menu.active .tile-menu-popup{display:block}
    .sidebar{width:0;flex-shrink:0;overflow:hidden;display:flex;flex-direction:column;
      background:var(--surface);border-left:1px solid var(--border);transition:width .2s;min-height:0}
    .sidebar.open{width:280px}
    @media(max-width:600px){.sidebar.open{position:fixed;right:0;top:0;bottom:0;z-index:50;width:100%;max-width:320px}}
    .sidebar-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:12px 14px;border-bottom:1px solid var(--border)}
    .sidebar-title{font-size:14px;font-weight:700}
    .sidebar-close{width:28px;height:28px;border:none;background:rgba(255,255,255,.06);
      border-radius:8px;color:var(--muted);cursor:pointer;font-size:16px;
      display:grid;place-items:center;font-family:inherit}
    #participantsList{flex:1;overflow-y:auto;padding:8px}
    .pitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px}
    .pitem:hover{background:rgba(255,255,255,.04)}
    .pav{width:32px;height:32px;border-radius:9px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
    .pname{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .picons{display:flex;gap:4px;font-size:13px}
    #chatMessages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
    .chat-msg{display:flex;flex-direction:column;gap:2px;max-width:90%}
    .chat-msg.own{align-self:flex-end}
    .chat-msg-sender{font-size:10px;color:var(--muted);padding:0 4px}
    .chat-msg.own .chat-msg-sender{text-align:right}
    .chat-bubble{padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.4;
      background:rgba(255,255,255,.07);word-break:break-word}
    .chat-msg.own .chat-bubble{background:rgba(37,99,235,.3);border-radius:12px 12px 3px 12px}
    .chat-msg:not(.own) .chat-bubble{border-radius:12px 12px 12px 3px}
    #chatInputArea{flex-shrink:0;display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)}
    #chatInput{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);
      border-radius:10px;padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit;
      outline:none;resize:none}
    #chatInput:focus{border-color:rgba(37,99,235,.4)}
    #chatSend{width:34px;height:34px;border-radius:10px;border:none;background:var(--accent);
      color:#fff;font-size:16px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;align-self:flex-end}
    #handToast{position:fixed;top:calc(var(--sat) + 60px);left:50%;transform:translateX(-50%);
      background:#1e2640;border:1px solid rgba(245,158,11,.3);border-radius:12px;
      padding:10px 16px;font-size:13px;font-weight:600;color:#fcd34d;
      display:none;z-index:100;white-space:nowrap;gap:8px;align-items:center}
    #controlBar{flex-shrink:0;display:flex;align-items:center;justify-content:center;
      flex-wrap:wrap;gap:10px;padding:12px 16px;
      background:rgba(10,13,20,.95);backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border)}
    .ctrl{display:flex;flex-direction:column;align-items:center;gap:3px;
      width:54px;padding:9px 0;border-radius:13px;border:none;background:rgba(255,255,255,.06);
      color:var(--text);cursor:pointer;touch-action:manipulation;
      transition:background .15s,transform .1s;font-family:inherit}
    .ctrl:active{transform:scale(.93)}
    .ctrl .ci{font-size:20px;line-height:1}
    .ctrl .cl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.3px}
    .ctrl.off{background:rgba(239,68,68,.15);color:var(--danger)}
    .ctrl.off .cl{color:rgba(239,68,68,.7)}
    .ctrl.active{background:rgba(245,158,11,.15);color:var(--warning)}
    .ctrl.leave{background:var(--danger);color:#fff;width:62px}
    .ctrl.leave .cl{color:rgba(255,255,255,.7)}
    .ctrl.mod-only{display:none}
    .is-mod .ctrl.mod-only{display:flex}
    @media(max-width:480px){
      #videoGrid.n2,#videoGrid.n3,#videoGrid.n4{grid-template-columns:1fr}
      #videoGrid.n3 .tile:first-child{grid-column:span 1}
      .ctrl{width:48px;padding:8px 0}
    }
    /* ── Proctoring ── */
    .proctor-badge{display:inline-flex;align-items:center;gap:5px;
      background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
      color:#f87171;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.3px}
    .proctor-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
    #fsViolation{display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(100,0,0,.94);flex-direction:column;
      align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
    #fsViolation.show{display:flex}
    #fsViolation .fv-icon{font-size:52px}
    #fsViolation .fv-title{font-size:22px;font-weight:800;color:#fff}
    #fsViolation .fv-sub{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6}
    #fsViolation .fv-btn{margin-top:6px;padding:13px 32px;background:#fff;color:#7f0000;
      border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>

<div class="overlay" id="connectScreen">
  <div class="ov-logo">D</div>
  <div class="ov-msg" id="connectMsg">Joining class…</div>
  <div class="spinner"></div>
</div>

<div class="overlay hidden" id="errorScreen">
  <div class="err-card">
    <div class="err-icon">⚠️</div>
    <div class="err-title">Could Not Join</div>
    <div class="err-txt" id="errMsg">Something went wrong.</div>
  </div>
  <button class="btn-back" onclick="history.back()">Go Back</button>
</div>

<div id="callScreen">
  <div id="topBar">
    <div class="brand-row">
      <div class="brand-sm">D</div>
      <span class="call-title" id="callTitle">Class</span>
      <span class="live-pill"><span class="live-dot"></span>Live</span>
    </div>
    <div class="top-right">
      <span class="pcount">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span id="pCount">1</span>
      </span>
      <span class="timer" id="callTimer">00:00</span>
    </div>
  </div>

  <div id="mainArea">
    <div id="videoGrid" class="n1"></div>

    <div class="sidebar" id="participantsSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Participants</span>
        <button class="sidebar-close" onclick="toggleParticipants()">✕</button>
      </div>
      <div id="participantsList"></div>
    </div>

    <div class="sidebar" id="chatSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Chat</span>
        <button class="sidebar-close" onclick="toggleChat()">✕</button>
      </div>
      <div id="chatMessages"></div>
      <div id="chatInputArea">
        <textarea id="chatInput" rows="1" placeholder="Message…"></textarea>
        <button id="chatSend" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>

  <div id="handToast">✋ <span id="handToastName"></span> raised their hand</div>

  <div id="controlBar">
    <button class="ctrl" id="btnMic"   onclick="toggleMic()">  <span class="ci" id="micIcon">🎤</span><span class="cl">Mic</span></button>
    <button class="ctrl" id="btnCam"   onclick="toggleCam()">  <span class="ci" id="camIcon">📷</span><span class="cl">Camera</span></button>
    <button class="ctrl" id="btnShare" onclick="toggleShare()"><span class="ci" id="shareIcon">🖥</span><span class="cl">Share</span></button>
    <button class="ctrl" id="btnHand"  onclick="toggleHand()"> <span class="ci">✋</span><span class="cl">Hand</span></button>
    <button class="ctrl" onclick="toggleChat()">               <span class="ci">💬</span><span class="cl">Chat</span></button>
    <button class="ctrl" onclick="toggleParticipants()">       <span class="ci">👥</span><span class="cl">People</span></button>
    <button class="ctrl mod-only" id="btnMuteAll" onclick="muteAll()"><span class="ci">🔇</span><span class="cl">Mute All</span></button>
    <button class="ctrl leave" onclick="leaveCall()">          <span class="ci">📵</span><span class="cl">Leave</span></button>
  </div>
</div>

<div id="fsViolation">
  <div class="fv-icon">⚠️</div>
  <div class="fv-title">You exited fullscreen</div>
  <div class="fv-sub">This has been logged.<br>Returning automatically in <strong id="fsCountdown">10</strong>s…</div>
  <button class="fv-btn" onclick="(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement)">
    Return to Fullscreen Now
  </button>
</div>

<!-- LiveKit SDK — served from the same origin to avoid iOS Safari cross-origin restrictions -->
<script src="/js/livekit-client.umd.js"></script>

<script>
window.addEventListener('unhandledrejection', function(e) {
  showError('Error: ' + ((e.reason && e.reason.message) || String(e.reason || 'unknown')));
  console.error('[DIKLY]', e.reason);
});

(async function() {
'use strict';

var _p          = new URLSearchParams(location.search);
var roomName    = _p.get('roomName')    || '';
var token       = _p.get('token')       || '';
var userId      = _p.get('userId')      || '';
var userName    = _p.get('userName')    || 'Participant';
var isMod       = _p.get('isMod')      === '1';
var meetingId   = _p.get('meetingId')   || '';
var title       = _p.get('title')       || 'Class';
var livekitUrl  = _p.get('livekitUrl')  || '';
var meetingType = _p.get('meetingType') || 'meeting';
var BASE_URL    = location.origin;
var PROCTOR_TYPES = ['oral_exam', 'live_assessment'];
var isProctored = !isMod && PROCTOR_TYPES.indexOf(meetingType) !== -1;

if (!roomName || !token || !livekitUrl) {
  showError('Missing connection parameters. Please go back and try again.');
  return;
}

var kodexToken = localStorage.getItem('token') || localStorage.getItem('jwt_token') ||
                 localStorage.getItem('auth_token') || sessionStorage.getItem('token') || '';

document.getElementById('callTitle').textContent = title;
if (isMod) document.getElementById('callScreen').classList.add('is-mod');

var room;
var micOn = false, camOn = false, sharing = false, handRaised = false;
var chatOpen = false, participantsOpen = false;
var startedAt = Date.now();
var activeSpeakerSids = new Set();
var encoder = new TextEncoder();
var decoder = new TextDecoder();

// ── LiveKit SDK — loaded from same-origin /js/livekit-client.umd.js ──────────
setMsg('Loading…');
var Room, RoomEvent, Track;
try {
  var lk = window.LivekitClient;
  if (!lk || !lk.Room) throw new Error('LiveKit SDK not loaded');
  Room      = lk.Room;
  RoomEvent = lk.RoomEvent;
  Track     = lk.Track;
} catch(e) { showError('Failed to load LiveKit SDK: ' + e.message); return; }

// ── Connect ───────────────────────────────────────────────────────────────────
setMsg('Connecting…');
try {
  room = new Room({
    adaptiveStream: true,
    dynacast: true,
    videoCaptureDefaults: { resolution: { width: 640, height: 360, frameRate: 24 } },
  });
} catch(e) { showError('Could not create room: ' + e.message); return; }

setMsg('Joining class…');
try {
  await room.connect(livekitUrl, token);
} catch(e) { showError('Could not join: ' + e.message); return; }

// ── Enable camera + mic ───────────────────────────────────────────────────────
setMsg('Starting camera…');
try {
  await room.localParticipant.enableCameraAndMicrophone();
  micOn = true; camOn = true;
} catch(e) {
  console.warn('[Media]', e.message);
  try { await room.localParticipant.setMicrophoneEnabled(true); micOn = true; } catch(_) {}
  try { await room.localParticipant.setCameraEnabled(true);    camOn = true; } catch(_) {}
}

showCall();
startTimer();
rerender();

// ── Proctoring (oral_exam / live_assessment — students only) ──────────────────
function postProcEvent(type, meta) {
  if (!meetingId || !kodexToken) return;
  fetch(BASE_URL + '/api/meetings/' + meetingId + '/proctoring/event', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + kodexToken },
    body: JSON.stringify({ type: type, metadata: meta || null }),
  }).catch(function(){});
}

if (isProctored) {
  // Monitoring badge in top bar
  var badge = document.createElement('span');
  badge.className = 'proctor-badge';
  badge.innerHTML = '<span class="proctor-dot"></span>Monitored';
  document.querySelector('.top-right').prepend(badge);

  // Hide screen share — not allowed during oral exams
  document.getElementById('btnShare').style.display = 'none';

  // Fullscreen helpers
  function reqFs() {
    var el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
  }
  reqFs();

  // Fullscreen-violation overlay with 10-s auto-return
  var _fsTimer = null;
  function showFsOverlay() {
    document.getElementById('fsViolation').classList.add('show');
    var n = 10; document.getElementById('fsCountdown').textContent = n;
    clearInterval(_fsTimer);
    _fsTimer = setInterval(function() {
      n--;
      document.getElementById('fsCountdown').textContent = n;
      if (n <= 0) { clearInterval(_fsTimer); reqFs(); }
    }, 1000);
  }

  document.addEventListener('fullscreenchange', function() {
    var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (inFs) {
      clearInterval(_fsTimer);
      document.getElementById('fsViolation').classList.remove('show');
    } else {
      postProcEvent('fullscreen_exit', null);
      showFsOverlay();
    }
  });
  document.addEventListener('webkitfullscreenchange', function() {
    var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (inFs) {
      clearInterval(_fsTimer);
      document.getElementById('fsViolation').classList.remove('show');
    } else {
      postProcEvent('fullscreen_exit', null);
      showFsOverlay();
    }
  });

  // Tab-switch logging
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) postProcEvent('tab_switch', null);
  });

  // Block DevTools shortcuts + right-click
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && 'ijcIJC'.indexOf(e.key) !== -1) ||
        (e.ctrlKey && 'uUpP'.indexOf(e.key) !== -1)) {
      e.preventDefault(); e.stopPropagation();
    }
  }, true);
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  postProcEvent('session_start', { meetingType: meetingType });
}

// ── Events ────────────────────────────────────────────────────────────────────
room
  .on(RoomEvent.ParticipantConnected,    rerender)
  .on(RoomEvent.ParticipantDisconnected, rerender)
  .on(RoomEvent.LocalTrackPublished,     rerender)
  .on(RoomEvent.LocalTrackUnpublished,   rerender)
  .on(RoomEvent.TrackSubscribed,         rerender)
  .on(RoomEvent.TrackUnsubscribed,       rerender)
  .on(RoomEvent.TrackMuted,              rerender)
  .on(RoomEvent.TrackUnmuted,            rerender)
  .on(RoomEvent.ActiveSpeakersChanged, function(speakers) {
    activeSpeakerSids = new Set(speakers.map(function(s) { return s.sid; }));
    rerender();
  })
  .on(RoomEvent.DataReceived, function(data, participant) {
    try {
      var msg = JSON.parse(decoder.decode(data));
      if (msg.type === 'chat') addChatMessage(msg.name || (participant && participant.name) || 'Participant', msg.text, false);
      if (msg.type === 'hand') showHandToast(msg.name || 'Someone');
    } catch(_) {}
  })
  .on(RoomEvent.Disconnected, function() { showError('You were disconnected from the room.'); });

// ── Controls ──────────────────────────────────────────────────────────────────
window.toggleMic = async function() {
  var btn = document.getElementById('btnMic'); btn.disabled = true;
  try { micOn = !micOn; await room.localParticipant.setMicrophoneEnabled(micOn); }
  catch(e) { console.warn('[Mic]', e.message); micOn = !micOn; }
  btn.disabled = false; updateMicBtn(); rerender();
};

window.toggleCam = async function() {
  var btn = document.getElementById('btnCam'); btn.disabled = true;
  try { camOn = !camOn; await room.localParticipant.setCameraEnabled(camOn); }
  catch(e) { console.warn('[Cam]', e.message); camOn = !camOn; }
  btn.disabled = false; updateCamBtn(); rerender();
};

window.toggleShare = async function() {
  var btn = document.getElementById('btnShare'); btn.disabled = true;
  try { sharing = !sharing; await room.localParticipant.setScreenShareEnabled(sharing); }
  catch(e) { console.warn('[Share]', e.message); sharing = !sharing; }
  btn.disabled = false;
  document.getElementById('shareIcon').textContent = sharing ? '⏹' : '🖥';
  document.getElementById('btnShare').classList.toggle('active', sharing);
};

window.toggleHand = function() {
  handRaised = !handRaised;
  document.getElementById('btnHand').classList.toggle('active', handRaised);
  try { room.localParticipant.publishData(encoder.encode(JSON.stringify({ type: 'hand', name: userName, raised: handRaised })), { reliable: true }); } catch(_) {}
};

window.muteAll = async function() {
  if (!isMod || !meetingId) return;
  try { await fetch(BASE_URL + '/api/meetings/' + meetingId + '/mute-all', { method: 'POST', headers: { Authorization: 'Bearer ' + kodexToken } }); } catch(_) {}
};

window.muteParticipant = async function(identity) {
  if (!isMod || !meetingId) return;
  try { await fetch(BASE_URL + '/api/meetings/' + meetingId + '/participants/' + encodeURIComponent(identity) + '/mute', { method: 'POST', headers: { Authorization: 'Bearer ' + kodexToken } }); } catch(_) {}
};

window.kickParticipant = async function(identity) {
  if (!isMod || !meetingId) return;
  if (!confirm('Remove this participant?')) return;
  try { await fetch(BASE_URL + '/api/meetings/' + meetingId + '/participants/' + encodeURIComponent(identity) + '/kick', { method: 'POST', headers: { Authorization: 'Bearer ' + kodexToken } }); } catch(_) {}
};

window.toggleChat = function() {
  chatOpen = !chatOpen;
  document.getElementById('chatSidebar').classList.toggle('open', chatOpen);
  if (chatOpen) { participantsOpen = false; document.getElementById('participantsSidebar').classList.remove('open'); setTimeout(function() { document.getElementById('chatMessages').scrollTo(0, 99999); }, 50); }
};

window.toggleParticipants = function() {
  participantsOpen = !participantsOpen;
  document.getElementById('participantsSidebar').classList.toggle('open', participantsOpen);
  if (participantsOpen) { chatOpen = false; document.getElementById('chatSidebar').classList.remove('open'); }
};

window.leaveCall = async function() {
  clearInterval(timerInt);
  try { await room.disconnect(); } catch(_) {}
  history.back();
};

window.sendChat = function() {
  var inp = document.getElementById('chatInput'), text = inp.value.trim();
  if (!text) return; inp.value = '';
  try { room.localParticipant.publishData(encoder.encode(JSON.stringify({ type: 'chat', text: text, name: userName })), { reliable: true }); addChatMessage('You', text, true); }
  catch(e) { console.warn('[Chat]', e.message); }
};

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendChat(); }
});

window.toggleTileMenu = function(btn) {
  var menu = btn.closest('.tile-menu'); menu.classList.toggle('active');
  document.addEventListener('click', function oc(e2) { if (!menu.contains(e2.target)) { menu.classList.remove('active'); document.removeEventListener('click', oc); } });
};

// ── Render ────────────────────────────────────────────────────────────────────
function allParticipants() {
  var list = [room.localParticipant];
  var remotes = room.remoteParticipants || room.participants;
  if (remotes) remotes.forEach(function(p) { list.push(p); });
  return list;
}

function rerender() {
  try { var ps = allParticipants(); renderGrid(ps); renderPeopleList(ps); document.getElementById('pCount').textContent = ps.length; }
  catch(e) { console.error('[rerender]', e); }
}

function findTile(sid) {
  var tiles = document.getElementById('videoGrid').querySelectorAll('.tile');
  for (var i = 0; i < tiles.length; i++) { if (tiles[i].dataset.sid === sid) return tiles[i]; }
  return null;
}

function renderGrid(participants) {
  var grid = document.getElementById('videoGrid');
  var n = participants.length;
  grid.className = n<=1?'n1':n===2?'n2':n===3?'n3':n===4?'n4':n<=6?(n===5?'n5':'n6'):'many';
  var active = {};
  for (var i = 0; i < participants.length; i++) active[participants[i].sid] = true;
  grid.querySelectorAll('.tile').forEach(function(t) {
    if (!active[t.dataset.sid]) { t.querySelectorAll('video,audio').forEach(function(el) { el.srcObject = null; }); t.remove(); }
  });
  for (var k = 0; k < participants.length; k++) {
    var p = participants[k], tile = findTile(p.sid);
    if (!tile) { tile = buildTile(p); grid.appendChild(tile); }
    updateTile(tile, p);
  }
}

function buildTile(p) {
  var isLocal = p === room.localParticipant;
  var tile = document.createElement('div');
  tile.className = 'tile' + (isLocal ? ' local' : '');
  tile.dataset.sid = p.sid;
  var initials = ((p.name || p.identity || 'P').charAt(0)).toUpperCase();
  var hostCtrl = (isMod && !isLocal) ? (
    '<div class="tile-menu"><button class="tile-menu-btn" onclick="toggleTileMenu(this)">⋯</button>' +
    '<div class="tile-menu-popup">' +
    '<button onclick="muteParticipant(' + JSON.stringify(p.identity||'') + ')">🔇 Mute</button>' +
    '<button class="danger" onclick="kickParticipant(' + JSON.stringify(p.identity||'') + ')">✕ Remove</button>' +
    '</div></div>'
  ) : '';
  tile.innerHTML =
    '<video id="vid-' + p.sid + '" autoplay playsinline muted' + (isLocal?' style="transform:scaleX(-1)"':'') + '></video>' +
    '<audio id="aud-' + p.sid + '" autoplay></audio>' +
    '<div class="tile-nov" id="nov-' + p.sid + '"><div class="tile-av">' + esc(initials) + '</div><div class="tile-dname">' + esc(p.name||p.identity||'Participant') + '</div></div>' +
    '<div class="tile-footer"><span class="tile-name">' + esc(p.name||p.identity||'Participant') + '</span>' +
    '<span class="tile-icons"><span id="tm-' + p.sid + '"></span></span></div>' + hostCtrl;
  return tile;
}

function updateTile(tile, p) {
  var isLocal = p === room.localParticipant;
  var vid = document.getElementById('vid-' + p.sid);
  var aud = document.getElementById('aud-' + p.sid);
  var nov = document.getElementById('nov-' + p.sid);
  var tmEl = document.getElementById('tm-'  + p.sid);
  if (!vid || !nov) return;

  var camPub   = p.getTrackPublication(Track.Source.Camera);
  var sharePub = p.getTrackPublication(Track.Source.ScreenShare);
  var activeVid = (sharePub && sharePub.track && !sharePub.isMuted) ? sharePub : camPub;
  var hasVideo  = !!(activeVid && activeVid.track && !activeVid.isMuted);

  if (hasVideo) {
    activeVid.track.attach(vid);
    vid.style.display = 'block'; nov.style.display = 'none';
  } else {
    if (camPub && camPub.track) try { camPub.track.detach(vid); } catch(_) {}
    vid.srcObject = null; vid.style.display = 'none'; nov.style.display = 'flex';
  }

  if (!isLocal) {
    var micPub   = p.getTrackPublication(Track.Source.Microphone);
    var hasAudio = !!(micPub && micPub.track && !micPub.isMuted);
    if (hasAudio) { micPub.track.attach(aud); } else { if (micPub && micPub.track) try { micPub.track.detach(aud); } catch(_) {} aud.srcObject = null; }
    if (tmEl) tmEl.textContent = hasAudio ? '' : '🔇';
  } else {
    if (tmEl) tmEl.textContent = micOn ? '' : '🔇';
  }

  tile.classList.toggle('speaking', activeSpeakerSids.has(p.sid));
}

function renderPeopleList(participants) {
  var list = document.getElementById('participantsList'); list.innerHTML = '';
  for (var i = 0; i < participants.length; i++) {
    var p = participants[i], isLocal = p === room.localParticipant;
    var camPub = p.getTrackPublication(Track.Source.Camera);
    var micPub = p.getTrackPublication(Track.Source.Microphone);
    var div = document.createElement('div'); div.className = 'pitem';
    div.innerHTML =
      '<div class="pav">' + esc((p.name||p.identity||'P').charAt(0).toUpperCase()) + '</div>' +
      '<div class="pname">' + esc(p.name||p.identity||'Participant') + (isLocal?' (You)':'') + '</div>' +
      '<div class="picons">' + (micPub&&!micPub.isMuted?'':'🔇') + (camPub&&!camPub.isMuted?'':'🚫') + '</div>';
    list.appendChild(div);
  }
}

function addChatMessage(name, text, isOwn) {
  var box = document.getElementById('chatMessages');
  var div = document.createElement('div'); div.className = 'chat-msg' + (isOwn ? ' own' : '');
  div.innerHTML = '<div class="chat-msg-sender">' + esc(name) + '</div><div class="chat-bubble">' + esc(text) + '</div>';
  box.appendChild(div); box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
}

function showHandToast(name) {
  var el = document.getElementById('handToast');
  document.getElementById('handToastName').textContent = name;
  el.style.display = 'flex'; clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.display = 'none'; }, 4000);
}

var timerInt;
function startTimer() {
  timerInt = setInterval(function() {
    var s = Math.floor((Date.now()-startedAt)/1000), m = Math.floor(s/60), h = Math.floor(m/60);
    document.getElementById('callTimer').textContent = h ? (h+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0')) : (String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0'));
  }, 1000);
}

function updateMicBtn() { document.getElementById('micIcon').textContent = micOn?'🎤':'🔇'; document.getElementById('btnMic').classList.toggle('off',!micOn); }
function updateCamBtn() { document.getElementById('camIcon').textContent = camOn?'📷':'🚫'; document.getElementById('btnCam').classList.toggle('off',!camOn); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

})().catch(function(e) {
  console.error('[DIKLY fatal]', e);
  showError((e && e.message) ? e.message : String(e));
});

function setMsg(m) { var el = document.getElementById('connectMsg'); if (el) el.textContent = m; }
function showCall() { document.getElementById('connectScreen').classList.add('hidden'); document.getElementById('callScreen').style.display = 'flex'; }
function showError(msg) { document.getElementById('connectScreen').classList.add('hidden'); document.getElementById('errMsg').textContent = msg; document.getElementById('errorScreen').classList.remove('hidden'); }
</script>
</body>
</html>
