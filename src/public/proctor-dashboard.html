<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>EduCorp — Proctor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0f172a; --navy2: #1e293b; --navy3: #334155; --slate: #64748b;
  --muted: #94a3b8; --white: #f8fafc; --accent: #38bdf8;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --font-mono: 'Space Mono', monospace; --font-sans: 'Plus Jakarta Sans', sans-serif;
}
html, body { height: 100%; background: var(--navy); color: var(--white); font-family: var(--font-sans); overflow: hidden; }

.topbar {
  background: var(--navy2); border-bottom: 1px solid var(--navy3);
  padding: 14px 20px; padding-top: calc(14px + env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.topbar h1 { font-size: 18px; font-weight: 800; }
.topbar p  { font-size: 12px; color: var(--slate); margin-top: 2px; }

.toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar input {
  padding: 8px 14px; background: var(--navy); border: 1.5px solid var(--navy3);
  border-radius: 8px; color: var(--white); font-family: var(--font-sans); font-size: 13px;
  outline: none; width: 220px;
}
.toolbar input:focus { border-color: var(--accent); }
.btn {
  padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  touch-action: manipulation;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), #0ea5e9); color: var(--navy); }
.btn-ghost   { background: transparent; border: 1.5px solid var(--navy3); color: var(--white); }
.btn-ghost:hover { background: var(--navy3); }

.main {
  display: flex; height: calc(100vh - 65px);
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px; min-width: 280px; background: var(--navy2);
  border-right: 1px solid var(--navy3); overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar-section { padding: 16px; border-bottom: 1px solid var(--navy3); }
.sidebar-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--slate); margin-bottom: 12px; }

.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sum-box {
  background: var(--navy); border-radius: 8px; padding: 10px;
  text-align: center;
}
.sum-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.sum-key { font-size: 10px; color: var(--slate); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

.student-list { flex: 1; overflow-y: auto; }
.stu-row {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid rgba(51,65,85,0.5); cursor: pointer;
  transition: background 0.15s;
}
.stu-row:hover { background: rgba(255,255,255,0.03); }
.stu-row.active { background: rgba(56,189,248,0.08); border-left: 3px solid var(--accent); }
.stu-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.stu-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.stu-dot.yellow { background: var(--yellow); }
.stu-dot.red    { background: var(--red); animation: blink 1s infinite; }
.stu-dot.grey   { background: var(--slate); }
@keyframes blink { 50% { opacity: 0.3; } }

.stu-info { flex: 1; min-width: 0; }
.stu-name  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stu-sub   { font-size: 11px; color: var(--slate); font-family: var(--font-mono); margin-top: 2px; }

.stu-score { font-family: var(--font-mono); font-size: 14px; font-weight: 700; text-align: right; }
.stu-time  { font-size: 10px; color: var(--slate); text-align: right; margin-top: 2px; }

/* Detail panel */
.detail-panel {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  background: var(--navy);
}
.detail-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--slate); text-align: center; gap: 12px;
}
.detail-placeholder .icon { font-size: 48px; }

.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.detail-name { font-size: 20px; font-weight: 800; }
.detail-sub  { font-size: 13px; color: var(--slate); margin-top: 4px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box {
  background: var(--navy2); border: 1px solid var(--navy3); border-radius: 10px; padding: 14px;
  text-align: center;
}
.stat-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.stat-key { font-size: 10px; color: var(--slate); font-weight: 600; text-transform: uppercase; margin-top: 4px; }

.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--slate); margin-bottom: 12px; }

/* Log timeline */
.log-timeline { display: flex; flex-direction: column; gap: 0; }
.log-entry {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--navy3);
}
.log-entry:last-child { border-bottom: none; }
.log-icon { font-size: 16px; flex-shrink: 0; }
.log-body  { flex: 1; }
.log-evt   { font-size: 13px; font-weight: 600; text-transform: capitalize; }
.log-meta  { font-size: 11px; color: var(--slate); margin-top: 2px; font-family: var(--font-mono); }
.badge {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.info     { background: rgba(56,189,248,0.15); color: var(--accent); }
.badge.warning  { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge.critical { background: rgba(239,68,68,0.15); color: var(--red); }

/* Snapshots */
.snaps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 24px; }
.snap-thumb {
  border-radius: 8px; background: var(--navy2); border: 1px solid var(--navy3);
  overflow: hidden; aspect-ratio: 4/3; cursor: pointer;
  position: relative; transition: border-color 0.2s;
}
.snap-thumb:hover { border-color: var(--accent); }
.snap-thumb.flagged { border-color: var(--red); }
.snap-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.snap-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 3px 6px;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--muted);
}
.snap-label.flagged { color: var(--red); }

/* Expanded snap overlay */
#snap-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 500; display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
#snap-overlay.show { display: flex; }
#snap-overlay img { max-width: 90%; max-height: 90%; border-radius: 10px; }

/* Responsive */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; overflow: auto; }
  .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--navy3); max-height: 40vh; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .toolbar input { width: 160px; }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .toolbar { width: 100%; }
  .toolbar input { flex: 1; }
}

/* Spinner */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--navy3);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--navy2); border: 1px solid var(--navy3); border-radius: 8px;
  padding: 10px 18px; font-size: 13px; font-weight: 600; white-space: nowrap;
  z-index: 600; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#toast.show { opacity: 1; }
#toast.error { border-color: var(--red); color: var(--red); }
#toast.success { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<div id="toast"></div>
<div id="snap-overlay"><img id="snap-big" src="" alt="Snapshot" /></div>

<div class="topbar">
  <div>
    <h1>📊 Proctor Dashboard</h1>
    <p id="quiz-label">No quiz loaded</p>
  </div>
  <div class="toolbar">
    <input type="text" id="quiz-id-input" placeholder="Quiz ID…" />
    <button class="btn btn-primary" id="load-btn">Load</button>
    <button class="btn btn-ghost" id="refresh-btn">↻ Refresh</button>
    <button class="btn btn-ghost" id="export-btn">⬇ Export</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR: student list -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Summary</h3>
      <div class="summary-grid" id="summary-grid">
        <div class="sum-box"><div class="sum-val">—</div><div class="sum-key">Total</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--green)">—</div><div class="sum-key">Active</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--accent)">—</div><div class="sum-key">Done</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--red)">—</div><div class="sum-key">Terminated</div></div>
      </div>
    </div>
    <div class="student-list" id="student-list">
      <div class="detail-placeholder" style="height:200px">
        <div class="icon">🔍</div>
        <p>Enter a Quiz ID to begin monitoring</p>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-placeholder">
      <div class="icon">👈</div>
      <p>Select a student to view their session details</p>
    </div>
  </div>
</div>

<script>
const API = '';
let authToken = localStorage.getItem('proctor_token') || '';
let currentQuizId = '';
let refreshTimer = null;
let selectedSessionId = null;
let monitorData = null;

// ── Auth token input ────────────────────────────────────────────────
const tokenKey = 'proctor_token';
if (!authToken) {
  authToken = prompt('Enter your lecturer JWT token (from login):') || '';
  if (authToken) localStorage.setItem(tokenKey, authToken);
}

// ── Toast ────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── API ──────────────────────────────────────────────────────────────
async function api(method, path) {
  const res = await fetch(API + path, {
    headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' }
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Load Monitor ─────────────────────────────────────────────────────
// ── Auto-load quiz from URL ?quizId=xxx ─────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  const qid = params.get('quizId');
  if (qid) {
    const inp = document.getElementById('quiz-id-input');
    if (inp) inp.value = qid;
    currentQuizId = qid;
    setTimeout(() => {
      loadMonitor();
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadMonitor, 15000);
    }, 500);
  }
})();

document.getElementById('load-btn').addEventListener('click', () => {
  const id = document.getElementById('quiz-id-input').value.trim();
  if (!id) return toast('Enter a quiz ID', 'error');
  currentQuizId = id;
  loadMonitor();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadMonitor, 15000);
});

document.getElementById('refresh-btn').addEventListener('click', () => {
  if (currentQuizId) loadMonitor();
  else toast('Load a quiz first', 'error');
});

async function loadMonitor() {
  try {
    const data = await api('GET', `/api/student/quizzes/${currentQuizId}/proctor/live-monitor`);
    monitorData = data;
    renderSidebar(data);
    document.getElementById('quiz-label').textContent = data.quiz?.title || currentQuizId;
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderSidebar(data) {
  const s = data.summary || {};
  document.getElementById('summary-grid').innerHTML = `
    <div class="sum-box"><div class="sum-val">${s.total ?? 0}</div><div class="sum-key">Total</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--green)">${s.active ?? 0}</div><div class="sum-key">Active</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--accent)">${s.completed ?? 0}</div><div class="sum-key">Done</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--red)">${s.terminated ?? 0}</div><div class="sum-key">Terminated</div></div>
  `;

  const sessions = data.sessions || [];
  const list = document.getElementById('student-list');
  if (sessions.length === 0) {
    list.innerHTML = '<p style="padding:20px;text-align:center;color:var(--slate)">No students yet</p>';
    return;
  }

  list.innerHTML = sessions.map(s => `
    <div class="stu-row ${selectedSessionId === s.sessionId ? 'active' : ''}" data-sid="${s.sessionId}">
      <div class="stu-dot ${s.statusColor}"></div>
      <div class="stu-info">
        <div class="stu-name">${s.student?.name || 'Student'}</div>
        <div class="stu-sub">${s.student?.indexNumber || '—'} · ${s.platform}</div>
      </div>
      <div>
        <div class="stu-score" style="color:var(--${s.integrityScore >= 75 ? 'green' : s.integrityScore >= 50 ? 'yellow' : 'red'})">${s.integrityScore}</div>
        <div class="stu-time">${s.status === 'active' ? s.remainingMinutes + 'm left' : s.status}</div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.stu-row').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('.stu-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      selectedSessionId = row.dataset.sid;
      loadDetail(row.dataset.sid);
    });
  });
}

async function loadDetail(sessionId) {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="spinner"></div>';

  try {
    const data = await api('GET', `/api/student/quizzes/proctor/session/${sessionId}/report`);
    const s = data.session;
    const logs = data.logs || [];
    const snaps = data.snapshots || [];

    const iconMap = {
      tab_switch: '🔀', app_background: '📵', face_missing: '😶', multiple_faces: '👥',
      camera_disabled: '📷', exam_started: '▶️', exam_submitted: '✅', exam_terminated: '⛔',
      warning_issued: '⚠️', orientation_change: '🔄', face_off_center: '🎯',
      heartbeat: '💓', copy_attempt: '📋', face_detected: '✓', app_foreground: '📲',
    };

    panel.innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-name">${s.student?.name || 'Student'}</div>
          <div class="detail-sub">${s.student?.indexNumber || ''} · ${s.student?.email || ''}</div>
          <div class="detail-sub" style="margin-top:4px">
            ${s.os || '?'} · ${s.browser || '?'} · ${s.platform} · IP: ${s.ipAddress || '?'}
          </div>
        </div>
        <div style="text-align:right">
          <span style="padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;
            background:rgba(${s.status === 'active' ? '56,189,248' : s.status === 'completed' ? '34,197,94' : '239,68,68'},0.15);
            color:var(--${s.status === 'active' ? 'accent' : s.status === 'completed' ? 'green' : 'red'})">
            ${s.status.toUpperCase()}
          </span>
          ${s.terminationReason ? `<div style="font-size:11px;color:var(--red);margin-top:6px">${s.terminationReason}</div>` : ''}
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" style="color:var(--${s.integrityScore >= 75 ? 'green' : s.integrityScore >= 50 ? 'yellow' : 'red'})">${s.integrityScore ?? 100}</div>
          <div class="stat-key">Integrity</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--red)">${s.totalViolations ?? 0}</div>
          <div class="stat-key">Violations</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--yellow)">${s.warningsIssued ?? 0}</div>
          <div class="stat-key">Warnings</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${s.attempt?.isSubmitted ? '✅' : '⏳'}</div>
          <div class="stat-key">Submitted</div>
        </div>
      </div>

      ${snaps.length > 0 ? `
        <div class="section-title">Snapshots (${snaps.length})</div>
        <div class="snaps-grid" id="snaps-grid">
          ${snaps.map(snap => `
            <div class="snap-thumb ${snap.flagged ? 'flagged' : ''}" data-sid="${snap._id}">
              <div style="background:var(--navy3);height:100%;display:flex;align-items:center;justify-content:center;font-size:24px">📷</div>
              <div class="snap-label ${snap.flagged ? 'flagged' : ''}">${snap.type}${snap.flagged ? ' ⚑' : ''}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="section-title" style="margin-top:4px">Event Log (${logs.length} events)</div>
      <div class="log-timeline">
        ${logs.slice().reverse().slice(0, 50).map(l => `
          <div class="log-entry">
            <span class="log-icon">${iconMap[l.eventType] || '📋'}</span>
            <div class="log-body">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="log-evt">${l.eventType.replace(/_/g,' ')}</span>
                <span class="badge ${l.severity}">${l.severity}</span>
              </div>
              <div class="log-meta">${new Date(l.timestamp).toLocaleTimeString()} ${l.duration ? `· ${Math.round(l.duration)}s` : ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    // Load snapshot images
    panel.querySelectorAll('.snap-thumb[data-sid]').forEach(thumb => {
      const sid = thumb.dataset.sid;
      api('GET', `/api/student/quizzes/proctor/snapshot/${sid}`).then(data => {
        const img = document.createElement('img');
        img.src = data.imageData;
        img.style = 'width:100%;height:100%;object-fit:cover;display:block';
        thumb.insertBefore(img, thumb.firstChild);
        thumb.addEventListener('click', () => {
          document.getElementById('snap-big').src = data.imageData;
          document.getElementById('snap-overlay').classList.add('show');
        });
      }).catch(() => {});
    });

  } catch (e) {
    panel.innerHTML = `<p style="color:var(--red);padding:20px">Error: ${e.message}</p>`;
  }
}

// ── Snap overlay close ────────────────────────────────────────────────
document.getElementById('snap-overlay').addEventListener('click', () => {
  document.getElementById('snap-overlay').classList.remove('show');
});

// ── Export ───────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  if (!monitorData) return toast('Load a quiz first', 'error');
  const sessions = monitorData.sessions || [];
  const csv = [
    ['Name','Index','Platform','Status','Integrity','Violations','Warnings','Remaining(min)'].join(','),
    ...sessions.map(s => [
      s.student?.name || '', s.student?.indexNumber || '', s.platform,
      s.status, s.integrityScore, s.totalViolations, s.warningsIssued, s.remainingMinutes
    ].join(','))
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `proctor-report-${currentQuizId}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('Exported!', 'success');
});
</script>
</body>
</html>
