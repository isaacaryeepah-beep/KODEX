<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DIKLY — Proctor Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/dikly-icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0f172a; --navy2: #1e293b; --navy3: #334155; --slate: #64748b;
  --muted: #94a3b8; --white: #f8fafc; --accent: #38bdf8;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --font-mono: 'Space Mono', monospace; --font-sans: 'Plus Jakarta Sans', sans-serif;
}
html, body { height: 100%; background: var(--navy); color: var(--white); font-family: var(--font-sans); overflow: hidden; }

.topbar {
  background: var(--navy2); border-bottom: 1px solid var(--navy3);
  padding: 14px 20px; padding-top: calc(14px + env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.topbar h1 { font-size: 18px; font-weight: 800; }
.topbar p  { font-size: 12px; color: var(--slate); margin-top: 2px; }

.toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar input {
  padding: 8px 14px; background: var(--navy); border: 1.5px solid var(--navy3);
  border-radius: 8px; color: var(--white); font-family: var(--font-sans); font-size: 13px;
  outline: none; width: 220px;
}
.toolbar input:focus { border-color: var(--accent); }
.btn {
  padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  touch-action: manipulation;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), #0ea5e9); color: var(--navy); }
.btn-ghost   { background: transparent; border: 1.5px solid var(--navy3); color: var(--white); }
.btn-ghost:hover { background: var(--navy3); }

.main {
  display: flex; height: calc(100vh - 65px);
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px; min-width: 280px; background: var(--navy2);
  border-right: 1px solid var(--navy3); overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar-section { padding: 16px; border-bottom: 1px solid var(--navy3); }
.sidebar-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--slate); margin-bottom: 12px; }

.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sum-box {
  background: var(--navy); border-radius: 8px; padding: 10px;
  text-align: center;
}
.sum-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.sum-key { font-size: 10px; color: var(--slate); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

.student-list { flex: 1; overflow-y: auto; }
.stu-row {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid rgba(51,65,85,0.5); cursor: pointer;
  transition: background 0.15s;
}
.stu-row:hover { background: rgba(255,255,255,0.03); }
.stu-row.active { background: rgba(56,189,248,0.08); border-left: 3px solid var(--accent); }
.stu-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.stu-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.stu-dot.yellow { background: var(--yellow); }
.stu-dot.red    { background: var(--red); animation: blink 1s infinite; }
.stu-dot.grey   { background: var(--slate); }
@keyframes blink { 50% { opacity: 0.3; } }

.stu-info { flex: 1; min-width: 0; }
.stu-name  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stu-sub   { font-size: 11px; color: var(--slate); font-family: var(--font-mono); margin-top: 2px; }

.stu-score { font-family: var(--font-mono); font-size: 14px; font-weight: 700; text-align: right; }
.stu-time  { font-size: 10px; color: var(--slate); text-align: right; margin-top: 2px; }

/* Detail panel */
.detail-panel {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  background: var(--navy);
}
.detail-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--slate); text-align: center; gap: 12px;
}
.detail-placeholder .icon { font-size: 48px; }

.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.detail-name { font-size: 20px; font-weight: 800; }
.detail-sub  { font-size: 13px; color: var(--slate); margin-top: 4px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box {
  background: var(--navy2); border: 1px solid var(--navy3); border-radius: 10px; padding: 14px;
  text-align: center;
}
.stat-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.stat-key { font-size: 10px; color: var(--slate); font-weight: 600; text-transform: uppercase; margin-top: 4px; }

.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--slate); margin-bottom: 12px; }

/* Log timeline */
.log-timeline { display: flex; flex-direction: column; gap: 0; }
.log-entry {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--navy3);
}
.log-entry:last-child { border-bottom: none; }
.log-icon { font-size: 16px; flex-shrink: 0; }
.log-body  { flex: 1; }
.log-evt   { font-size: 13px; font-weight: 600; text-transform: capitalize; }
.log-meta  { font-size: 11px; color: var(--slate); margin-top: 2px; font-family: var(--font-mono); }
.badge {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.info     { background: rgba(56,189,248,0.15); color: var(--accent); }
.badge.warning  { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge.critical { background: rgba(239,68,68,0.15); color: var(--red); }

/* Snapshots */
.snaps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 24px; }
.snap-thumb {
  border-radius: 8px; background: var(--navy2); border: 1px solid var(--navy3);
  overflow: hidden; aspect-ratio: 4/3; cursor: pointer;
  position: relative; transition: border-color 0.2s;
}
.snap-thumb:hover { border-color: var(--accent); }
.snap-thumb.flagged { border-color: var(--red); }
.snap-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.snap-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 3px 6px;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--muted);
}
.snap-label.flagged { color: var(--red); }

/* Expanded snap overlay */
#snap-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 500; display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
#snap-overlay.show { display: flex; }
#snap-overlay img { max-width: 90%; max-height: 90%; border-radius: 10px; }

/* Responsive */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; overflow: auto; }
  .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--navy3); max-height: 40vh; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .toolbar input { width: 160px; }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .toolbar { width: 100%; }
  .toolbar input { flex: 1; }
}

/* Spinner */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--navy3);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--navy2); border: 1px solid var(--navy3); border-radius: 8px;
  padding: 10px 18px; font-size: 13px; font-weight: 600; white-space: nowrap;
  z-index: 600; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#toast.show { opacity: 1; }
#toast.error { border-color: var(--red); color: var(--red); }
#toast.success { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<div id="toast"></div>
<div id="snap-overlay"><img id="snap-big" src="" alt="Snapshot" /></div>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn btn-ghost" onclick="window.location.href='/index.html'" style="padding:7px 14px;font-size:13px;display:flex;align-items:center;gap:6px;">← Back</button>
    <div>
      <h1>🎯 Snap Quiz Monitor</h1>
      <p id="quiz-label">Lecturer live proctoring</p>
    </div>
  </div>
  <div class="toolbar">
    <select id="quiz-picker" style="padding:8px 12px;background:var(--navy);border:1.5px solid var(--navy3);border-radius:8px;color:var(--white);font-family:var(--font-sans);font-size:13px;outline:none;min-width:200px;max-width:280px;">
      <option value="">— Select a snap quiz —</option>
    </select>
    <button class="btn btn-ghost" id="refresh-btn">↻ Refresh</button>
    <button class="btn btn-ghost" id="export-btn">⬇ Export</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR: student list -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Summary</h3>
      <div class="summary-grid" id="summary-grid">
        <div class="sum-box"><div class="sum-val">—</div><div class="sum-key">Total</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--green)">—</div><div class="sum-key">Active</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--accent)">—</div><div class="sum-key">Done</div></div>
        <div class="sum-box"><div class="sum-val" style="color:var(--red)">—</div><div class="sum-key">Terminated</div></div>
      </div>
    </div>
    <div class="student-list" id="student-list">
      <div class="detail-placeholder" style="height:200px">
        <div class="icon">🔍</div>
        <p>Select a snap quiz above to begin monitoring</p>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-placeholder">
      <div class="icon">👈</div>
      <p>Select a student to view their session details</p>
    </div>
  </div>
</div>

<script>
const API = '';
let authToken = localStorage.getItem('token') || '';
let currentQuizId = '';
let currentQuizTitle = '';
let refreshTimer = null;
let selectedAttemptId = null;
let attemptsData = [];

if (!authToken) {
  setTimeout(() => toast('Not signed in — please log in from the main portal first.', 'error'), 700);
}

// ── Toast ────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── API ──────────────────────────────────────────────────────────────
async function api(method, path) {
  const res = await fetch(API + path, {
    headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' }
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Populate quiz picker from lecturer's snap quizzes ─────────────
async function loadQuizPicker() {
  try {
    const data = await api('GET', '/api/lecturer/snap-quizzes');
    const quizzes = data.quizzes || [];
    const picker = document.getElementById('quiz-picker');
    if (!quizzes.length) {
      picker.innerHTML = '<option value="">No snap quizzes found</option>';
      return;
    }
    picker.innerHTML = '<option value="">— Select a snap quiz —</option>' +
      quizzes.map(q => {
        const statusIcon = q.status === 'open' ? '🟢' : q.status === 'closed' ? '🔴' : '⚪';
        return `<option value="${q._id}">${statusIcon} ${q.title}</option>`;
      }).join('');

    // If URL has ?quizId= pre-select it
    const params = new URLSearchParams(window.location.search);
    const qid = params.get('quizId');
    if (qid && quizzes.find(q => q._id === qid)) {
      picker.value = qid;
      selectQuiz(qid, quizzes.find(q => q._id === qid)?.title || qid);
    }
  } catch (e) {
    toast('Failed to load snap quizzes: ' + e.message, 'error');
  }
}

document.getElementById('quiz-picker').addEventListener('change', function () {
  const id = this.value;
  if (!id) {
    currentQuizId = '';
    clearInterval(refreshTimer);
    document.getElementById('quiz-label').textContent = 'Lecturer live proctoring';
    resetView();
    return;
  }
  const title = this.options[this.selectedIndex].text.replace(/^[🟢🔴⚪]\s*/, '');
  selectQuiz(id, title);
});

function selectQuiz(id, title) {
  currentQuizId = id;
  currentQuizTitle = title;
  document.getElementById('quiz-label').textContent = title;
  clearInterval(refreshTimer);
  loadAttempts();
  refreshTimer = setInterval(loadAttempts, 15000);
}

function resetView() {
  attemptsData = [];
  selectedAttemptId = null;
  document.getElementById('summary-grid').innerHTML = `
    <div class="sum-box"><div class="sum-val">—</div><div class="sum-key">Total</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--green)">—</div><div class="sum-key">Active</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--accent)">—</div><div class="sum-key">Done</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--red)">—</div><div class="sum-key">Terminated</div></div>
  `;
  document.getElementById('student-list').innerHTML = `
    <div class="detail-placeholder" style="height:200px">
      <div class="icon">🔍</div>
      <p>Select a snap quiz above to begin monitoring</p>
    </div>`;
  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-placeholder">
      <div class="icon">👈</div>
      <p>Select a student to view their session details</p>
    </div>`;
}

document.getElementById('refresh-btn').addEventListener('click', () => {
  if (currentQuizId) loadAttempts();
  else toast('Select a snap quiz first', 'error');
});

async function loadAttempts() {
  if (!currentQuizId) return;
  try {
    const data = await api('GET', `/api/lecturer/snap-quizzes/${currentQuizId}/attempts?limit=100`);
    attemptsData = data.attempts || [];
    renderSidebar(attemptsData);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderSidebar(attempts) {
  const total      = attempts.length;
  const active     = attempts.filter(a => a.status === 'active').length;
  const done       = attempts.filter(a => ['submitted','auto_submitted'].includes(a.status)).length;
  const terminated = attempts.filter(a => a.status === 'terminated').length;

  document.getElementById('summary-grid').innerHTML = `
    <div class="sum-box"><div class="sum-val">${total}</div><div class="sum-key">Total</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--green)">${active}</div><div class="sum-key">Active</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--accent)">${done}</div><div class="sum-key">Done</div></div>
    <div class="sum-box"><div class="sum-val" style="color:var(--red)">${terminated}</div><div class="sum-key">Terminated</div></div>
  `;

  const list = document.getElementById('student-list');
  if (!attempts.length) {
    list.innerHTML = '<p style="padding:20px;text-align:center;color:var(--slate)">No students yet</p>';
    return;
  }

  const dotColor = s => s === 'active' ? 'green' : s === 'terminated' ? 'red' : s === 'abandoned' ? 'grey' : 'yellow';
  const statusLabel = s => ({ active:'Active', submitted:'Submitted', auto_submitted:'Auto-submitted', terminated:'Terminated', abandoned:'Abandoned' }[s] || s);

  list.innerHTML = attempts.map(a => `
    <div class="stu-row ${selectedAttemptId === a._id ? 'active' : ''}" data-aid="${a._id}">
      <div class="stu-dot ${dotColor(a.status)}"></div>
      <div class="stu-info">
        <div class="stu-name">${a.student?.name || 'Student'}</div>
        <div class="stu-sub">${a.student?.studentId || a.student?.email || '—'}</div>
      </div>
      <div>
        <div class="stu-score" style="color:var(--${a.violationCount > 5 ? 'red' : a.violationCount > 0 ? 'yellow' : 'green'})">${a.violationCount ?? 0}v</div>
        <div class="stu-time">${statusLabel(a.status)}</div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.stu-row').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('.stu-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      selectedAttemptId = row.dataset.aid;
      loadDetail(row.dataset.aid);
    });
  });
}

async function loadDetail(attemptId) {
  if (!currentQuizId) return;
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="spinner"></div>';

  try {
    const data = await api('GET', `/api/lecturer/snap-quizzes/${currentQuizId}/attempts/${attemptId}`);
    const s = data.attempt;
    const violations = data.violations || [];
    const responses  = data.responses  || [];
    // map violations to log-style entries for the timeline
    const logs = violations;

    const iconMap = {
      tab_switch: '🔀', app_background: '📵', face_missing: '😶', multiple_faces: '👥',
      camera_disabled: '📷', exam_started: '▶️', exam_submitted: '✅', exam_terminated: '⛔',
      warning_issued: '⚠️', orientation_change: '🔄', face_off_center: '🎯',
      heartbeat: '💓', copy_attempt: '📋', face_detected: '✓', app_foreground: '📲',
    };

    const statusColor = st => st === 'active' ? 'accent' : ['submitted','auto_submitted'].includes(st) ? 'green' : 'red';
    const statusLabel = st => ({ active:'ACTIVE', submitted:'SUBMITTED', auto_submitted:'AUTO-SUBMITTED', terminated:'TERMINATED', abandoned:'ABANDONED' }[st] || st.toUpperCase());

    const iconMap = {
      tab_switch:'🔀', focus_lost:'📵', fullscreen_exit:'🖥', copy_paste:'📋',
      right_click:'🖱', print_screen:'🖨', session_lock:'🔒', heartbeat_timeout:'💔',
      max_violations:'🚫', manual:'⚠️',
    };

    panel.innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-name">${s.student?.name || 'Student'}</div>
          <div class="detail-sub">${s.student?.studentId || s.student?.email || '—'}</div>
          <div class="detail-sub" style="margin-top:4px">
            Attempt #${s.attemptNumber} · Started ${s.startedAt ? new Date(s.startedAt).toLocaleTimeString() : '—'}
            ${s.submittedAt ? ` · Submitted ${new Date(s.submittedAt).toLocaleTimeString()}` : ''}
          </div>
        </div>
        <div style="text-align:right">
          <span style="padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;
            background:rgba(${s.status === 'active' ? '56,189,248' : ['submitted','auto_submitted'].includes(s.status) ? '34,197,94' : '239,68,68'},0.15);
            color:var(--${statusColor(s.status)})">
            ${statusLabel(s.status)}
          </span>
          ${s.terminationReason ? `<div style="font-size:11px;color:var(--red);margin-top:6px">${s.terminationReason.replace(/_/g,' ')}</div>` : ''}
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" style="color:var(--${violations.length > 5 ? 'red' : violations.length > 0 ? 'yellow' : 'green'})">${violations.length}</div>
          <div class="stat-key">Violations</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${s.violationCount ?? 0}</div>
          <div class="stat-key">Count</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${responses.length}</div>
          <div class="stat-key">Answered</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${s.gradingStatus?.replace('_',' ') || '—'}</div>
          <div class="stat-key">Grading</div>
        </div>
      </div>

      <div class="section-title">Violation Log (${violations.length})</div>
      <div class="log-timeline">
        ${violations.length === 0
          ? '<p style="padding:14px;color:var(--slate);font-size:13px">No violations recorded ✓</p>'
          : violations.slice().reverse().slice(0, 50).map(v => `
          <div class="log-entry">
            <span class="log-icon">${iconMap[v.violationType] || '⚠️'}</span>
            <div class="log-body">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="log-evt">${(v.violationType || '').replace(/_/g,' ')}</span>
                <span class="badge ${v.severity === 'critical' ? 'critical' : v.severity === 'warning' ? 'warning' : 'info'}">${v.severity || 'info'}</span>
              </div>
              <div class="log-meta">${new Date(v.occurredAt).toLocaleTimeString()} · ${v.actionTaken || ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;

  } catch (e) {
    panel.innerHTML = `<p style="color:var(--red);padding:20px">Error: ${e.message}</p>`;
  }
}

// ── Snap overlay close ────────────────────────────────────────────────
document.getElementById('snap-overlay').addEventListener('click', () => {
  document.getElementById('snap-overlay').classList.remove('show');
});

// ── Export ───────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  if (!attemptsData.length) return toast('Select a snap quiz first', 'error');
  const csv = [
    ['Name','Student ID','Status','Violations','Grading','Attempt #','Started','Submitted'].join(','),
    ...attemptsData.map(a => [
      `"${a.student?.name || ''}"`, a.student?.studentId || '', a.status,
      a.violationCount ?? 0, a.gradingStatus || '',
      a.attemptNumber || 1,
      a.startedAt ? new Date(a.startedAt).toLocaleString() : '',
      a.submittedAt ? new Date(a.submittedAt).toLocaleString() : '',
    ].join(','))
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `snap-quiz-monitor-${currentQuizId}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('Exported!', 'success');
});

// ── Init ─────────────────────────────────────────────────────────────
if (authToken) loadQuizPicker();
</script>
