<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0f0e1a;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    background: #0f0e1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background geometric shapes */
  .bg-circle-1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,70,229,0.18) 0%, transparent 70%);
    top: -150px; right: -100px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    bottom: -100px; left: 100px;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,70,229,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,70,229,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-accent-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #4f46e5, #818cf8, transparent);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 72px;
    padding: 0 80px;
    width: 100%;
  }

  .logo-wrap {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 160px;
    background: rgba(79,70,229,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 32px;
  }

  .divider {
    width: 1px;
    height: 180px;
    background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.4), transparent);
    flex-shrink: 0;
  }

  .text-block {
    flex: 1;
  }

  .brand {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -2px;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 22px;
    font-weight: 400;
    color: rgba(199,210,254,0.85);
    letter-spacing: 0.3px;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 7px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .pill-blue {
    background: rgba(79,70,229,0.25);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.35);
  }
  .pill-indigo {
    background: rgba(99,102,241,0.15);
    color: #c7d2fe;
    border: 1px solid rgba(129,140,248,0.25);
  }

  .domain {
    position: absolute;
    bottom: 32px;
    right: 48px;
    font-size: 15px;
    color: rgba(129,140,248,0.6);
    letter-spacing: 1px;
    font-weight: 500;
    z-index: 10;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="canvas">
  <div class="bg-grid"></div>
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-accent-line"></div>

  <div class="content">
    <!-- Your actual KODEX logo SVG -->
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="width:110px;height:110px;">
        <rect x="0" y="0" width="128" height="128" rx="28" fill="#3730a3"/>
        <rect x="6" y="6" width="116" height="116" rx="22" fill="#4f46e5"/>
        <rect x="30" y="28" width="17" height="80" rx="4" fill="#ffffff"/>
        <polygon points="47,68 90,28 108,28 66,68" fill="#ffffff"/>
        <polygon points="47,68 90,108 108,108 66,68" fill="#ffffff"/>
        <circle cx="108" cy="12" r="6" fill="#818cf8"/>
        <circle cx="120" cy="12" r="4" fill="#c7d2fe"/>
        <circle cx="130" cy="12" r="2.5" fill="#e0e7ff"/>
      </svg>
    </div>

    <div class="divider"></div>

    <div class="text-block">
      <div class="brand">KODEX</div>
      <div class="tagline">Smart Attendance &amp; Learning<br>Management Platform</div>
      <div class="pills">
        <span class="pill pill-blue">QR &amp; BLE Attendance</span>
        <span class="pill pill-indigo">Quiz Management</span>
        <span class="pill pill-blue">Multi-company</span>
        <span class="pill pill-indigo">Analytics</span>
      </div>
    </div>
  </div>

  <div class="domain">kodex.it.com</div>
</div>
</body>
</html>
