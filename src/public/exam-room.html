<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exam — Dikly</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080b12;--surface:#0f1420;--card:#151c2e;--border:rgba(255,255,255,.07);
      --accent:#4f6ef7;--green:#10b981;--danger:#ef4444;--warning:#f59e0b;
      --text:#f1f5f9;--muted:#64748b;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif}

    /* ── LAYOUT ── */
    #examLayout{height:100vh;display:flex;flex-direction:column}

    /* ── TOP BAR ── */
    #examBar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:9px 16px;background:rgba(8,11,18,.97);
      border-bottom:1px solid var(--border);z-index:10}
    .bar-left{display:flex;align-items:center;gap:10px}
    .bar-logo{width:28px;height:28px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),#7c3aed);
      display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff}
    .bar-title{font-size:13px;font-weight:700}
    .ai-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
      color:#f87171;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
    .ai-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;
      animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .bar-right{display:flex;align-items:center;gap:10px}
    .timer-display{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
    .timer-display.urgent{color:var(--danger)}
    .risk-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
      font-size:11px;font-weight:700;background:rgba(16,185,129,.1);
      border:1px solid rgba(16,185,129,.2);color:#34d399;transition:all .3s}
    .risk-chip.medium{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2);color:#fcd34d}
    .risk-chip.high{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#f87171}
    .violation-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
      font-size:11px;font-weight:700;background:rgba(16,185,129,.1);
      border:1px solid rgba(16,185,129,.2);color:#34d399;transition:all .3s}
    .violation-badge.warn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2);color:#fcd34d}
    .violation-badge.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#f87171}
    @keyframes badgeBump{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
    .violation-badge.bump{animation:badgeBump .3s ease-out}

    /* ── EXAM CONTENT ── */
    #examContent{flex:1;overflow:hidden;position:relative;user-select:none;-webkit-user-select:none}
    #examFrame{width:100%;height:100%;border:none;background:var(--bg)}
    #examPlaceholder{width:100%;height:100%;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;color:var(--muted)}
    #examPlaceholder .ph-icon{font-size:48px}
    #examPlaceholder .ph-msg{font-size:14px}

    /* ── CAMERA PiP ── */
    #cameraPip{position:fixed;bottom:22px;right:20px;width:160px;height:120px;
      border-radius:14px;overflow:hidden;border:2px solid rgba(79,110,247,.4);
      background:#0f1420;z-index:50;box-shadow:0 8px 28px rgba(0,0,0,.6);
      transition:border-color .3s}
    #cameraPip.alert{border-color:var(--danger);animation:pipPulse .8s ease-in-out infinite alternate}
    @keyframes pipPulse{from{box-shadow:0 0 0 0 rgba(239,68,68,.5)}to{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
    #pipVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
    .pip-label{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;
      background:linear-gradient(transparent,rgba(0,0,0,.7));
      text-align:center;font-size:9px;font-weight:700;
      color:rgba(255,255,255,.6);letter-spacing:.5px;text-transform:uppercase}
    .pip-status{position:absolute;top:6px;right:6px;width:8px;height:8px;
      border-radius:50%;background:var(--green);box-shadow:0 0 0 2px rgba(0,0,0,.4)}
    .pip-status.alert{background:var(--danger)}

    /* ── VIOLATION OVERLAY ── */
    #violationOverlay{position:fixed;inset:0;z-index:200;background:rgba(5,6,10,.93);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      padding:32px;gap:20px;border:3px solid rgba(239,68,68,.5)}
    #violationOverlay.show{display:flex}
    @keyframes borderFlash{0%,100%{border-color:rgba(239,68,68,.6)}50%{border-color:rgba(239,68,68,.1)}}
    #violationOverlay.show{animation:borderFlash .6s ease-in-out infinite}
    .ov-icon{font-size:64px;line-height:1}
    .ov-title{font-size:24px;font-weight:800;color:#f87171;letter-spacing:-.3px;text-align:center}
    .ov-msg{font-size:14px;color:#94a3b8;text-align:center;max-width:380px;line-height:1.6}
    .ov-count{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px}
    .ov-bar{width:200px;height:4px;background:rgba(239,68,68,.15);border-radius:2px;overflow:hidden}
    .ov-bar-fill{height:100%;background:var(--danger);border-radius:2px;transition:width .1s linear}
    .ov-dismiss{padding:11px 28px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
      border-radius:12px;color:#f87171;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
      transition:background .2s}
    .ov-dismiss:hover{background:rgba(239,68,68,.2)}

    /* ── SUBMIT BAR ── */
    #submitArea{flex-shrink:0;padding:10px 16px;background:rgba(8,11,18,.97);
      border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;align-items:center}
    #submitInfo{font-size:12px;color:var(--muted)}
    .btn-submit{padding:11px 24px;background:var(--accent);border:none;border-radius:12px;
      color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
      transition:transform .1s,opacity .1s}
    .btn-submit:active{transform:scale(.97)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
  </style>
</head>
<body>
<div id="examLayout">
  <div id="examBar">
    <div class="bar-left">
      <div class="bar-logo">D</div>
      <div class="bar-title" id="barTitle">Exam</div>
      <div class="ai-pill"><span class="ai-dot"></span>AI Monitoring</div>
    </div>
    <div class="bar-right">
      <div class="violation-badge" id="violationBadge">⚠ 0 violations</div>
      <div class="risk-chip" id="riskChip">✓ Integrity OK</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
    </div>
  </div>

  <div id="examContent">
    <div id="examPlaceholder">
      <div class="ph-icon">📋</div>
      <div class="ph-msg">Exam content loads here</div>
    </div>
  </div>

  <div id="submitArea">
    <span id="submitInfo">AI monitoring active</span>
    <button class="btn-submit" id="submitBtn" onclick="submitExam()">Submit Exam</button>
  </div>
</div>

<!-- Camera PiP -->
<div id="cameraPip">
  <video id="pipVideo" autoplay playsinline muted></video>
  <div class="pip-status" id="pipStatus"></div>
  <div class="pip-label">AI cam</div>
</div>

<!-- Violation Overlay -->
<div id="violationOverlay">
  <div class="ov-icon" id="ovIcon">🚨</div>
  <div class="ov-title" id="ovTitle">Violation Detected</div>
  <div class="ov-msg" id="ovMsg">This action has been logged and reported to your examiner.</div>
  <div class="ov-count" id="ovCount">Total violations: 0</div>
  <div class="ov-bar"><div class="ov-bar-fill" id="ovBarFill" style="width:100%"></div></div>
  <button class="ov-dismiss" id="ovDismiss" onclick="dismissOverlay()">I understand — Continue Exam</button>
</div>

<script>
'use strict';
const _p       = new URLSearchParams(location.search);
const meetingId= _p.get('meetingId') || '';
const token    = _p.get('token')     || '';
const userId   = _p.get('userId')    || '';
const userName = _p.get('userName')  || 'Student';

const API = location.origin + '/api';
let sessionId     = null;
let riskScore     = 0;
let violationCount= 0;
let camStream     = null;
let snapInterval  = null;
let timerInt      = null;
let elapsed       = 0;
let submitting    = false;
let overlayTimer  = null;
let _devToolsFlag = false;

// ── Anti-cheat: keyboard blocking ────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  const ctrl = e.ctrlKey || e.metaKey;
  const shift = e.shiftKey;
  const key = e.key;

  // DevTools shortcuts
  if (key === 'F12') { e.preventDefault(); e.stopPropagation(); logViolation('devtools_shortcut', { key: 'F12' }); return; }
  if (ctrl && shift && ['I','J','C','K','E','M'].includes(key.toUpperCase())) {
    e.preventDefault(); e.stopPropagation(); logViolation('devtools_shortcut', { key: 'Ctrl+Shift+' + key.toUpperCase() }); return;
  }
  // View source / print / save
  if (ctrl && key.toUpperCase() === 'U') { e.preventDefault(); e.stopPropagation(); logViolation('view_source_attempt', {}); return; }
  if (ctrl && key.toUpperCase() === 'P') { e.preventDefault(); e.stopPropagation(); logViolation('print_attempt', {}); return; }
  if (ctrl && key.toUpperCase() === 'S') { e.preventDefault(); e.stopPropagation(); return; }
  // Screenshot
  if (key === 'PrintScreen') { e.preventDefault(); e.stopPropagation(); logViolation('screenshot_key', {}); return; }
  // Copy / cut — blocked on exam content area
  if (ctrl && (key.toUpperCase() === 'C' || key.toUpperCase() === 'X') && !e.target.closest('input, textarea')) {
    e.preventDefault(); e.stopPropagation(); logViolation('copy_attempt', {}); return;
  }
}, true);

// Anti-cheat: right-click, copy, cut, paste
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  logViolation('right_click', {});
}, true);
document.addEventListener('copy', function(e) {
  if (e.target.closest('input, textarea')) return;
  e.preventDefault();
  logViolation('copy_attempt', {});
}, true);
document.addEventListener('cut', function(e) {
  if (e.target.closest('input, textarea')) return;
  e.preventDefault();
  logViolation('cut_attempt', {});
}, true);
document.addEventListener('paste', function(e) {
  e.preventDefault();
  logViolation('paste_attempt', {});
}, true);

// Anti-cheat: window blur (alt-tab, switching apps)
window.addEventListener('blur', function() {
  logViolation('window_blur', { message: 'Application focus lost — possible window switch' });
});

// Anti-cheat: DevTools detection via window size delta
setInterval(function() {
  const wDiff = window.outerWidth - window.innerWidth;
  const hDiff = window.outerHeight - window.innerHeight;
  const open = wDiff > 200 || hDiff > 200;
  if (open && !_devToolsFlag) {
    _devToolsFlag = true;
    logViolation('devtools_open', { widthDelta: wDiff, heightDelta: hDiff });
  } else if (!open) {
    _devToolsFlag = false;
  }
}, 2000);

// Anti-cheat: prevent drag-and-drop (data exfiltration)
document.addEventListener('dragstart', function(e) { e.preventDefault(); }, true);
document.addEventListener('drop', function(e) { e.preventDefault(); }, true);

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!meetingId || !token) { alert('Missing exam parameters.'); history.back(); return; }

  try {
    const r = await apiFetch('/exam/sessions', 'POST', { meetingId });
    sessionId = r.data.sessionId;
  } catch (e) { alert('Could not start exam: ' + e.message); return; }

  // Camera
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 }, audio: false
    });
    document.getElementById('pipVideo').srcObject = camStream;
    document.getElementById('pipStatus').className = 'pip-status';
  } catch (e) {
    showOverlay('📷', 'Camera Access Lost', 'Camera is required for this proctored exam. Please allow camera access.', false);
  }

  // Fullscreen — enforce immediately with no delay
  enforceFullscreen();
  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  document.addEventListener('visibilitychange', onVisibilityChange);

  window.addEventListener('pagehide', function() {
    if (sessionId && !submitting) {
      navigator.sendBeacon(`${API}/exam/sessions/${sessionId}/end`,
        new Blob([JSON.stringify({})], { type: 'application/json' }));
    }
  });

  startTimer();
  scheduleSnapshot();
}

// ── Fullscreen enforcement ────────────────────────────────────────────────────
function enforceFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (document.documentElement.requestFullscreen ||
     document.documentElement.webkitRequestFullscreen)?.call(document.documentElement).catch(() => {});
  }
}

function onFullscreenChange() {
  const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  if (!inFs) {
    submitEvent('fullscreen_exit', { message: 'Fullscreen exited' });
    showOverlay('⛶', 'Fullscreen Exit Detected',
      'You exited fullscreen. This has been logged. Returning to fullscreen now…', true);
    // Re-enforce immediately (user gesture needed; we try right away)
    enforceFullscreen();
  }
}

function onVisibilityChange() {
  if (document.hidden) {
    submitEvent('tab_switch', { message: 'Tab hidden or switched' });
    showOverlay('👁', 'Tab Switch Detected',
      'Switching tabs or windows is not permitted and has been reported to your examiner.', true);
  }
}

// ── Violation overlay ─────────────────────────────────────────────────────────
function showOverlay(icon, title, msg, autoDismiss) {
  clearTimeout(overlayTimer);
  const pip = document.getElementById('cameraPip');
  pip.classList.add('alert');
  document.getElementById('pipStatus').className = 'pip-status alert';

  document.getElementById('ovIcon').textContent = icon;
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovMsg').textContent = msg;
  document.getElementById('ovCount').textContent = 'Total violations: ' + violationCount;

  const fill = document.getElementById('ovBarFill');
  fill.style.transition = 'none';
  fill.style.width = '100%';

  const ov = document.getElementById('violationOverlay');
  ov.classList.add('show');

  if (autoDismiss) {
    let pct = 100;
    const step = 100 / 70; // 7 seconds at 100ms intervals
    overlayTimer = setInterval(function() {
      pct -= step;
      fill.style.transition = 'width .1s linear';
      fill.style.width = Math.max(0, pct) + '%';
      if (pct <= 0) {
        clearInterval(overlayTimer);
        dismissOverlay();
      }
    }, 100);
  } else {
    document.getElementById('ovDismiss').textContent = 'Acknowledge';
  }
}

function dismissOverlay() {
  clearInterval(overlayTimer);
  document.getElementById('violationOverlay').classList.remove('show');
  document.getElementById('cameraPip').classList.remove('alert');
  document.getElementById('pipStatus').className = 'pip-status';
  document.getElementById('ovDismiss').textContent = 'I understand — Continue Exam';
  enforceFullscreen();
}

// ── Violation counter + logging ───────────────────────────────────────────────
async function logViolation(type, metadata) {
  violationCount++;
  const badge = document.getElementById('violationBadge');
  badge.textContent = '⚠ ' + violationCount + (violationCount === 1 ? ' violation' : ' violations');
  badge.className = 'violation-badge' + (violationCount >= 5 ? ' danger' : violationCount >= 2 ? ' warn' : '');
  // Bump animation
  badge.classList.remove('bump');
  void badge.offsetWidth;
  badge.classList.add('bump');
  await submitEvent(type, metadata);
}

// ── Snapshot capture (every 10–15 s) ─────────────────────────────────────────
function scheduleSnapshot() {
  const delay = 10000 + Math.random() * 5000;
  snapInterval = setTimeout(async function() {
    await captureAndSubmit();
    scheduleSnapshot();
  }, delay);
}

async function captureAndSubmit() {
  if (!camStream || !sessionId) return;
  const track = camStream.getVideoTracks()[0];
  if (!track || track.readyState !== 'live') return;

  if (typeof ImageCapture !== 'undefined') {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = 320; canvas.height = 240;
      const ctx = canvas.getContext('2d');
      const ic = new ImageCapture(track);
      const bm = await ic.grabFrame();
      ctx.drawImage(bm, 0, 0, 320, 240);
      bm.close();
      const imageData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
      const result = await apiFetch(`/exam/sessions/${sessionId}/snapshot`, 'POST', { imageData });
      updateRisk(result.data.riskScore, result.data.newViolations || []);
      return;
    } catch (_) {}
  }
  try {
    const video = document.getElementById('pipVideo');
    if (!video || video.readyState < 2) return;
    const canvas = document.createElement('canvas');
    canvas.width = 320; canvas.height = 240;
    canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
    const imageData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
    const result = await apiFetch(`/exam/sessions/${sessionId}/snapshot`, 'POST', { imageData });
    updateRisk(result.data.riskScore, result.data.newViolations || []);
  } catch (_) {}
}

// ── Event logging ─────────────────────────────────────────────────────────────
async function submitEvent(type, metadata) {
  if (!sessionId) return;
  try {
    const result = await apiFetch(`/exam/sessions/${sessionId}/event`, 'POST', { type, metadata });
    updateRisk(result.data.riskScore, []);
  } catch (_) {}
}

// ── Risk display ──────────────────────────────────────────────────────────────
function updateRisk(score, violations) {
  riskScore = score;
  const chip = document.getElementById('riskChip');
  if (score < 20) {
    chip.className = 'risk-chip'; chip.textContent = '✓ Integrity OK';
  } else if (score < 50) {
    chip.className = 'risk-chip medium'; chip.textContent = '⚠ Risk ' + score;
  } else {
    chip.className = 'risk-chip high'; chip.textContent = '🚨 Risk ' + score;
  }
  for (const v of violations) {
    if (v.severity !== 'info') {
      showOverlay('⚠️', 'AI Flag: ' + (v.type || 'Anomaly Detected'),
        v.message || v.type.replace(/_/g,' '), true);
    }
  }
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  timerInt = setInterval(function() {
    elapsed++;
    const m = Math.floor(elapsed/60), s = elapsed%60;
    document.getElementById('timerDisplay').textContent =
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

// ── Submit exam ───────────────────────────────────────────────────────────────
async function submitExam() {
  if (submitting || !sessionId) return;
  if (!confirm('Submit your exam? This cannot be undone.')) return;
  submitting = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitting…';
  clearTimeout(snapInterval);
  clearInterval(timerInt);

  try { await (document.exitFullscreen || document.webkitExitFullscreen)?.call(document); } catch(_) {}
  camStream?.getTracks().forEach(t => t.stop());

  try {
    const result = await apiFetch(`/exam/sessions/${sessionId}/end`, 'POST', {});
    const report = result.data?.report;
    const score  = report?.integrityScore ?? Math.max(0, 100 - riskScore);
    const summary = `Exam submitted.\n\nIntegrity Score: ${score}/100\nViolations logged: ${violationCount}${report?.summary ? '\n\n' + report.summary : ''}`;
    alert(summary);
  } catch (e) {
    alert('Exam submitted. ' + e.message);
  }

  history.back();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function apiFetch(path, method, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) {
    if (r.status === 402 && data.subscriptionExpired) { _subBlock(data.message, data.isAdmin); }
    throw new Error(data.error || data.message || 'HTTP ' + r.status);
  }
  return data;
}

function _subBlock(msg, isAdmin) {
  if (document.getElementById('_sub-bl')) return;
  const d = document.createElement('div');
  d.id = '_sub-bl';
  d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.97);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box';
  d.innerHTML = `<div style="background:#fff;border-radius:16px;max-width:440px;width:100%;padding:36px 28px;text-align:center"><div style="font-size:40px;margin-bottom:16px">🔒</div><h2 style="margin:0 0 12px;font-size:20px;color:#0f172a">Subscription Expired</h2><p style="margin:0 0 24px;font-size:14px;color:#475569;line-height:1.6">${msg||"Your institution's subscription has expired."}</p>${isAdmin?`<button onclick="location.href='/'" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;width:100%">Go to Subscription Page</button>`:'<div style="background:#f8fafc;border-radius:8px;padding:14px;font-size:13px;color:#64748b">Contact your <strong>institution administrator</strong> to renew.</div>'}<p style="margin:16px 0 0;font-size:12px;color:#94a3b8">Support: <strong>support@dikly.sbs</strong></p></div>`;
  document.body.appendChild(d);
  document.body.style.overflow = 'hidden';
}

init();
</script>
</body>
</html>
