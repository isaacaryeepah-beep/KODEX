<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <title>DIKLY — Platform Admin</title>
  <link rel="icon" type="image/svg+xml" href="/dikly-icon.svg">
  <link rel="manifest" href="/manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#0d1117;min-height:100vh;color:#111}

    /* ── Login ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .brand h1{font-size:20px;font-weight:800;color:#0d1117}
    .brand p{font-size:12px;color:#6b7280;margin-top:2px}
    .login-badge{display:inline-flex;align-items:center;gap:5px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-bottom:24px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:6px}
    input[type=email],input[type=password],input[type=text],input[type=number],input[type=date],textarea,select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:14px;outline:none;font-family:inherit}
    input:focus,textarea:focus,select:focus{border-color:#374151}
    .btn-login{width:100%;padding:13px;background:#0d1117;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
    .btn-login:hover{background:#1f2937}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .err{display:none;margin-top:12px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:13px}
    .back-link{text-align:center;margin-top:20px;font-size:12px;color:#6b7280}
    .back-link a{color:#6b7280;text-decoration:none}

    /* ── Dashboard shell ── */
    #dashboard{display:none;min-height:100vh;flex-direction:row}

    /* ── Sidebar ── */
    #sa-sidebar{width:224px;background:#0f1117;display:flex;flex-direction:column;flex-shrink:0;z-index:50;border-right:1px solid rgba(255,255,255,.06)}
    .sa-logo{padding:20px 16px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;flex-shrink:0}
    .sa-logo-icon{width:32px;height:32px;border-radius:9px;background:#4f46e5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sa-logo-name{font-size:14px;font-weight:800;color:#fff;line-height:1.1}
    .sa-logo-sub{font-size:10px;color:#64748b;margin-top:1px}
    .sa-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    .sa-nav-section{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#334155;padding:12px 8px 5px;margin-top:4px}
    .sa-nav-section:first-child{margin-top:0}
    .sa-nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s}
    .sa-nav-btn:hover{background:rgba(255,255,255,.06);color:#cbd5e1}
    .sa-nav-btn.active{background:rgba(99,102,241,.18);color:#fff}
    .sa-nav-btn.active .sa-nav-icon{color:#818cf8}
    .sa-nav-icon{flex-shrink:0;color:#475569;width:16px;text-align:center}
    .sa-sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
    .sa-user-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .sa-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
    .sa-user-name{font-size:12px;font-weight:600;color:#e2e8f0;flex:1;min-width:0;truncate:true;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sa-sign-out{width:100%;padding:7px;font-size:12px;font-weight:600;color:#64748b;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:7px;cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
    .sa-sign-out:hover{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.25)}

    /* Mobile sidebar overlay */
    #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49}

    /* ── Main area ── */
    #sa-main{flex:1;display:flex;flex-direction:column;min-width:0;background:#f1f5f9}

    /* ── Page topbar ── */
    .sa-topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 22px;height:60px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .sa-topbar-menu{display:none;background:none;border:none;cursor:pointer;padding:5px;color:#374151;border-radius:6px;flex-shrink:0}
    .sa-topbar-title{flex:1;min-width:0}
    .sa-topbar-title h2{font-size:15px;font-weight:700;color:#0f172a;line-height:1.2}
    .sa-topbar-title p{font-size:11px;color:#94a3b8;margin-top:1px}
    .sa-topbar-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}
    .sa-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#374151;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .12s,border-color .12s}
    .sa-btn:hover{background:#f8fafc;border-color:#cbd5e1}
    .sa-btn.primary{background:#4f46e5;color:#fff;border-color:#4f46e5}
    .sa-btn.primary:hover{background:#4338ca;border-color:#4338ca}

    /* ── Page body ── */
    .sa-page{padding:22px;overflow-y:auto;flex:1}

    /* ── Stat row ── */
    .sa-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
    .sa-stat{background:#fff;border-radius:12px;padding:16px 16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8ecf0}
    .sa-stat-icon{font-size:18px;margin-bottom:8px;line-height:1}
    .sa-stat-val{font-size:22px;font-weight:800;color:#0f172a;line-height:1}
    .sa-stat-lbl{font-size:10.5px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
    .sa-stat.accent-green .sa-stat-val{color:#059669}
    .sa-stat.accent-amber .sa-stat-val{color:#d97706}
    .sa-stat.accent-red   .sa-stat-val{color:#dc2626}
    .sa-stat.accent-blue  .sa-stat-val{color:#2563eb}
    .sa-stat.accent-purple.sa-stat-val{color:#7c3aed}

    /* ── Table card ── */
    .sa-table-card{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #e8ecf0;overflow:hidden;margin-bottom:20px}
    .sa-table-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid #f1f5f9}
    .sa-table-head h3{font-size:14px;font-weight:700;color:#0f172a}
    .sa-table-head .sa-count{font-size:12px;color:#94a3b8;background:#f1f5f9;padding:2px 9px;border-radius:20px;font-weight:600}
    .sa-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 18px;border-bottom:1px solid #f1f5f9}
    .sa-filters input,.sa-filters select{padding:7px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;font-family:inherit;outline:none;color:#374151}
    .sa-filters input:focus,.sa-filters select:focus{border-color:#a5b4fc}
    .sa-filters input.sa-search{min-width:220px;flex:1}
    .sa-table-wrap{overflow-x:auto}
    table.sa-tbl{width:100%;border-collapse:collapse;font-size:13px}
    table.sa-tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;border-bottom:1px solid #f1f5f9;white-space:nowrap;background:#fafafa}
    table.sa-tbl td{padding:11px 14px;border-bottom:1px solid #f8fafc;vertical-align:middle}
    table.sa-tbl tr:last-child td{border-bottom:none}
    table.sa-tbl tbody tr:hover{background:#fafbfc}
    .sa-tbl-name{font-weight:700;color:#0f172a;font-size:13px;line-height:1.3}
    .sa-tbl-sub{font-size:11px;color:#94a3b8;margin-top:1px;font-family:monospace}
    .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
    .tag-green{background:#dcfce7;color:#166534}
    .tag-red{background:#fee2e2;color:#991b1b}
    .tag-blue{background:#dbeafe;color:#1e40af}
    .tag-amber{background:#fef3c7;color:#92400e}
    .tag-gray{background:#f1f5f9;color:#475569}
    .tag-indigo{background:#eef2ff;color:#4338ca}
    .tag-violet{background:#f5f3ff;color:#6d28d9}
    .trial-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:3px}
    .trial-bar-track{flex:1;height:4px;background:#e2e8f0;border-radius:999px;overflow:hidden;min-width:50px}
    .trial-bar-fill{height:100%;border-radius:999px}

    /* ── Row action buttons ── */
    .row-acts{display:flex;align-items:center;gap:3px;flex-wrap:nowrap}
    .ra{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-size:13px;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;transition:background .1s,border-color .1s;flex-shrink:0;font-family:inherit}
    .ra:hover{background:#f1f5f9;border-color:#cbd5e1}
    .ra.danger{border-color:#fecaca}
    .ra.danger:hover{background:#fef2f2;border-color:#fca5a5}
    .ra.pay{border-color:#c7d2fe}
    .ra.pay:hover{background:#eef2ff;border-color:#a5b4fc}
    .ra.success{border-color:#bbf7d0}
    .ra.success:hover{background:#f0fdf4;border-color:#86efac}

    /* ── Empty / loading ── */
    .sa-empty{padding:52px;text-align:center;color:#94a3b8;font-size:14px}
    .sa-loading{padding:44px;text-align:center;color:#94a3b8;font-size:14px}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:540px;box-shadow:0 24px 64px rgba(0,0,0,.3);margin:auto}
    .modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:#0f172a}
    .modal-field{margin-bottom:14px}
    .modal-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;display:block;margin-bottom:5px}
    .modal-field input,.modal-field textarea,.modal-field select{margin-bottom:0;padding:10px 14px}
    .modal-field textarea{min-height:110px;resize:vertical}
    .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
    .btn-primary{padding:10px 22px;background:#4f46e5;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .btn-primary:hover{background:#4338ca}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-cancel{padding:10px 18px;background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-cancel:hover{background:#f8fafc}
    .modal-status{margin-top:10px;font-size:13px;font-weight:500;text-align:center}
    .status-ok{color:#16a34a}
    .status-err{color:#dc2626}

    /* ── Detail panel ── */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .detail-item label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;display:block;margin-bottom:3px}
    .detail-item span{font-size:14px;color:#0d1117;font-weight:500}
    .detail-divider{border:none;border-top:1px solid #e2e8f0;margin:14px 0}
    .notes-area{width:100%;min-height:80px;resize:vertical;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;color:#374151}
    .notes-area:focus{outline:none;border-color:#a5b4fc}
    .pay-amount{font-weight:700;color:#16a34a}
    .pay-plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
    .pay-plan-btn{padding:10px 6px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;background:#f9fafb;font-family:inherit;transition:all .12s;text-align:center;line-height:1.3}
    .pay-plan-btn:hover{border-color:#a5b4fc;background:#eef2ff}
    .pay-plan-btn.selected{border-color:#4f46e5;background:#eef2ff;color:#4f46e5;box-shadow:0 0 0 2px #c7d2fe}
    .pay-amount-display{font-size:26px;font-weight:800;color:#4f46e5;text-align:center;padding:8px 0 4px}

    /* ── Responsive ── */
    @media (max-width:768px) {
      #sa-sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .22s ease-in-out}
      #sa-sidebar.open{transform:translateX(0)}
      #sidebar-overlay.show{display:block}
      .sa-topbar-menu{display:flex}
      .sa-page{padding:14px}
      .sa-stats{grid-template-columns:repeat(3,1fr);gap:8px}
      .sa-stat{padding:12px}
      .sa-stat-val{font-size:18px}
      .sa-filters input.sa-search{min-width:140px}
      table.sa-tbl td:nth-child(6),table.sa-tbl th:nth-child(6){display:none}
      .modal-overlay{padding:0;align-items:flex-end}
      .modal{border-radius:20px 20px 0 0;max-width:100%!important;max-height:90vh;overflow-y:auto;padding:22px 16px}
    }
    @media (max-width:480px) {
      .sa-stats{grid-template-columns:repeat(2,1fr)}
      table.sa-tbl td:nth-child(5),table.sa-tbl th:nth-child(5){display:none}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="card">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="width:44px;height:44px;border-radius:12px;flex-shrink:0">
        <rect x="0" y="0" width="128" height="128" rx="28" fill="#3730a3"/>
        <rect x="6" y="6" width="116" height="116" rx="22" fill="#4f46e5"/>
        <rect x="30" y="28" width="17" height="72" rx="4" fill="#ffffff"/>
        <polygon points="47,64 90,28 108,28 66,64" fill="#ffffff"/>
        <polygon points="47,64 90,100 108,100 66,64" fill="#ffffff"/>
        <circle cx="108" cy="16" r="6" fill="#818cf8"/>
        <circle cx="120" cy="16" r="4" fill="#c7d2fe"/>
      </svg>
      <div><h1>DIKLY</h1><p>Platform Administration</p></div>
    </div>
    <div class="login-badge">🔒 SUPERADMIN ACCESS</div>
    <form onsubmit="doLogin(event)">
      <label for="em">Email</label>
      <input type="email" id="em" placeholder="Enter your email" required style="margin-bottom:14px">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Enter password" required style="margin-bottom:0">
      <button class="btn-login" id="login-btn" type="submit">Sign In</button>
    </form>
    <div class="err" id="err"></div>
    <div class="back-link"><a href="/">← Back to DIKLY</a></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- Sidebar -->
  <aside id="sa-sidebar">
    <div class="sa-logo">
      <div class="sa-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="width:20px;height:20px">
          <rect x="30" y="28" width="17" height="72" rx="4" fill="#fff"/>
          <polygon points="47,64 90,28 108,28 66,64" fill="#fff"/>
          <polygon points="47,64 90,100 108,100 66,64" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="sa-logo-name">DIKLY</div>
        <div class="sa-logo-sub">Platform Admin</div>
      </div>
    </div>

    <nav class="sa-nav">
      <div class="sa-nav-section">Platform</div>
      <button class="sa-nav-btn active" id="nav-institutions" onclick="switchTab('institutions',this)">
        <span class="sa-nav-icon">🏫</span> Institutions
      </button>
      <button class="sa-nav-btn" id="nav-payments" onclick="switchTab('payments',this)">
        <span class="sa-nav-icon">💳</span> Payments
      </button>
      <button class="sa-nav-btn" id="nav-devices" onclick="switchTab('devices',this)">
        <span class="sa-nav-icon">📟</span> Devices
      </button>
    </nav>

    <div class="sa-sidebar-footer">
      <div class="sa-user-row">
        <div class="sa-avatar" id="sidebar-avatar"></div>
        <span class="sa-user-name" id="sidebar-name"></span>
        <span style="background:rgba(99,102,241,.25);color:#a5b4fc;border:1px solid rgba(99,102,241,.35);border-radius:20px;padding:1px 7px;font-size:9px;font-weight:800;letter-spacing:.5px;flex-shrink:0">SA</span>
      </div>
      <button class="sa-sign-out" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div id="sa-main">
    <!-- Topbar -->
    <div class="sa-topbar">
      <button class="sa-topbar-menu" onclick="openSidebar()" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="sa-topbar-title">
        <h2 id="page-title">Institutions</h2>
        <p id="page-desc">All registered institutions and companies</p>
      </div>
      <div class="sa-topbar-actions">
        <button class="sa-btn" onclick="exportCSV()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="sa-btn" onclick="refreshCurrentTab()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="sa-page">
      <div id="tab-institutions"><div class="sa-loading">Loading…</div></div>
      <div id="tab-payments" style="display:none"><div class="sa-loading">Loading…</div></div>
      <div id="tab-devices" style="display:none"><div class="sa-loading">Loading…</div></div>
    </div>
  </div>

</div>

<!-- ── EMAIL MODAL ── -->
<div class="modal-overlay" id="email-modal">
  <div class="modal">
    <h3>✉️ Email Institution Admin</h3>
    <div class="modal-field">
      <label>To</label>
      <input type="text" id="email-to-display" readonly style="background:#f8fafc;color:#64748b">
    </div>
    <div class="modal-field">
      <label>Subject</label>
      <input type="text" id="email-subject" placeholder="e.g. Your trial is expiring soon">
    </div>
    <div class="modal-field">
      <label>Message</label>
      <textarea id="email-body" placeholder="Type your message…"></textarea>
    </div>
    <div class="modal-status" id="email-status"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('email-modal')">Cancel</button>
      <button class="btn-primary" id="email-send-btn" onclick="sendEmail()">Send Email</button>
    </div>
  </div>
</div>

<!-- ── DETAIL MODAL ── -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:620px">
    <h3 id="detail-title">Institution Details</h3>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('detail-modal')">Close</button>
    </div>
  </div>
</div>

<!-- ── NOTES MODAL ── -->
<div class="modal-overlay" id="notes-modal">
  <div class="modal" style="max-width:460px">
    <h3>📝 Notes</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:12px" id="notes-company-name"></p>
    <textarea class="notes-area" id="notes-text" placeholder="Add private notes about this institution…"></textarea>
    <div class="modal-status" id="notes-status"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('notes-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>

<!-- ── PAYMENT ADJUSTER MODAL ── -->
<div class="modal-overlay" id="pay-modal">
  <div class="modal" style="max-width:460px">
    <h3>💰 Record Payment</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:14px" id="pay-modal-company"></p>
    <div class="pay-plan-grid" id="pay-plan-grid">
      <button class="pay-plan-btn selected" data-plan="semester" data-amount="300" onclick="selectPayPlan(this)">📚 Semester<br><span style="font-size:11px;color:#6b7280;font-weight:500">16 weeks</span></button>
      <button class="pay-plan-btn" data-plan="monthly" data-amount="150" onclick="selectPayPlan(this)">📅 Monthly<br><span style="font-size:11px;color:#6b7280;font-weight:500">30 days</span></button>
      <button class="pay-plan-btn" data-plan="yearly" data-amount="1200" onclick="selectPayPlan(this)">🏆 Annual<br><span style="font-size:11px;color:#6b7280;font-weight:500">365 days</span></button>
    </div>
    <div class="pay-amount-display" id="pay-amount-display">GHS 300</div>
    <div class="modal-field">
      <label>Amount (GHS)</label>
      <input type="number" id="pay-amount" value="300" min="1" step="0.01" oninput="document.getElementById('pay-amount-display').textContent='GHS '+this.value">
    </div>
    <div class="modal-field">
      <label>Reference <span style="font-size:10px;font-weight:500;color:#94a3b8">(leave blank to auto-generate)</span></label>
      <input type="text" id="pay-reference" placeholder="e.g. PAY-2026-001">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px">
      <input type="checkbox" id="pay-activate" checked style="width:auto;padding:0;border:none;accent-color:#4f46e5">
      <label for="pay-activate" style="font-size:13px;font-weight:500;color:#374151;margin:0;text-transform:none;letter-spacing:0">Activate / extend subscription after recording</label>
    </div>
    <div class="modal-status" id="pay-status"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('pay-modal')">Cancel</button>
      <button class="btn-primary" id="pay-btn" onclick="submitPayment()" style="background:#4f46e5">💰 Record Payment</button>
    </div>
  </div>
</div>

<script>
let SA_TOKEN = localStorage.getItem('sa_token') || '';
let allCompanies = [];
let currentEmailId = '';
let currentNotesId = '';
let currentPayId   = '';
let currentTab     = 'institutions';

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/superadmin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('em').value.trim(), password: document.getElementById('pw').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    SA_TOKEN = d.token;
    localStorage.setItem('sa_token', SA_TOKEN);
    setUserDisplay(d.user.name || d.user.email || 'SA');
    showDashboard();
  } catch(ex) {
    errEl.textContent = ex.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function setUserDisplay(name) {
  const initial = name[0].toUpperCase();
  const avatarEl = document.getElementById('sidebar-avatar');
  const nameEl   = document.getElementById('sidebar-name');
  if (avatarEl) avatarEl.textContent = initial;
  if (nameEl)   nameEl.textContent   = name;
}

function doLogout() {
  localStorage.removeItem('sa_token'); SA_TOKEN = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function api(path, opts={}) {
  const r = await fetch(path, { ...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+SA_TOKEN,...(opts.headers||{})} });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Request failed');
  return d;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  loadInstitutions();
}

const PAGE_META = {
  institutions: { title:'Institutions', desc:'All registered academic and corporate institutions' },
  payments:     { title:'Payments',     desc:'Revenue and payment transaction history' },
  devices:      { title:'Devices',      desc:'ESP32 attendance hardware management' },
};

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.sa-nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  ['institutions','payments','devices'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  const meta = PAGE_META[tab] || {};
  document.getElementById('page-title').textContent = meta.title || tab;
  document.getElementById('page-desc').textContent  = meta.desc  || '';
  if (tab === 'payments') loadPayments();
  if (tab === 'devices')  loadDevices();
}

function refreshCurrentTab() {
  if (currentTab === 'institutions') loadInstitutions();
  else if (currentTab === 'payments') loadPayments();
  else if (currentTab === 'devices')  loadDevices();
}

// ── Mobile sidebar ─────────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sa-sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sa-sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ── Institutions Tab ──────────────────────────────────────────────────────────
async function loadInstitutions() {
  document.getElementById('tab-institutions').innerHTML = '<div class="sa-loading">Loading platform data…</div>';
  try {
    const data = await api('/api/superadmin/overview');
    allCompanies = data.companies || [];
    renderInstitutions(allCompanies, data);
  } catch(ex) {
    document.getElementById('tab-institutions').innerHTML = `<div class="sa-empty" style="color:#dc2626">Error: ${ex.message}</div>`;
  }
}

function renderInstitutions(cos, data) {
  const total   = cos.length;
  const active  = cos.filter(c=>c.isActive).length;
  const trial   = cos.filter(c=>c.isTrialActive).length;
  const expired = cos.filter(c=>!c.isTrialActive && c.subscriptionStatus!=='active').length;
  const sub     = cos.filter(c=>c.subscriptionStatus==='active').length;
  const rev     = (data && data.totalRevenue) ? data.totalRevenue : cos.reduce((s,c)=>s+(c.revenue||0),0);

  const _stat = (icon, val, lbl, cls='') =>
    `<div class="sa-stat ${cls}"><div class="sa-stat-icon">${icon}</div><div class="sa-stat-val">${val}</div><div class="sa-stat-lbl">${lbl}</div></div>`;

  document.getElementById('tab-institutions').innerHTML = `
    <div class="sa-stats">
      ${_stat('🏫', total,   'Total')}
      ${_stat('✓',  active,  'Active',   'accent-green')}
      ${_stat('⏳', trial,   'On Trial', 'accent-amber')}
      ${_stat('✕',  expired, 'Expired',  'accent-red')}
      ${_stat('💳', sub,     'Subscribed','accent-blue')}
      ${_stat('₵',  'GHS&nbsp;'+rev.toLocaleString(), 'Revenue', 'accent-green')}
    </div>
    <div class="sa-table-card">
      <div class="sa-table-head">
        <h3>All Institutions</h3>
        <span class="sa-count">${total}</span>
      </div>
      <div class="sa-filters">
        <input class="sa-search" type="text" id="search-input" placeholder="🔍 Search by name, code or admin email…" oninput="filterInstitutions()">
        <select id="filter-mode" onchange="filterInstitutions()">
          <option value="">All modes</option>
          <option value="academic">Academic</option>
          <option value="corporate">Corporate</option>
        </select>
        <select id="filter-status" onchange="filterInstitutions()">
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="trial">On Trial</option>
          <option value="subscribed">Subscribed</option>
        </select>
      </div>
      <div class="sa-table-wrap" id="institutions-table-wrap">
        ${buildInstitutionTable(cos)}
      </div>
    </div>`;
}

function buildInstitutionTable(cos) {
  if (!cos.length) return '<div class="sa-empty">No institutions found.</div>';

  const rows = cos.map(c => {
    const rc = c.roleCounts || {};
    const nameEsc  = esc(c.name).replace(/'/g,"\\'");
    const emailEsc = esc(c.adminEmail||'').replace(/'/g,"\\'");
    const notesEsc = esc(c.superadminNotes||'').replace(/'/g,"\\'");

    const isSubscribed = c.subscriptionStatus === 'active';
    const isExpired    = !c.isTrialActive && !isSubscribed;
    const daysLeft     = c.trialDaysRemaining || 0;
    const barPct       = Math.min(100,Math.max(0, isSubscribed ? 100 : (daysLeft/30)*100));
    const barColor     = isExpired ? '#dc2626' : daysLeft<=3 ? '#f59e0b' : isSubscribed ? '#4f46e5' : '#16a34a';

    const subBadge = isSubscribed
      ? '<span class="tag tag-indigo">✓ Subscribed</span>'
      : isExpired
        ? '<span class="tag tag-red">✕ Expired</span>'
        : daysLeft<=3
          ? `<span class="tag tag-amber">⚠ ${daysLeft}d</span>`
          : `<span class="tag tag-green">⏱ ${daysLeft}d</span>`;

    const expDate = c.trialEndDate ? new Date(c.trialEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}) : '—';

    const modeBadge   = `<span class="tag ${c.mode==='academic'?'tag-blue':'tag-violet'}">${c.mode==='academic'?'📚':'🏢'} ${c.mode}</span>`;
    const activeBadge = `<span class="tag ${c.isActive?'tag-green':'tag-red'}">${c.isActive?'● Active':'○ Off'}</span>`;

    const userBreakdown = c.mode==='academic'
      ? `${rc.lecturer||0}L · ${rc.student||0}S`
      : `${rc.manager||0}M · ${rc.employee||0}E`;

    const toggleBtn = c.isActive
      ? `<button class="ra danger" title="Deactivate" onclick="toggleCompany('${c._id}',true,'${nameEsc}')">⏸</button>`
      : `<button class="ra success" title="Activate"   onclick="toggleCompany('${c._id}',false,'${nameEsc}')">▶</button>`;

    return `<tr>
      <td>
        <div class="sa-tbl-name" style="cursor:pointer" onclick="showDetail('${c._id}')">${esc(c.name)}</div>
        <div class="sa-tbl-sub">${c.institutionCode||'—'}</div>
      </td>
      <td>${modeBadge}</td>
      <td>${activeBadge}</td>
      <td>
        ${subBadge}
        <div class="trial-bar-wrap">
          <div class="trial-bar-track"><div class="trial-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
          <span style="font-size:10px;color:#94a3b8;flex-shrink:0">${expDate}</span>
        </div>
      </td>
      <td>
        <span style="font-size:13px;font-weight:700;color:#0f172a">${c.userCount||0}</span>
        <div style="font-size:10.5px;color:#94a3b8;margin-top:1px">${userBreakdown}</div>
      </td>
      <td>
        <div style="font-size:12px;font-weight:600;color:#374151">${esc(c.adminName||'—')}</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:1px">${esc(c.adminEmail||'—')}</div>
      </td>
      <td>
        <div class="row-acts">
          ${toggleBtn}
          <button class="ra" title="Extend Trial"   onclick="extendTrial('${c._id}','${nameEsc}')">⏱</button>
          <button class="ra pay" title="Record Payment" onclick="openPaymentAdjuster('${c._id}','${nameEsc}','${c.mode}')">💰</button>
          <button class="ra" title="Send Email"     onclick="openEmail('${c._id}','${nameEsc}','${emailEsc}')">✉️</button>
          <button class="ra" title="Notes"          onclick="openNotes('${c._id}','${nameEsc}','${notesEsc}')">📝</button>
          <button class="ra" title="Access as Admin" onclick="impersonate('${c._id}','${nameEsc}')">🔑</button>
          <button class="ra danger" title="Delete"  onclick="deleteInstitution('${c._id}','${nameEsc}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `<table class="sa-tbl">
    <thead><tr>
      <th>Institution</th>
      <th>Mode</th>
      <th>Status</th>
      <th>Subscription</th>
      <th>Users</th>
      <th>Admin</th>
      <th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function filterInstitutions() {
  const q      = (document.getElementById('search-input')?.value || '').toLowerCase();
  const mode   = document.getElementById('filter-mode')?.value || '';
  const status = document.getElementById('filter-status')?.value || '';
  const filtered = allCompanies.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.institutionCode||'').toLowerCase().includes(q) || (c.adminEmail||'').toLowerCase().includes(q);
    const matchMode = !mode || c.mode === mode;
    const matchStatus = !status ||
      (status==='active'     && c.isActive) ||
      (status==='inactive'   && !c.isActive) ||
      (status==='trial'      && c.isTrialActive) ||
      (status==='subscribed' && c.subscriptionStatus==='active');
    return matchQ && matchMode && matchStatus;
  });
  document.getElementById('institutions-table-wrap').innerHTML = buildInstitutionTable(filtered);
}

// ── Payments Tab ──────────────────────────────────────────────────────────────
async function loadPayments() {
  document.getElementById('tab-payments').innerHTML = '<div class="sa-loading">Loading payment history…</div>';
  try {
    const data = await api('/api/superadmin/payments');
    const pays = data.payments || [];
    const total = data.totalRevenue || 0;

    const _stat = (icon, val, lbl, cls='') =>
      `<div class="sa-stat ${cls}"><div class="sa-stat-icon">${icon}</div><div class="sa-stat-val">${val}</div><div class="sa-stat-lbl">${lbl}</div></div>`;

    document.getElementById('tab-payments').innerHTML = `
      <div class="sa-stats" style="grid-template-columns:repeat(2,minmax(140px,240px))">
        ${_stat('₵', 'GHS&nbsp;'+total.toLocaleString(), 'Total Revenue', 'accent-green')}
        ${_stat('📋', pays.length, 'Transactions')}
      </div>
      <div class="sa-table-card">
        <div class="sa-table-head">
          <h3>Payment History</h3>
          <span class="sa-count">${pays.length}</span>
        </div>
        <div class="sa-table-wrap">
          <table class="sa-tbl">
            <thead><tr>
              <th>Institution</th><th>Amount</th><th>Plan</th><th>Reference</th><th>Date</th>
            </tr></thead>
            <tbody>
              ${pays.length===0
                ? `<tr><td colspan="5" class="sa-empty">No payments yet.</td></tr>`
                : pays.map(p => {
                    const date = p.paidAt ? new Date(p.paidAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
                    return `<tr>
                      <td>
                        <div style="font-weight:600;color:#0f172a">${esc(p.company?.name||'Unknown')}</div>
                        <div style="font-size:11px;color:#94a3b8">${p.company?.institutionCode||''}</div>
                      </td>
                      <td class="pay-amount">GHS ${(p.amount||0).toLocaleString()}</td>
                      <td><span class="tag tag-blue">${p.plan||'—'}</span></td>
                      <td style="font-family:monospace;font-size:12px;color:#64748b">${esc(p.reference||'—')}</td>
                      <td style="font-size:12px;color:#64748b">${date}</td>
                    </tr>`;
                  }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(ex) {
    document.getElementById('tab-payments').innerHTML = `<div class="sa-empty" style="color:#dc2626">Error: ${ex.message}</div>`;
  }
}

// ── Devices Tab ───────────────────────────────────────────────────────────────
async function loadDevices() {
  const wrap = document.getElementById('tab-devices');
  wrap.innerHTML = '<div class="sa-loading">Loading devices…</div>';
  try {
    const data = await api('/api/superadmin/devices');
    const devices = data.devices || [];
    const orphaned   = devices.filter(d => d.isOrphaned);
    const registered = devices.filter(d => !d.isOrphaned);

    const _stat = (icon, val, lbl, cls='') =>
      `<div class="sa-stat ${cls}"><div class="sa-stat-icon">${icon}</div><div class="sa-stat-val">${val}</div><div class="sa-stat-lbl">${lbl}</div></div>`;

    wrap.innerHTML = `
      <div class="sa-stats" style="grid-template-columns:repeat(3,minmax(120px,180px))">
        ${_stat('📟', devices.length, 'Total')}
        ${_stat('✓', registered.length, 'Registered', 'accent-green')}
        ${_stat('⚠', orphaned.length, 'Orphaned', 'accent-red')}
      </div>
      ${orphaned.length ? `
      <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#991b1b">
        <strong>⚠️ ${orphaned.length} orphaned device${orphaned.length!==1?'s':''}</strong> — registered to institutions that no longer exist. Delete them to free the hardware for re-registration.
      </div>` : ''}
      <div class="sa-table-card">
        <div class="sa-table-head">
          <h3>All Devices</h3>
          <input type="text" id="device-search" placeholder="🔍 Search…" oninput="filterDevices()" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;width:200px">
        </div>
        <div class="sa-table-wrap" id="devices-list">
          ${buildDeviceRows(devices)}
        </div>
      </div>`;
    window._allDevices = devices;
  } catch(e) {
    wrap.innerHTML = `<div class="sa-empty" style="color:#dc2626">Error: ${e.message}</div>`;
  }
}

function filterDevices() {
  const q = (document.getElementById('device-search')?.value || '').toLowerCase();
  const filtered = (window._allDevices || []).filter(d =>
    !q || (d.deviceId||'').toLowerCase().includes(q) || (d.deviceName||'').toLowerCase().includes(q) || (d.companyName||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('devices-list');
  if (el) el.innerHTML = buildDeviceRows(filtered);
}

function buildDeviceRows(devices) {
  if (!devices.length) return '<div class="sa-empty">No devices found.</div>';
  return `<table class="sa-tbl">
    <thead><tr>
      <th>Device ID</th><th>Name</th><th>Institution</th><th>Status</th><th>Last Seen</th><th>Action</th>
    </tr></thead>
    <tbody>
      ${devices.map(d => {
        const isOrphaned = d.isOrphaned;
        const lastSeen = d.lastHeartbeat ? new Date(d.lastHeartbeat).toLocaleString() : 'Never';
        const online = d.lastHeartbeat && (Date.now() - new Date(d.lastHeartbeat).getTime()) < 30000;
        const statusBadge = online
          ? '<span class="tag tag-green">● Online</span>'
          : '<span class="tag tag-gray">○ Offline</span>';
        const instCell = isOrphaned
          ? '<span style="color:#dc2626;font-weight:600">⚠️ Orphaned</span>'
          : `<span style="font-weight:600">${d.companyName||'—'}</span>${d.companyCode?`<div style="font-size:11px;color:#94a3b8">${d.companyCode}</div>`:''}`;
        return `<tr style="${isOrphaned?'background:#fef9f9':''}">
          <td style="font-family:monospace;font-size:12px">${d.deviceId}</td>
          <td>${d.deviceName||'<span style="color:#94a3b8">—</span>'}</td>
          <td>${instCell}</td>
          <td>${statusBadge}</td>
          <td style="font-size:12px;color:#64748b">${lastSeen}</td>
          <td>
            <button onclick="forceDeleteDevice('${d._id}','${(d.deviceName||d.deviceId).replace(/'/g,'')}')"
              class="ra danger" title="Remove device" style="width:auto;padding:5px 10px;font-size:12px;font-weight:600;border-radius:7px">
              🗑 Remove
            </button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

async function forceDeleteDevice(id, name) {
  if (!confirm(`Remove device "${name}"?\n\nThe ESP32 will factory-reset on its next power-on.`)) return;
  try {
    const result = await api(`/api/superadmin/devices/${id}`, { method:'DELETE' });
    alert(result.message || 'Device removed.');
    loadDevices();
  } catch(e) { alert('Error: '+e.message); }
}

// ── Payment Adjuster ──────────────────────────────────────────────────────────
function openPaymentAdjuster(id, name, mode) {
  currentPayId = id;
  document.getElementById('pay-modal-company').textContent = name;
  document.getElementById('pay-status').textContent = '';
  document.getElementById('pay-reference').value = '';
  document.getElementById('pay-activate').checked = true;
  document.getElementById('pay-btn').disabled = false;
  document.getElementById('pay-btn').textContent = '💰 Record Payment';
  const defaultPlan = mode === 'corporate' ? 'monthly' : 'semester';
  document.querySelectorAll('.pay-plan-btn').forEach(b => b.classList.toggle('selected', b.dataset.plan===defaultPlan));
  const defaultBtn = document.querySelector(`.pay-plan-btn[data-plan="${defaultPlan}"]`);
  const defaultAmt = defaultBtn ? defaultBtn.dataset.amount : '300';
  document.getElementById('pay-amount').value = defaultAmt;
  document.getElementById('pay-amount-display').textContent = 'GHS '+defaultAmt;
  document.getElementById('pay-modal').classList.add('open');
}

function selectPayPlan(btn) {
  document.querySelectorAll('.pay-plan-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const amt = btn.dataset.amount;
  document.getElementById('pay-amount').value = amt;
  document.getElementById('pay-amount-display').textContent = 'GHS '+amt;
}

async function submitPayment() {
  const amount    = document.getElementById('pay-amount').value;
  const plan      = document.querySelector('.pay-plan-btn.selected')?.dataset.plan || 'semester';
  const reference = document.getElementById('pay-reference').value.trim();
  const activate  = document.getElementById('pay-activate').checked;
  const status    = document.getElementById('pay-status');
  const btn       = document.getElementById('pay-btn');
  if (!amount || Number(amount)<=0) {
    status.textContent='Please enter a valid amount.'; status.className='modal-status status-err'; return;
  }
  btn.disabled=true; btn.textContent='Saving…';
  try {
    const result = await api(`/api/superadmin/companies/${currentPayId}/record-payment`, {
      method:'POST', body:JSON.stringify({amount:Number(amount),plan,reference:reference||undefined,activate})
    });
    status.textContent=`✓ ${result.message}`; status.className='modal-status status-ok';
    btn.textContent='Done!';
    setTimeout(() => { closeModal('pay-modal'); loadInstitutions(); }, 1800);
  } catch(ex) {
    status.textContent='Error: '+ex.message; status.className='modal-status status-err';
    btn.disabled=false; btn.textContent='💰 Record Payment';
  }
}

// ── Institution Detail ────────────────────────────────────────────────────────
function showDetail(id) {

  const rc = c.roleCounts || {};
  const created   = c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
  const lastLogin = c.lastLoginAt ? new Date(c.lastLoginAt).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Never';
  const trialEnd  = c.trialEndDate ? new Date(c.trialEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
  const subEnd    = c.subscriptionEndDate ? new Date(c.subscriptionEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
  document.getElementById('detail-title').textContent = c.name;
  document.getElementById('detail-body').innerHTML = `

      <div class="detail-item"><label>Status</label><span>${c.isActive?'✅ Active':'❌ Inactive'}</span></div>
      <div class="detail-item"><label>Created</label><span>${created}</span></div>
      <div class="detail-item"><label>Admin</label><span>${esc(c.adminName||'—')}</span></div>
      <div class="detail-item"><label>Admin Email</label><span>${esc(c.adminEmail||'—')}</span></div>
      <div class="detail-item"><label>Last Admin Login</label><span>${lastLogin}</span></div>
      <div class="detail-item"><label>Total Users</label><span>${c.userCount||0}</span></div>
    </div>
    <hr class="detail-divider">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:10px">User Breakdown</div>
    <div class="detail-grid">
      ${c.mode==='academic' ? `
        <div class="detail-item"><label>Admins</label><span>${rc.admin||0}</span></div>
        <div class="detail-item"><label>HODs</label><span>${rc.hod||0}</span></div>
        <div class="detail-item"><label>Lecturers</label><span>${rc.lecturer||0}</span></div>
        <div class="detail-item"><label>Students</label><span>${rc.student||0}</span></div>
      ` : `
        <div class="detail-item"><label>Admins</label><span>${rc.admin||0}</span></div>
        <div class="detail-item"><label>Managers</label><span>${rc.manager||0}</span></div>
        <div class="detail-item"><label>Employees</label><span>${rc.employee||0}</span></div>
      `}
    </div>
    <hr class="detail-divider">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:10px">Subscription</div>
    <div class="detail-grid">
      <div class="detail-item"><label>Status</label><span>${c.subscriptionStatus||'—'}</span></div>
      <div class="detail-item"><label>Plan</label><span>${c.subscriptionPlan||'none'}</span></div>
      <div class="detail-item"><label>Trial Ends</label><span>${trialEnd}</span></div>
      <div class="detail-item"><label>Sub Ends</label><span>${subEnd}</span></div>
      <div class="detail-item"><label>Revenue</label><span style="color:#16a34a;font-weight:700">GHS ${(c.revenue||0).toLocaleString()}</span></div>
      <div class="detail-item"><label>Payments</label><span>${c.paymentCount||0}</span></div>
    </div>
    ${c.superadminNotes ? `<hr class="detail-divider"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:8px">Notes</div><div style="font-size:14px;color:#374151;white-space:pre-wrap">${esc(c.superadminNotes)}</div>` : ''}

    </div>`;

function _buildUserSubTable(users, sectionTitle, badgeColor, companyMode) {
  if (!users.length) return '';
  const now = Date.now();
  const rows = users.map(l => {
    const trialEnd  = l.trialEndDate ? new Date(l.trialEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const subEnd    = l.subscriptionExpiry ? new Date(l.subscriptionExpiry).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const trialActive = l.trialEndDate && new Date(l.trialEndDate) > now;
    const subActive   = l.subscriptionExpiry && new Date(l.subscriptionExpiry) > now;
    const status = subActive ? '✅ Subscribed' : trialActive ? '🟡 Trial' : '🔴 Expired';
    const statusColor = subActive ? '#16a34a' : trialActive ? '#d97706' : '#dc2626';
    return `<tr>
      <td style="padding:8px;font-size:13px;font-weight:600">${esc(l.name)}</td>
      <td style="padding:8px;font-size:12px;color:#6b7280">${esc(l.email||'—')}</td>
      <td style="padding:8px;font-size:13px;font-weight:700;color:${statusColor}">${status}</td>
      <td style="padding:8px;font-size:12px">${trialEnd}</td>
      <td style="padding:8px;font-size:12px">${subEnd}</td>
      <td style="padding:8px;white-space:nowrap">
        <button onclick="extendUserTrial('${l._id}','${esc(l.name)}')" style="padding:4px 10px;background:#4f46e5;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">Set Trial</button>
        <button onclick="activateSemester('${l._id}','${esc(l.name)}','${companyMode}')" style="padding:4px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;margin-left:4px">${companyMode==='corporate'?'+ Monthly':'+ Semester'}</button>
      </td>
    </tr>`;
  }).join('');
  return `
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="background:${badgeColor}22;color:${badgeColor};border-radius:999px;padding:2px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px">${sectionTitle}</span>
        <span style="font-size:12px;color:#94a3b8">${users.length} user${users.length!==1?'s':''}</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:#f8fafc">
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Name</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Email</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Status</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Trial Ends</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Sub Ends</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

async function loadLecturerSubs(companyId, companyMode) {
  const container = document.getElementById('lecturer-subs-'+companyId);
  container.innerHTML = '<div style="font-size:13px;color:#6b7280">Loading…</div>';
  try {
    const data = await api('/api/superadmin/companies/'+companyId+'/lecturers');
    if (!data.lecturers || !data.lecturers.length) {
      container.innerHTML = '<div style="font-size:13px;color:#6b7280">No subscribable users found.</div>'; return;
    }
    const hods      = data.lecturers.filter(l=>l.role==='hod');
    const lecturers = data.lecturers.filter(l=>l.role==='lecturer');
    const others    = data.lecturers.filter(l=>!['hod','lecturer'].includes(l.role));
    const html = [
      hods.length      ? _buildUserSubTable(hods,      'HODs',      '#0891b2', companyMode) : '',
      lecturers.length ? _buildUserSubTable(lecturers, 'Lecturers', '#7c3aed', companyMode) : '',
      others.length    ? _buildUserSubTable(others,    'Other',     '#6b7280', companyMode) : '',
    ].join('');
    container.innerHTML = html || '<div style="font-size:13px;color:#6b7280">No users found.</div>';
  } catch(ex) {
    container.innerHTML = '<div style="font-size:13px;color:#dc2626">Error: '+ex.message+'</div>';
  }
}

        <button onclick="setUserTrialDate(30)" style="padding:8px;border:1.5px solid #4f46e5;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#eef2ff;color:#4f46e5">30 days</button>
        <button onclick="setUserTrialDate(90)" style="padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#f9fafb">90 days</button>

      <input id="user-trial-date" type="date" value="${defaultDate}" style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:15px;font-weight:600;text-align:center;outline:none;font-family:inherit;cursor:pointer;margin-bottom:16px">

function setUserTrialDate(days) {
  const d = new Date(Date.now()+days*24*60*60*1000).toISOString().split('T')[0];
  document.getElementById('user-trial-date').value = d;
}

async function confirmUserTrial(userId) {
  const dateVal = document.getElementById('user-trial-date').value;
  const msg = document.getElementById('user-trial-msg');
  if (!dateVal) { msg.textContent='Pick a date'; msg.style.cssText='display:block;color:#dc2626;font-size:13px'; return; }
  const btn = document.querySelector('[onclick*="confirmUserTrial"]');
  btn.textContent='Saving…'; btn.disabled=true;
  try {
    const data = await api('/api/superadmin/users/'+userId+'/extend-trial', {method:'PATCH',body:JSON.stringify({expiryDate:dateVal})});
    msg.textContent='✅ '+data.message;
    msg.style.cssText='display:block;color:#16a34a;font-size:13px;margin-bottom:12px';
    btn.textContent='Done!';
    setTimeout(() => document.querySelector('[style*="z-index:99999"]')?.remove(), 1500);
  } catch(ex) {
    msg.textContent='Error: '+ex.message;
    msg.style.cssText='display:block;color:#dc2626;font-size:13px;margin-bottom:12px';
    btn.textContent='Set Expiry'; btn.disabled=false;
  }
}

      </div>

async function confirmDeleteInstitution(id, name) {
  const typed = document.getElementById('delete-confirm-input')?.value?.trim();
  const msg   = document.getElementById('delete-msg');
  if (typed !== name) {
    msg.textContent='Name does not match. Please type exactly: '+name;
    msg.style.cssText='font-size:13px;margin-bottom:12px;display:block;color:#dc2626'; return;
  }
  const btn = document.querySelector('[onclick*="confirmDeleteInstitution"]');
  btn.textContent='Deleting…'; btn.disabled=true;
  try {
    await api(`/api/superadmin/companies/${id}`, {method:'DELETE'});
    msg.textContent='✅ Institution deleted successfully.';
    msg.style.cssText='font-size:13px;margin-bottom:12px;display:block;color:#16a34a';
    btn.textContent='Done!';
    setTimeout(() => { document.querySelector('[style*="position:fixed"][style*="z-index:9999"]')?.remove(); loadInstitutions(); }, 1500);
  } catch(ex) {
    msg.textContent='Error: '+ex.message;
    msg.style.cssText='font-size:13px;margin-bottom:12px;display:block;color:#dc2626';
    btn.textContent='Permanently Delete'; btn.disabled=false;
  }
}

async function activateSemester(userId, name, mode) {
  const isCorp = mode==='corporate';
  const label  = isCorp ? '30 days (monthly plan)' : '1 semester (16 weeks / 112 days)';
  const price  = isCorp ? '₵150' : '₵300';
  if (!confirm(`Activate ${label} for ${name}?\n\nPrice: ${price}`)) return;
  try {
    const data = await api('/api/superadmin/users/'+userId+'/extend-trial',{method:'PATCH',body:JSON.stringify({semester:true})});
    alert('✅ '+data.message);
  } catch(ex) { alert('Error: '+ex.message); }
}

async function impersonate(id, name) {
  if (!confirm(`Log in as admin of "${name}"? Opens in a new tab.`)) return;
  try {
    const data = await api(`/api/superadmin/impersonate/${id}`,{method:'POST'});
    window.open('/?impersonate='+data.token, '_blank');
  } catch(ex) { alert('Error: '+ex.message); }
}

// ── Email ─────────────────────────────────────────────────────────────────────
function openEmail(id, name, email) {
  currentEmailId = id;
  document.getElementById('email-to-display').value = `${name} — ${email||'(no email on file)'}`;
  document.getElementById('email-subject').value = '';
  document.getElementById('email-body').value = '';
  document.getElementById('email-status').textContent = '';
  document.getElementById('email-send-btn').disabled = false;
  document.getElementById('email-send-btn').textContent = 'Send Email';
  document.getElementById('email-modal').classList.add('open');
}

async function sendEmail() {
  const subject = document.getElementById('email-subject').value.trim();
  const message = document.getElementById('email-body').value.trim();
  const status  = document.getElementById('email-status');
  const btn     = document.getElementById('email-send-btn');
  if (!subject) { status.textContent='Please enter a subject.'; status.className='modal-status status-err'; return; }
  if (!message) { status.textContent='Please enter a message.'; status.className='modal-status status-err'; return; }
  btn.disabled=true; btn.textContent='Sending…';
  try {
    const r = await api(`/api/superadmin/email/${currentEmailId}`,{method:'POST',body:JSON.stringify({subject,message})});
    status.textContent=`✓ Sent to ${r.sentTo}`; status.className='modal-status status-ok';
    btn.textContent='Sent!';
    setTimeout(() => closeModal('email-modal'), 2000);
  } catch(ex) {
    status.textContent='Failed: '+ex.message; status.className='modal-status status-err';
    btn.disabled=false; btn.textContent='Send Email';
  }
}

function openNotes(id, name, existing) {
  currentNotesId = id;
  document.getElementById('notes-company-name').textContent = name;
  document.getElementById('notes-text').value = existing || '';
  document.getElementById('notes-status').textContent = '';
  document.getElementById('notes-modal').classList.add('open');
}

async function saveNotes() {
  const notes  = document.getElementById('notes-text').value;
  const status = document.getElementById('notes-status');
  try {
    await api(`/api/superadmin/companies/${currentNotesId}/notes`,{method:'PATCH',body:JSON.stringify({notes})});
    const c = allCompanies.find(x=>x._id===currentNotesId);
    if (c) c.superadminNotes = notes;
    status.textContent='✓ Saved'; status.className='modal-status status-ok';
    setTimeout(() => closeModal('notes-modal'), 1200);
  } catch(ex) { status.textContent='Error: '+ex.message; status.className='modal-status status-err'; }
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Name','Code','Mode','Status','Subscription','Users','Admin Email','Trial Ends','Revenue','Notes']];
  allCompanies.forEach(c => {
    const trialEnd = c.trialEndDate ? new Date(c.trialEndDate).toLocaleDateString() : '';
    rows.push([c.name, c.institutionCode||'', c.mode, c.isActive?'Active':'Inactive', c.subscriptionStatus||'', c.userCount||0, c.adminEmail||'', trialEnd, c.revenue||0, (c.superadminNotes||'').replace(/\n/g,' ')]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `dikly-institutions-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Auto-login
if (SA_TOKEN) {
  api('/api/auth/me').then(d => {
    if (d.user?.role === 'superadmin') {
      setUserDisplay(d.user.name || d.user.email || 'SA');
      showDashboard();
    } else { localStorage.removeItem('sa_token'); SA_TOKEN = ''; }
  }).catch(() => { localStorage.removeItem('sa_token'); SA_TOKEN = ''; });
}
</script>
