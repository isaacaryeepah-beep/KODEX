<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KODEX — Platform Admin</title>
  <link rel="icon" type="image/svg+xml" href="/kodex-icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#0d1117;min-height:100vh;color:#111}

    /* ── Login ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .brand-icon{width:44px;height:44px;border-radius:12px;background:#0d1117;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
    .brand h1{font-size:20px;font-weight:800;color:#0d1117}
    .brand p{font-size:12px;color:#6b7280;margin-top:2px}
    .badge{display:inline-flex;align-items:center;gap:5px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-bottom:24px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:6px}
    input[type=email],input[type=password],input[type=text],textarea,select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:14px;outline:none;font-family:inherit}
    input:focus,textarea:focus,select:focus{border-color:#374151}
    .btn-login{width:100%;padding:13px;background:#0d1117;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
    .btn-login:hover{background:#1f2937}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .err{display:none;margin-top:12px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:13px}
    .back-link{text-align:center;margin-top:20px;font-size:12px;color:#6b7280}
    .back-link a{color:#6b7280;text-decoration:none}

    /* ── Dashboard ── */
    #dashboard{display:none;background:#f1f5f9;min-height:100vh}
    .topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:12px}
    .topbar-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .topbar h2{font-size:16px;font-weight:700;color:#0d1117}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .user-chip{font-size:13px;color:#6b7280;white-space:nowrap}
    .btn-sm{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;font-family:inherit;white-space:nowrap}
    .btn-sm:hover{background:#f8fafc}
    .btn-sm.primary{background:#0d1117;color:#fff;border-color:#0d1117}
    .btn-sm.primary:hover{background:#1f2937}
    .content{padding:24px 28px;max-width:1400px}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:12px;padding:6px;border:1px solid #e2e8f0;width:fit-content}
    .tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#64748b;font-family:inherit}
    .tab.active{background:#0d1117;color:#fff}
    .tab:hover:not(.active){background:#f1f5f9}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:24px}
    .stat{background:#fff;border-radius:12px;padding:18px;border:1px solid #e2e8f0}
    .stat-val{font-size:26px;font-weight:800;color:#0d1117}
    .stat-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-top:4px}

    /* Filters */
    .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .filters input,.filters select{width:auto;padding:8px 12px;border-radius:8px;font-size:13px;border:1.5px solid #e2e8f0;background:#fff}
    .filters input{min-width:220px}

    /* Table */
    .table-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:24px}
    .table-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;gap:12px;flex-wrap:wrap}
    .table-head h3{font-size:14px;font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:9px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;border-bottom:1px solid #e2e8f0;white-space:nowrap}
    td{padding:11px 16px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr.clickable:hover{background:#f8fafc;cursor:pointer}
    .tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
    .tag-green{background:#dcfce7;color:#166534}
    .tag-red{background:#fee2e2;color:#991b1b}
    .tag-blue{background:#dbeafe;color:#1e40af}
    .tag-amber{background:#fef3c7;color:#92400e}
    .tag-gray{background:#f1f5f9;color:#475569}
    .action-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;font-family:inherit;margin-right:3px;white-space:nowrap}
    .action-btn:hover{background:#f8fafc}
    .action-btn.danger{border-color:#fecaca;color:#dc2626}
    .action-btn.danger:hover{background:#fef2f2}
    .action-btn.success{border-color:#bbf7d0;color:#16a34a}
    .action-btn.success:hover{background:#f0fdf4}
    .role-breakdown{font-size:11px;color:#94a3b8;margin-top:2px}
    .trial-warn{color:#d97706;font-weight:700}
    .trial-ok{color:#16a34a}
    .trial-exp{color:#dc2626;font-weight:700}
    .empty{padding:40px;text-align:center;color:#94a3b8;font-size:14px}
    .loading-msg{padding:40px;text-align:center;color:#94a3b8}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.3);margin:auto}
    .modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
    .modal-field{margin-bottom:14px}
    .modal-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;display:block;margin-bottom:5px}
    .modal-field input,.modal-field textarea,.modal-field select{margin-bottom:0;padding:10px 14px}
    .modal-field textarea{min-height:120px;resize:vertical}
    .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
    .btn-primary{padding:10px 22px;background:#0d1117;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .btn-primary:hover{background:#1f2937}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-cancel{padding:10px 18px;background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-cancel:hover{background:#f8fafc}
    .modal-status{margin-top:10px;font-size:13px;font-weight:500;text-align:center}
    .status-ok{color:#16a34a}
    .status-err{color:#dc2626}

    /* Detail panel */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .detail-item label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;display:block;margin-bottom:3px}
    .detail-item span{font-size:14px;color:#0d1117;font-weight:500}
    .detail-divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0}
    .impersonate-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:13px;color:#92400e;margin-bottom:14px}

    /* Payment table */
    .pay-amount{font-weight:700;color:#16a34a}

    /* Notes */
    .notes-area{width:100%;min-height:80px;resize:vertical;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;color:#374151}
    .notes-area:focus{outline:none;border-color:#374151}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="card">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="width:44px;height:44px;border-radius:12px;flex-shrink:0">
        <rect x="0" y="0" width="128" height="128" rx="28" fill="#3730a3"/>
        <rect x="6" y="6" width="116" height="116" rx="22" fill="#4f46e5"/>
        <rect x="30" y="28" width="17" height="72" rx="4" fill="#ffffff"/>
        <polygon points="47,64 90,28 108,28 66,64" fill="#ffffff"/>
        <polygon points="47,64 90,100 108,100 66,64" fill="#ffffff"/>
        <circle cx="108" cy="16" r="6" fill="#818cf8"/>
        <circle cx="120" cy="16" r="4" fill="#c7d2fe"/>
      </svg>
      <div><h1>KODEX</h1><p>Platform Administration</p></div>
    </div>
    <div class="badge">🔒 SUPERADMIN ACCESS</div>
    <form onsubmit="doLogin(event)">
      <label for="em">Email</label>
      <input type="email" id="em" placeholder="Enter your email" required style="margin-bottom:14px">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Enter password" required style="margin-bottom:0">
      <button class="btn-login" id="login-btn" type="submit">Sign In</button>
    </form>
    <div class="err" id="err"></div>
    <div class="back-link"><a href="/">← Back to KODEX</a></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <h2>Platform Admin</h2>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-chip"></span>
      <button class="btn-sm" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('institutions',this)">🏫 Institutions</button>
      <button class="tab" onclick="switchTab('payments',this)">💳 Payments</button>
    </div>
    <div id="tab-institutions"><div class="loading-msg">Loading…</div></div>
    <div id="tab-payments" style="display:none"><div class="loading-msg">Loading…</div></div>
  </div>
</div>

<!-- EMAIL MODAL -->
<div class="modal-overlay" id="email-modal">
  <div class="modal">
    <h3>✉️ Email Institution Admin</h3>
    <div class="modal-field">
      <label>To</label>
      <input type="text" id="email-to-display" readonly style="background:#f8fafc;color:#64748b">
    </div>
    <div class="modal-field">
      <label>Subject</label>
      <input type="text" id="email-subject" placeholder="e.g. Your trial is expiring soon">
    </div>
    <div class="modal-field">
      <label>Message</label>
      <textarea id="email-body" placeholder="Type your message…"></textarea>
    </div>
    <div class="modal-status" id="email-status"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('email-modal')">Cancel</button>
      <button class="btn-primary" id="email-send-btn" onclick="sendEmail()">Send Email</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:620px">
    <h3 id="detail-title">Institution Details</h3>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('detail-modal')">Close</button>
    </div>
  </div>
</div>

<!-- NOTES MODAL -->
<div class="modal-overlay" id="notes-modal">
  <div class="modal" style="max-width:460px">
    <h3>📝 Notes</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:12px" id="notes-company-name"></p>
    <textarea class="notes-area" id="notes-text" placeholder="Add private notes about this institution…"></textarea>
    <div class="modal-status" id="notes-status"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('notes-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>

<script>
let SA_TOKEN = localStorage.getItem('sa_token') || '';
let allCompanies = [];
let currentEmailId = '';
let currentNotesId = '';

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/superadmin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('em').value.trim(), password: document.getElementById('pw').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    SA_TOKEN = d.token;
    localStorage.setItem('sa_token', SA_TOKEN);
    document.getElementById('user-chip').textContent = d.user.name;
    showDashboard();
  } catch(ex) {
    errEl.textContent = ex.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  localStorage.removeItem('sa_token'); SA_TOKEN = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function api(path, opts={}) {
  const r = await fetch(path, { ...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+SA_TOKEN,...(opts.headers||{})} });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Request failed');
  return d;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadInstitutions();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-institutions').style.display = tab === 'institutions' ? 'block' : 'none';
  document.getElementById('tab-payments').style.display = tab === 'payments' ? 'block' : 'none';
  if (tab === 'payments') loadPayments();
}

// ── Institutions Tab ──────────────────────────────────────────────────────────
async function loadInstitutions() {
  document.getElementById('tab-institutions').innerHTML = '<div class="loading-msg">Loading platform data…</div>';
  try {
    const data = await api('/api/superadmin/overview');
    allCompanies = data.companies || [];
    renderInstitutions(allCompanies, data);
  } catch(ex) {
    document.getElementById('tab-institutions').innerHTML = `<div class="empty" style="color:#dc2626">Error: ${ex.message}</div>`;
  }
}

function renderInstitutions(cos, data) {
  const total = cos.length;
  const active = cos.filter(c=>c.isActive).length;
  const trial = cos.filter(c=>c.isTrialActive).length;
  const expired = cos.filter(c=>!c.isTrialActive && c.subscriptionStatus!=='active').length;
  const sub = cos.filter(c=>c.subscriptionStatus==='active').length;
  const acad = cos.filter(c=>c.mode==='academic').length;
  const corp = cos.filter(c=>c.mode==='corporate').length;
  const rev = (data && data.totalRevenue) ? data.totalRevenue : cos.reduce((s,c)=>s+(c.revenue||0),0);
  // Count expired lecturers across all institutions
  const expiredLecturers = cos.filter(c=>!c.isTrialActive && c.subscriptionStatus!=='active').reduce((s,c)=>s+((c.roleCounts&&c.roleCounts.lecturer)||0),0);

  document.getElementById('tab-institutions').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Institutions</div></div>
      <div class="stat"><div class="stat-val" style="color:#16a34a">${active}</div><div class="stat-lbl">Active</div></div>
      <div class="stat"><div class="stat-val" style="color:#d97706">${trial}</div><div class="stat-lbl">On Trial</div></div>
      <div class="stat"><div class="stat-val" style="color:#dc2626">${expired}</div><div class="stat-lbl">Expired</div></div>
      <div class="stat"><div class="stat-val" style="color:#dc2626">${expiredLecturers}</div><div class="stat-lbl">Expired Lecturers</div></div>
      <div class="stat"><div class="stat-val" style="color:#2563eb">${sub}</div><div class="stat-lbl">Subscribed</div></div>
      <div class="stat"><div class="stat-val" style="color:#16a34a;font-size:20px">GHS ${rev.toLocaleString()}</div><div class="stat-lbl">Revenue</div></div>
      <div class="stat"><div class="stat-val">${acad}</div><div class="stat-lbl">Academic</div></div>
      <div class="stat"><div class="stat-val">${corp}</div><div class="stat-lbl">Corporate</div></div>
    </div>

    <div class="filters">
      <input type="text" id="search-input" placeholder="🔍 Search by name or code…" oninput="filterInstitutions()">
      <select id="filter-mode" onchange="filterInstitutions()">
        <option value="">All modes</option>
        <option value="academic">Academic</option>
        <option value="corporate">Corporate</option>
      </select>
      <select id="filter-status" onchange="filterInstitutions()">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="trial">On Trial</option>
        <option value="subscribed">Subscribed</option>
      </select>
    </div>

    <div class="table-card">
      <div class="table-head"><h3>All Institutions</h3></div>
      <div id="institutions-table-wrap">${buildInstitutionRows(cos)}</div>
    </div>`;
}

function buildInstitutionRows(cos) {
  if (!cos.length) return '<div class="empty">No institutions found.</div>';
  return `<table>
    <thead><tr>
      <th>Institution</th><th>Admin</th><th>Users</th><th>Mode</th>
      <th>Status</th><th>Trial / Subscription</th><th>Actions</th>
    </tr></thead>
    <tbody>
      ${cos.map(c => {
        const rc = c.roleCounts || {};
        const breakdown = c.mode === 'academic'
          ? `${rc.hod||0} HODs · ${rc.lecturer||0} lecturers · ${rc.student||0} students`
          : `${rc.manager||0} managers · ${rc.employee||0} employees`;
        const trialClass = !c.isTrialActive && c.subscriptionStatus !== 'active' ? 'trial-exp'
          : c.trialDaysRemaining <= 3 ? 'trial-warn' : 'trial-ok';
        const trialText = c.subscriptionStatus === 'active' ? 'Subscribed ✓'
          : c.isTrialActive ? `${c.trialDaysRemaining}d left`
          : 'Expired';
        const expDate = c.trialEndDate ? new Date(c.trialEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
        return `<tr class="clickable" onclick="showDetail('${c._id}')">
          <td>
            <div style="font-weight:700">${esc(c.name)}</div>
            <div style="font-size:11px;color:#94a3b8;font-family:monospace">${c.institutionCode||'—'}</div>
          </td>
          <td>
            <div style="font-size:13px">${esc(c.adminName||'—')}</div>
            <div style="font-size:11px;color:#94a3b8">${esc(c.adminEmail||'—')}</div>
          </td>
          <td>
            <div style="font-weight:600">${c.userCount||0}</div>
            <div class="role-breakdown">${breakdown}</div>
          </td>
          <td><span class="tag ${c.mode==='academic'?'tag-blue':'tag-green'}">${c.mode}</span></td>
          <td><span class="tag ${c.isActive?'tag-green':'tag-red'}">${c.isActive?'Active':'Inactive'}</span></td>
          <td>
            <span class="${trialClass}">${trialText}</span>
            <div style="font-size:11px;color:#94a3b8">expires ${expDate}</div>
          </td>
          <td onclick="event.stopPropagation()">
            <button class="action-btn ${c.isActive?'danger':'success'}" onclick="toggleCompany('${c._id}',${c.isActive},'${esc(c.name)}')">${c.isActive?'Deactivate':'Activate'}</button>
            <button class="action-btn danger" onclick="deleteInstitution('${c._id}','${esc(c.name)}')" title="Permanently delete" style="border-color:#fca5a5;font-weight:700">🗑 Delete</button>
            <button class="action-btn" onclick="extendTrial('${c._id}','${esc(c.name)}')">+Trial</button>
            <button class="action-btn" onclick="openEmail('${c._id}','${esc(c.name)}','${esc(c.adminEmail||'')}')">✉️</button>
            <button class="action-btn" onclick="openNotes('${c._id}','${esc(c.name)}','${esc(c.superadminNotes||'')}')">📝</button>
            <button class="action-btn" onclick="impersonate('${c._id}','${esc(c.name)}')">🔑</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function filterInstitutions() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const mode = document.getElementById('filter-mode').value;
  const status = document.getElementById('filter-status').value;
  let filtered = allCompanies.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.institutionCode||'').toLowerCase().includes(q) || (c.adminEmail||'').toLowerCase().includes(q);
    const matchMode = !mode || c.mode === mode;
    const matchStatus = !status ||
      (status === 'active' && c.isActive) ||
      (status === 'inactive' && !c.isActive) ||
      (status === 'trial' && c.isTrialActive) ||
      (status === 'subscribed' && c.subscriptionStatus === 'active');
    return matchQ && matchMode && matchStatus;
  });
  document.getElementById('institutions-table-wrap').innerHTML = buildInstitutionRows(filtered);
}

function _buildUserSubTable(users, sectionTitle, badgeColor) {
  if (!users.length) return '';
  const now = Date.now();
  const rows = users.map(l => {
    const trialEnd = l.trialEndDate ? new Date(l.trialEndDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const subEnd   = l.subscriptionExpiry ? new Date(l.subscriptionExpiry).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const trialActive = l.trialEndDate && new Date(l.trialEndDate) > now;
    const subActive   = l.subscriptionExpiry && new Date(l.subscriptionExpiry) > now;
    const status = subActive ? '✅ Subscribed' : trialActive ? '🟡 Trial' : '🔴 Expired';
    const statusColor = subActive ? '#16a34a' : trialActive ? '#d97706' : '#dc2626';
    return `<tr>
      <td style="padding:8px;font-size:13px;font-weight:600">${esc(l.name)}</td>
      <td style="padding:8px;font-size:12px;color:#6b7280">${esc(l.email||'—')}</td>
      <td style="padding:8px;font-size:13px;font-weight:700;color:${statusColor}">${status}</td>
      <td style="padding:8px;font-size:12px">${trialEnd}</td>
      <td style="padding:8px;font-size:12px">${subEnd}</td>
      <td style="padding:8px;white-space:nowrap">
        <button onclick="extendUserTrial('${l._id}','${esc(l.name)}')" style="padding:4px 10px;background:#4f46e5;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">Set Trial</button>
        <button onclick="activateSemester('${l._id}','${esc(l.name)}')" style="padding:4px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;margin-left:4px">+ Semester</button>
      </td>
    </tr>`;
  }).join('');
  return `
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="background:${badgeColor}22;color:${badgeColor};border-radius:999px;padding:2px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px">${sectionTitle}</span>
        <span style="font-size:12px;color:#94a3b8">${users.length} user${users.length!==1?'s':''}</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:#f8fafc">
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Name</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Email</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Status</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Trial Ends</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Sub Ends</th>
            <th style="padding:8px;font-size:11px;text-transform:uppercase;color:#94a3b8;text-align:left">Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

async function loadLecturerSubs(companyId) {
  const container = document.getElementById('lecturer-subs-' + companyId);
  container.innerHTML = '<div style="font-size:13px;color:#6b7280">Loading…</div>';
  try {
    const data = await api('/api/superadmin/companies/' + companyId + '/lecturers');
    if (!data.lecturers || !data.lecturers.length) {
      container.innerHTML = '<div style="font-size:13px;color:#6b7280">No subscribable users found.</div>';
      return;
    }

    const hods      = data.lecturers.filter(l => l.role === 'hod');
    const lecturers = data.lecturers.filter(l => l.role === 'lecturer');
    const others    = data.lecturers.filter(l => !['hod','lecturer'].includes(l.role));

    const html = [
      hods.length      ? _buildUserSubTable(hods,      'HODs',      '#0891b2') : '',
      lecturers.length ? _buildUserSubTable(lecturers, 'Lecturers', '#7c3aed') : '',
      others.length    ? _buildUserSubTable(others,    'Other',     '#6b7280') : '',
    ].join('');

    container.innerHTML = html || '<div style="font-size:13px;color:#6b7280">No users found.</div>';
  } catch(ex) {
    container.innerHTML = '<div style="font-size:13px;color:#dc2626">Error: ' + ex.message + '</div>';
  }
}

    setTimeout(() => {
      document.querySelector('[style*="position:fixed"][style*="z-index:9999"]')?.remove();
      loadInstitutions();
    }, 1800);
  } catch(ex) {
    msg.textContent = 'Error: ' + ex.message;
    msg.style.cssText = 'font-size:13px;margin-bottom:12px;display:block;color:#dc2626';
    btn.textContent = 'Set Expiry Date'; btn.disabled = false;
  }
}

async function activateSemester(userId, name) {
  if (!confirm(`Activate 1 semester (16 weeks / 112 days) for ${name}?\n\nPrice: ₵300`)) return;
  try {
    const data = await api('/api/superadmin/users/' + userId + '/extend-trial', {
      method: 'PATCH',
      body: JSON.stringify({ semester: true })
    });
    alert('✅ ' + data.message);
  } catch(ex) {
    alert('Error: ' + ex.message);
  }
}

async function impersonate(id, name) {
  if (!confirm(`Log in as admin of "${name}"? Opens in a new tab.`)) return;
  try {
    const data = await api(`/api/superadmin/impersonate/${id}`, {method:'POST'});
    const url = `/?impersonate=${data.token}`;
    window.open(url, '_blank');
  } catch(ex) { alert('Error: '+ex.message); }
}

// ── Email ─────────────────────────────────────────────────────────────────────
function openEmail(id, name, email) {
  currentEmailId = id;
  document.getElementById('email-to-display').value = `${name} — ${email||'(no email on file)'}`;
  document.getElementById('email-subject').value = '';
  document.getElementById('email-body').value = '';
  document.getElementById('email-status').textContent = '';
  document.getElementById('email-send-btn').disabled = false;
  document.getElementById('email-send-btn').textContent = 'Send Email';
  document.getElementById('email-modal').classList.add('open');
}

async function sendEmail() {
  const subject = document.getElementById('email-subject').value.trim();
  const message = document.getElementById('email-body').value.trim();
  const status = document.getElementById('email-status');
  const btn = document.getElementById('email-send-btn');
  if (!subject) { status.textContent = 'Please enter a subject.'; status.className = 'modal-status status-err'; return; }
  if (!message) { status.textContent = 'Please enter a message.'; status.className = 'modal-status status-err'; return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const r = await api(`/api/superadmin/email/${currentEmailId}`, {method:'POST', body:JSON.stringify({subject,message})});
    status.textContent = `✓ Sent to ${r.sentTo}`;
    status.className = 'modal-status status-ok';
    btn.textContent = 'Sent!';
    setTimeout(() => closeModal('email-modal'), 2000);
  } catch(ex) {
    status.textContent = 'Failed: '+ex.message;
    status.className = 'modal-status status-err';
    btn.disabled = false; btn.textContent = 'Send Email';
  }
}

// ── Notes ─────────────────────────────────────────────────────────────────────
function openNotes(id, name, existing) {
  currentNotesId = id;
  document.getElementById('notes-company-name').textContent = name;
  document.getElementById('notes-text').value = existing || '';
  document.getElementById('notes-status').textContent = '';
  document.getElementById('notes-modal').classList.add('open');
}

async function saveNotes() {
  const notes = document.getElementById('notes-text').value;
  const status = document.getElementById('notes-status');
  try {
    await api(`/api/superadmin/companies/${currentNotesId}/notes`, {method:'PATCH', body:JSON.stringify({notes})});
    // Update local data
    const c = allCompanies.find(x => x._id === currentNotesId);
    if (c) c.superadminNotes = notes;
    status.textContent = '✓ Saved'; status.className = 'modal-status status-ok';
    setTimeout(() => closeModal('notes-modal'), 1200);
  } catch(ex) {
    status.textContent = 'Error: '+ex.message; status.className = 'modal-status status-err';
  }
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Name','Code','Mode','Status','Subscription','Users','Admin Email','Trial Ends','Revenue','Notes']];
  allCompanies.forEach(c => {
    const trialEnd = c.trialEndDate ? new Date(c.trialEndDate).toLocaleDateString() : '';
    rows.push([
      c.name, c.institutionCode||'', c.mode,
      c.isActive?'Active':'Inactive', c.subscriptionStatus||'',
      c.userCount||0, c.adminEmail||'',
      trialEnd, c.revenue||0, (c.superadminNotes||'').replace(/\n/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `kodex-institutions-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Auto-login
if (SA_TOKEN) {
  api('/api/auth/me').then(d => {
    if (d.user?.role === 'superadmin') {
      document.getElementById('user-chip').textContent = d.user.name;
      showDashboard();
    } else { localStorage.removeItem('sa_token'); SA_TOKEN = ''; }
  }).catch(() => { localStorage.removeItem('sa_token'); SA_TOKEN = ''; });
}
</script>

function AlertsPanel() {
  const [issues,  setIssues]  = React.useState(null);

  React.useEffect(() => {

      setTrials(ending);
    }).catch(() => {});
  }, []);

  const locked   = issues?.locked           || [];
  const expired  = issues?.expiredCompanies || [];
  const loading  = issues === null;

  const COLORS = {
    rose:   { dot: 'bg-rose-400',   badge: 'bg-rose-50 text-rose-600',   bar: 'bg-rose-400'   },
    amber:  { dot: 'bg-amber-400',  badge: 'bg-amber-50 text-amber-600', bar: 'bg-amber-400'  },
    sky:    { dot: 'bg-sky-400',    badge: 'bg-sky-50 text-sky-600',     bar: 'bg-sky-400'    },
    orange: { dot: 'bg-orange-400', badge: 'bg-orange-50 text-orange-600', bar: 'bg-orange-400' },
  };

  const AlertRow = ({ color, label, count, items, urgent }) => {
    const c = COLORS[color] || COLORS.sky;
    return (
      <div className="mb-3">
        <div className="flex items-center justify-between mb-1.5">
          <div className="flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${c.dot} ${urgent && count > 0 ? 'animate-pulse' : ''}`} />
            <span className="text-xs font-semibold text-gray-600">{label}</span>
          </div>
          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${c.badge} ${urgent && count > 0 ? 'ring-1 ring-current' : ''}`}>
            {loading ? '…' : count}
          </span>
        </div>
        {!loading && items.length > 0 && (
          <ul className="space-y-1 pl-4">
            {items.slice(0, 3).map((it, i) => (
              <li key={i} className="text-xs text-gray-500 truncate flex items-center gap-1">
                <span className={`w-1 h-1 rounded-full flex-shrink-0 ${c.dot}`} />
                {it}
              </li>
            ))}
            {items.length > 3 && <li className="text-xs text-gray-400 pl-2">+{items.length - 3} more</li>}
          </ul>
        )}
        {!loading && items.length === 0 && (
          <p className="pl-4 text-xs text-emerald-400 font-medium">All clear</p>
        )}
      </div>
    );
  };

  const totalAlerts = locked.length + expired.length + trialsOrgs.length;

  return (
    <div className="w-64 flex-shrink-0 bg-white rounded-2xl p-5 shadow-sm">

// ── SubscriptionsPage ─────────────────────────────────────────────────────────
function SubscriptionsPage() {
  const [orgs, setOrgs] = React.useState(null);

  React.useEffect(() => {
    api('/api/superadmin/overview').then(d => setOrgs(d.companies || [])).catch(() => setOrgs([]));
  }, []);

  if (orgs === null) return <p className="text-center py-16 text-sm text-gray-300">Loading…</p>;

  const academic  = orgs.filter(c => c.mode === 'academic'  && c.subscriptionActive && !c.isTrialActive);
  const corporate = orgs.filter(c => c.mode === 'corporate' && c.subscriptionActive && !c.isTrialActive);
  const trials    = orgs.filter(c => c.isTrialActive);
  const expired   = orgs.filter(c => !c.subscriptionActive && !c.isTrialActive);

  const acPricing    = () => '₵300 / semester';
  const corpPricing  = () => '₵150 / month';
  const trialPricing = o  => `Trial (30d) · ${o.trialDaysRemaining}d left`;
  const expPricing   = () => '—';

  const handleAction = async (action, org) => {
    if (action === 'view') {
      if (typeof openDetail === 'function') openDetail(org._id);
      return;
    }
    if (action === 'extend') {
      const days = parseInt(prompt(`Extend trial for "${org.name}" by how many days?`, '30'), 10);
      if (!days || days < 1) return;
      try {
        await api(`/api/superadmin/companies/${org._id}/extend-trial`, { method: 'PATCH', body: JSON.stringify({ days }) });
        const d = await api('/api/superadmin/overview');
        setOrgs(d.companies || []);
      } catch (e) { alert('Failed to extend trial'); }
      return;
    }
    if (action === 'activate' || action === 'suspend') {
      const label = action === 'activate' ? 'activate subscription for' : 'suspend';
      if (!confirm(`${label} "${org.name}"?`)) return;
      try {
        await api(`/api/superadmin/companies/${org._id}/subscription`, { method: 'PATCH', body: JSON.stringify({ action }) });
        const d = await api('/api/superadmin/overview');
        setOrgs(d.companies || []);
      } catch (e) { alert('Action failed'); }
    }
  };

  return (
    <div className="space-y-5">
      <SubSection title="Academic — Active"   accent="indigo" orgs={academic}  pricing={acPricing}    onAction={handleAction} />
      <SubSection title="Corporate — Active"  accent="violet" orgs={corporate} pricing={corpPricing}  onAction={handleAction} />
      <SubSection title="Trials Ending"       accent="amber"  orgs={trials}    pricing={trialPricing} onAction={handleAction} />
      <SubSection title="Expired"             accent="rose"   orgs={expired}   pricing={expPricing}   onAction={handleAction} />
    </div>
  );
}

const REPORT_CARDS = [
  { id: 'users',         label: 'All Users',          desc: 'Export every user with role, org, and status',       accent: 'sky'     },
  { id: 'organizations', label: 'Organizations',       desc: 'Export all orgs with mode, user count, and status',  accent: 'indigo'  },
  { id: 'subscriptions', label: 'Subscriptions',       desc: 'Active, trial, and expired subscription details',    accent: 'emerald' },
  { id: 'revenue',       label: 'Revenue / Payments',  desc: 'Full payment log with org, amount, and date',        accent: 'violet'  },

function ReportsPage() {
  const [busy, setBusy] = React.useState(null);

  const toCSV = (rows, cols) => {
    const esc = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
    return [cols.join(','), ...rows.map(r => cols.map(c => esc(r[c])).join(','))].join('\n');
  };

  const download = (csv, name) => {
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
  };

  const exportCSV = async (id) => {
    setBusy(id);
    try {
      if (id === 'users') {
        const d = await api('/api/superadmin/users?page=1');
        const rows = (d.users || []).map(u => ({
          name: u.name, email: u.email, role: u.role,
          mode: u.company?.mode || '', org: u.company?.name || '',
          joined: u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '',
        }));
        download(toCSV(rows, ['name','email','role','mode','org','joined']), 'kodex-users.csv');
      } else if (id === 'organizations') {
        const d = await api('/api/superadmin/overview');
        const rows = (d.companies || []).map(c => ({
          name: c.name, mode: c.mode, users: c.userCount,
          status: c.subscriptionActive ? 'active' : c.isTrialActive ? 'trial' : 'expired',
          admin: c.adminEmail || '', revenue: c.revenue || 0,
        }));
        download(toCSV(rows, ['name','mode','users','status','admin','revenue']), 'kodex-orgs.csv');
      } else if (id === 'subscriptions') {
        const d = await api('/api/superadmin/overview');
        const rows = (d.companies || []).map(c => ({
          name: c.name, mode: c.mode,
          subscriptionActive: c.subscriptionActive, trialActive: c.isTrialActive,
          trialDaysLeft: c.trialDaysRemaining || 0,
          endDate: c.subscriptionEndDate ? new Date(c.subscriptionEndDate).toLocaleDateString() : '',
        }));
        download(toCSV(rows, ['name','mode','subscriptionActive','trialActive','trialDaysLeft','endDate']), 'kodex-subscriptions.csv');
      } else if (id === 'revenue') {
        const d = await api('/api/superadmin/payments');
        const rows = (d.payments || []).map(p => ({
          org: p.company?.name || '', mode: p.company?.mode || '',
          amount: p.amount, type: p.type || p.plan || '',
          date: p.paidAt ? new Date(p.paidAt).toLocaleDateString() : '',
        }));
        download(toCSV(rows, ['org','mode','amount','type','date']), 'kodex-revenue.csv');
      }
    } catch { alert('Export failed'); }
    finally { setBusy(null); }
  };

  const dot = { sky: 'bg-sky-400', indigo: 'bg-indigo-400', emerald: 'bg-emerald-400', violet: 'bg-violet-400' };
  const ring = { sky: 'bg-sky-50', indigo: 'bg-indigo-50', emerald: 'bg-emerald-50', violet: 'bg-violet-50' };
  const btn  = { sky: 'bg-sky-600 hover:bg-sky-700', indigo: 'bg-indigo-600 hover:bg-indigo-700', emerald: 'bg-emerald-600 hover:bg-emerald-700', violet: 'bg-violet-600 hover:bg-violet-700' };

  return (
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
      {REPORT_CARDS.map(card => (
        <div key={card.id} className="bg-white rounded-2xl p-6 shadow-sm flex flex-col gap-4">
          <div className={`w-10 h-10 rounded-xl ${ring[card.accent]} flex items-center justify-center`}>
            <span className={`w-3 h-3 rounded-full ${dot[card.accent]}`} />
          </div>
          <div>
            <p className="font-bold text-gray-800">{card.label}</p>
            <p className="text-sm text-gray-400 mt-1">{card.desc}</p>
          </div>
          <button
            onClick={() => exportCSV(card.id)}
            disabled={busy === card.id}
            className={`mt-auto self-start px-4 py-2 rounded-xl text-white text-sm font-semibold transition-colors disabled:opacity-50 ${btn[card.accent]}`}
          >
            {busy === card.id ? 'Preparing…' : 'Export CSV'}
          </button>
        </div>
      ))}
    </div>
  );
}

// ── SettingsPage ──────────────────────────────────────────────────────────────
function SettingsPage() {
  const [form, setForm]   = React.useState({ trialDays: 30, academicPrice: 300, corporatePrice: 150, currency: 'GHS' });
  const [saved, setSaved] = React.useState(false);
  const [saving, setSaving] = React.useState(false);

  React.useEffect(() => {
    api('/api/superadmin/settings').then(d => {
      setForm({ trialDays: d.trialDays, academicPrice: d.academicPrice, corporatePrice: d.corporatePrice, currency: d.currency });
    }).catch(() => {});
  }, []);

  const set = (k, v) => { setForm(f => ({ ...f, [k]: v })); setSaved(false); };

  const save = async () => {
    setSaving(true);
    try {
      await api('/api/superadmin/settings', { method: 'POST', body: JSON.stringify(form) });
      setSaved(true);
    } catch { alert('Failed to save'); }
    finally { setSaving(false); }
  };

  const Field = ({ label, hint, field, type = 'number', prefix }) => (
    <div>
      <label className="block text-xs font-semibold text-gray-500 mb-1">{label}</label>
      <div className="flex items-center gap-2">
        {prefix && <span className="text-sm text-gray-400">{prefix}</span>}
        <input
          type={type} value={form[field]} onChange={e => set(field, type === 'number' ? Number(e.target.value) : e.target.value)}
          className="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 w-32"
        />
      </div>
      {hint && <p className="text-xs text-gray-400 mt-1">{hint}</p>}
    </div>
  );

  const Section = ({ title, children }) => (
    <div className="bg-white rounded-2xl p-6 shadow-sm space-y-4">
      <h3 className="text-sm font-bold text-gray-700 border-b border-gray-50 pb-3">{title}</h3>
      {children}
    </div>
  );

  return (
    <div className="max-w-xl space-y-5">
      <Section title="Trial Settings">
        <Field label="Trial Duration (days)" hint="Default trial period for new organizations" field="trialDays" />
      </Section>

      <Section title="Pricing">
        <Field label="Academic Price (per semester)" prefix="₵" hint="Charged to institutions every semester" field="academicPrice" />
        <Field label="Corporate Price (per month)"   prefix="₵" hint="Charged to companies every month"      field="corporatePrice" />
        <Field label="Currency" type="text" hint="Display currency code" field="currency" />
      </Section>

      <div className="flex items-center gap-3">
        <button onClick={save} disabled={saving}
          className="px-5 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50">
          {saving ? 'Saving…' : 'Save Settings'}
        </button>
        {saved && <span className="text-sm text-emerald-500 font-medium">Saved!</span>}
      </div>
    </div>
  );
}

// ── OrgDetailPage ─────────────────────────────────────────────────────────────
function OrgDetailPage({ org, onBack }) {
  const [staff, setStaff] = React.useState(null);

  React.useEffect(() => {
    api(`/api/superadmin/companies/${org._id}/lecturers`)
      .then(d => setStaff(d.lecturers || d))
      .catch(() => setStaff([]));
  }, [org._id]);

  const rc = org.roleCounts || {};
  const roleGroups = [
    { label: 'Admins',    key: 'admin',    cls: 'bg-indigo-50 text-indigo-600' },
    { label: 'Managers',  key: 'manager',  cls: 'bg-violet-50 text-violet-600' },
    { label: 'HODs',      key: 'hod',      cls: 'bg-sky-50 text-sky-600' },
    { label: 'Lecturers / Staff', key: 'lecturer', cls: 'bg-teal-50 text-teal-600' },
    { label: 'Employees', key: 'employee', cls: 'bg-orange-50 text-orange-600' },
    { label: 'Students',  key: 'student',  cls: 'bg-gray-100 text-gray-500' },
  ];

  const subStatus = org.isTrialActive ? `Trial · ${org.trialDaysRemaining}d left` : org.subscriptionActive ? 'Active' : 'Expired';
  const subCls    = org.isTrialActive ? 'bg-amber-50 text-amber-600' : org.subscriptionActive ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600';
  const endDate   = org.subscriptionEndDate || org.trialEndDate;

  return (
    <div className="space-y-5">
      {/* back */}
      <button onClick={onBack} className="flex items-center gap-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium">
        ← Back to Organizations
      </button>

      {/* header */}
      <div className="bg-white rounded-2xl p-6 shadow-sm flex items-center gap-5">
        <div className="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center flex-shrink-0">
          <span className="text-indigo-500 font-bold text-xl">{(org.name || '?')[0].toUpperCase()}</span>
        </div>
        <div className="flex-1 min-w-0">
          <h2 className="text-lg font-bold text-gray-800">{org.name}</h2>
          <p className="text-sm text-gray-400 capitalize">{org.mode} · {org.adminEmail || 'no admin'}</p>
        </div>
        <span className={`px-3 py-1 rounded-full text-sm font-semibold flex-shrink-0 ${subCls}`}>{subStatus}</span>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {/* user breakdown */}
        <div className="bg-white rounded-2xl p-5 shadow-sm space-y-3">
          <h3 className="text-sm font-bold text-gray-700">User Breakdown</h3>
          <div className="grid grid-cols-3 gap-3">
            <div className="text-center">
              <p className="text-2xl font-bold text-gray-800">{org.userCount || 0}</p>
              <p className="text-xs text-gray-400">Total</p>
            </div>
            {roleGroups.filter(r => rc[r.key] > 0).map(r => (
              <div key={r.key} className="text-center">
                <p className="text-lg font-bold text-gray-800">{rc[r.key]}</p>
                <p className="text-xs text-gray-400">{r.label}</p>
              </div>
            ))}
          </div>
        </div>

        {/* subscription */}
        <div className="bg-white rounded-2xl p-5 shadow-sm space-y-2">
          <h3 className="text-sm font-bold text-gray-700">Subscription</h3>
          <div className="space-y-1.5 text-sm">
            <div className="flex justify-between"><span className="text-gray-400">Status</span><span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${subCls}`}>{subStatus}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Mode</span><span className="text-gray-700 capitalize">{org.mode}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Pricing</span><span className="text-gray-700">{org.mode === 'academic' ? '₵300 / semester' : '₵150 / month'}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Expires</span><span className="text-gray-700">{endDate ? new Date(endDate).toLocaleDateString() : '—'}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Revenue</span><span className="text-emerald-600 font-semibold">GHS {Number(org.revenue || 0).toLocaleString()}</span></div>
          </div>
        </div>
      </div>

      {/* staff list */}
      <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-50">
          <span className="text-sm font-bold text-gray-700">Staff & Roles</span>
          <span className="text-xs text-gray-400">{staff === null ? '…' : `${staff.length} non-student members`}</span>
        </div>
        {staff === null && <p className="px-5 py-8 text-center text-sm text-gray-300">Loading…</p>}
        {staff !== null && staff.length === 0 && <p className="px-5 py-8 text-center text-sm text-gray-300">No staff found</p>}
        {staff !== null && staff.length > 0 && (
          <ul className="divide-y divide-gray-50">
            {staff.map(u => (
              <li key={u._id} className="flex items-center gap-3 px-5 py-3 hover:bg-gray-50">
                <span className={`px-2 py-0.5 rounded-full text-xs font-semibold flex-shrink-0 ${ROLE_BADGE[u.role] || 'bg-gray-100 text-gray-500'}`}>{u.role}</span>
                <span className="font-medium text-gray-800 truncate">{u.name || u.email}</span>
                <span className="text-xs text-gray-400 truncate ml-auto">{u.email}</span>
              </li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

// ── Layout ───────────────────────────────────────────────────────────────────
function Layout() {
  const [section, setSection] = useState('dashboard');
  const title = PAGES[section]?.title || section;

  return (
    <div className="flex min-h-screen bg-slate-100">
      <Sidebar active={section} onNav={setSection} />
      <div className="flex-1 flex flex-col overflow-auto">
        <Topbar title={title} />
        <main className="flex-1 p-6">
          {section === 'dashboard'     ? <DashboardPage />     :
           section === 'organizations' ? <OrganizationsPage /> :
           section === 'users'         ? <UsersPage />         :
           section === 'subscriptions' ? <SubscriptionsPage /> :
           section === 'payments'      ? <PaymentsPage />      :
           section === 'approvals'     ? <ApprovalsPage />     :
           section === 'reports'       ? <ReportsPage />       :
           section === 'settings'      ? <SettingsPage />      :
           <PagePlaceholder id={section} />}
        </main>
      </div>
    </div>
  );
}

// ── Mount ────────────────────────────────────────────────────────────────────
const _appEl = document.getElementById('app');
if (_appEl) {
  ReactDOM.createRoot(_appEl).render(<Layout />);
}
</script>

</body>
</html>
