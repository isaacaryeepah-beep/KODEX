<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Starting Class — Dikly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --card: #151c2e;
      --border: rgba(255,255,255,.07);
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --green: #10b981;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html { height: -webkit-fill-available; -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: calc(var(--sat) + 24px) 20px calc(var(--sab) + 24px);
      overflow: hidden;
      position: relative;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,110,247,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(124,58,237,.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrap {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
      position: relative; z-index: 1;
    }

    /* ── LOADING STATE ── */
    #loadScreen { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }

    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .brand-logo {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-weight: 800; font-size: 20px; color: #fff;
      box-shadow: 0 8px 32px rgba(79,110,247,.4);
    }
    .brand-name { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }

    .meeting-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    }

    .host-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25);
      color: #34d399; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      letter-spacing: .3px; text-transform: uppercase;
      align-self: flex-start;
    }
    .host-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }

    .meeting-title {
      font-size: 24px; font-weight: 700; letter-spacing: -.4px; line-height: 1.2;
    }

    .progress-area { display: flex; flex-direction: column; gap: 10px; }
    .progress-label {
      display: flex; justify-content: space-between; align-items: center;
    }
    .status-text { font-size: 14px; color: var(--muted); }
    .step-text { font-size: 12px; color: var(--muted); }
    .progress-bar {
      height: 3px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .steps {
      display: flex; flex-direction: column; gap: 10px;
    }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.02);
      transition: background .2s;
    }
    .step.active { background: rgba(79,110,247,.08); }
    .step.done { opacity: .5; }
    .step-icon {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      display: grid; place-items: center;
      background: rgba(255,255,255,.05);
      font-size: 14px;
    }
    .step.active .step-icon { background: rgba(79,110,247,.2); }
    .step.done .step-icon { background: rgba(16,185,129,.15); }
    .step-label { font-size: 13px; color: var(--muted); }
    .step.active .step-label { color: var(--text); font-weight: 500; }
    .step-spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(79,110,247,.2);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      margin-left: auto; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-check { margin-left: auto; color: #10b981; font-size: 14px; flex-shrink: 0; }

    /* ── ERROR STATE ── */
    #errorScreen {
      display: none; flex-direction: column; align-items: center; gap: 24px; width: 100%;
    }
    .error-card {
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 24px;
      padding: 32px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }
    .error-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(239,68,68,.1);
      display: grid; place-items: center; font-size: 26px;
    }
    .error-title { font-size: 20px; font-weight: 700; }
    .error-msg { font-size: 14px; color: var(--muted); line-height: 1.65; max-width: 300px; }

    .actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      touch-action: manipulation; transition: transform .1s, opacity .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,110,247,.35);
    }
    .btn-ghost {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- LOADING -->
  <div id="loadScreen">
    <div class="brand">
      <div class="brand-logo">D</div>
      <span class="brand-name">Dikly</span>
    </div>

    <div class="meeting-card">
      <button onclick="history.back()" style="position:absolute;top:14px;left:14px;background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:8px;font-family:inherit;transition:color .15s" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.5)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
      <div class="host-badge">Host</div>
      <div class="meeting-title" id="meetingTitle">Starting your class…</div>

      <div class="progress-area">
        <div class="progress-label">
          <span class="status-text" id="statusText">Preparing meeting room</span>
          <span class="step-text" id="stepText">1 / 3</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="steps">
        <div class="step active" id="step1">
          <div class="step-icon">🔐</div>
          <div class="step-label">Authenticating session</div>
          <div class="step-spinner" id="spin1"></div>
        </div>
        <div class="step" id="step2">
          <div class="step-icon">🏫</div>
          <div class="step-label">Setting up meeting room</div>
        </div>
        <div class="step" id="step3">
          <div class="step-icon">🚀</div>
          <div class="step-label">Launching as host</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen">
    <div class="brand">
      <div class="brand-logo">D</div>
      <span class="brand-name">Dikly</span>
    </div>
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Cannot Start Class</div>
      <div class="error-msg" id="errMsg">Something went wrong.</div>
      <div class="actions">
        <button class="btn btn-primary" onclick="init()">Try Again</button>
        <button class="btn btn-ghost" onclick="history.back()">Go Back</button>
      </div>
    </div>
  </div>

</div>
<script>
'use strict';

const _p = new URLSearchParams(location.search);
const MEETING_ID = _p.get('meeting') || _p.get('id') || '';

function getAuthToken() {
  const urlToken = _p.get('token');
  if (urlToken) return urlToken;
  try {
    const s = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
    if (s?.meetingId === MEETING_ID && s.authToken) return s.authToken;
  } catch (_) {}
  return localStorage.getItem('token') || localStorage.getItem('dikly_token') ||
         localStorage.getItem('jwt_token') || localStorage.getItem('auth_token') ||
         sessionStorage.getItem('token') || '';
}

const AUTH_TOKEN = getAuthToken();

function setProgress(step, pct, label) {
  document.getElementById('statusText').textContent = label;
  document.getElementById('stepText').textContent = `${step} / 3`;
  document.getElementById('progressFill').style.width = pct + '%';

  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    const sp = el.querySelector('.step-spinner');
    const ck = el.querySelector('.step-check');

    if (i < step) {
      el.className = 'step done';
      if (sp) sp.remove();
      if (!ck) { const c = document.createElement('span'); c.className = 'step-check'; c.textContent = '✓'; el.appendChild(c); }
    } else if (i === step) {
      el.className = 'step active';
      if (!sp) { const s = document.createElement('div'); s.className = 'step-spinner'; s.id = 'spin' + i; el.appendChild(s); }
    } else {
      el.className = 'step';
    }
  }
}

async function init() {
  document.getElementById('loadScreen').style.display = 'flex';
  document.getElementById('errorScreen').style.display = 'none';

  if (!MEETING_ID) return showError('No meeting ID provided. Please go back and try again.');
  if (!AUTH_TOKEN) return showError('Your session has expired. Please log in to Dikly and try again.');

  setProgress(1, 15, 'Authenticating session…');

  try {
    await delay(400);
    setProgress(2, 40, 'Starting meeting room…');

    // Lecturers start the meeting (sets status → live), then join it
    const startR = await fetch(`/api/meetings/${MEETING_ID}/start`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
    });
    const startBody = await startR.json().catch(() => ({}));

    if (!startR.ok) {
      if (startR.status === 402 && startBody.subscriptionExpired) { _subBlock(startBody.message, startBody.isAdmin); return; }
      if (startBody.status === 'ended' || startBody.status === 'cancelled') return showError('This meeting has ended or been cancelled.');
      // 403 from isOwner means this user is not the host
      if (startR.status === 403) return showError('This page is for class hosts only. Students should use the Join Class link.');
      throw new Error(startBody.error || startBody.message || `Server error (${startR.status})`);
    }

    const startData = startBody.data || startBody;
    const meetingUrl = startData.meetingUrl;
    if (!meetingUrl) return showError('No meeting room configured — ask your admin to set LIVEKIT_URL, LIVEKIT_API_KEY and LIVEKIT_API_SECRET.');

    setProgress(3, 90, 'Launching meeting room…');
    await delay(400);
    setProgress(3, 100, 'Opening your class now…');
    await delay(300);

    window.location.href = meetingUrl;

  } catch (err) {
    showError(err.message || 'Unexpected error. Please check your connection and try again.');
  }
}

function showError(msg) {
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errorScreen').style.display = 'flex';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function _subBlock(msg, isAdmin) {
  if (document.getElementById('_sub-bl')) return;
  const d = document.createElement('div');
  d.id = '_sub-bl';
  d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.97);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box';
  d.innerHTML = `<div style="background:#fff;border-radius:16px;max-width:440px;width:100%;padding:36px 28px;text-align:center"><div style="font-size:40px;margin-bottom:16px">🔒</div><h2 style="margin:0 0 12px;font-size:20px;color:#0f172a">Subscription Expired</h2><p style="margin:0 0 24px;font-size:14px;color:#475569;line-height:1.6">${msg||"Your institution's subscription has expired."}</p>${isAdmin?`<button onclick="location.href='/'" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;width:100%">Go to Subscription Page</button>`:'<div style="background:#f8fafc;border-radius:8px;padding:14px;font-size:13px;color:#64748b">Contact your <strong>institution administrator</strong> to renew.</div>'}<p style="margin:16px 0 0;font-size:12px;color:#94a3b8">Support: <strong>support@dikly.sbs</strong></p></div>`;
  document.body.appendChild(d);
  document.body.style.overflow = 'hidden';
}

init();
</script>
</body>
</html>
