<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <!-- Prevent any back-navigation cache from restoring this page mid-redirect -->
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Starting Meeting — DIKLY</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:      #0a0c10;
      --card:    #1a1e28;
      --border:  #2a2f3d;
      --accent:  #3b82f6;
      --danger:  #ef4444;
      --text:    #e2e8f0;
      --muted:   #6b7280;
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html {
      height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      position: fixed; inset: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding:
        calc(var(--sat) + 28px)
        28px
        calc(var(--sab) + 28px);
    }

    /* ── Shared screen layout ── */
    .screen {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center;
    }

    /* ── Logo ── */
    .logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--accent);
      display: grid; place-items: center;
      font-size: 34px; font-weight: 800; color: #fff;
      box-shadow: 0 0 56px rgba(59,130,246,.35);
      flex-shrink: 0;
    }

    /* ── Text ── */
    .title { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    .status { font-size: 14px; color: var(--muted); line-height: 1.5; min-height: 22px; }

    /* ── Spinner ── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error screen ── */
    .err-icon  { font-size: 52px; line-height: 1; }
    .err-title { font-size: 20px; font-weight: 700; color: var(--danger); }
    .err-msg   { font-size: 14px; color: var(--muted); max-width: 300px; line-height: 1.65; }

    /* ── Buttons ── */
    .actions {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%;
    }
    .btn {
      width: 100%; padding: 16px;
      border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>

<!-- Loading -->
<div class="screen" id="loadScreen">
  <div class="logo">D</div>
  <div class="title">DIKLY Classes</div>
  <div class="spinner"></div>
  <div class="status" id="status">Preparing meeting room…</div>
</div>

<!-- Error -->
<div class="screen" id="errorScreen" style="display:none">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Cannot Start Meeting</div>
  <div class="err-msg" id="errMsg">Something went wrong.</div>
  <div class="actions">
    <button class="btn btn-primary"   onclick="init()">Try Again</button>
    <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
  </div>
</div>

<script>
'use strict';

// ── URL params ────────────────────────────────────────────────────────────────
const _params    = new URLSearchParams(location.search);
const MEETING_ID = _params.get('meeting') || _params.get('id') || '';

// ── API base detection ────────────────────────────────────────────────────────
// Derive api.<root-domain> from the current hostname, regardless of whether
// we're on app.dikly.sbs, dikly.sbs, or localhost.
function getApiBase() {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return '';
  const parts = h.split('.');
  // root domain = last two segments (e.g. "dikly.sbs")
  const root = parts.length >= 3 ? parts.slice(-2).join('.') : h;
  return location.protocol + '//api.' + root;
}

// ── Auth token ────────────────────────────────────────────────────────────────
function getAuthToken() {
  // 1. Explicit token in URL (used when portal embeds token in redirect)
  const urlToken = _params.get('token');
  if (urlToken) return urlToken;
  // 2. Session-scoped meeting token stored by session-preflight
  try {
    const s = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
    if (s?.meetingId === MEETING_ID && s.authToken) return s.authToken;
  } catch (_) {}
  // 3. Standard auth token storage locations
  return (
    localStorage.getItem('token') ||
    localStorage.getItem('jwt_token') ||
    localStorage.getItem('auth_token') ||
    sessionStorage.getItem('token') ||
    ''
  );
}

const API_BASE   = getApiBase();
const AUTH_TOKEN = getAuthToken();

// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
  // Reset to loading state (supports "Try Again")
  document.getElementById('loadScreen').style.display = 'flex';
  document.getElementById('errorScreen').style.display = 'none';

  if (!MEETING_ID) {
    return showError('No meeting ID provided. Please go back and try again.');
  }
  if (!AUTH_TOKEN) {
    return showError('Your session has expired. Please log in to DIKLY and try again.');
  }

  setStatus('Connecting to server…');

  try {
    const r = await fetch(`${API_BASE}/api/meetings/${MEETING_ID}/join`, {
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
    });
    const body = await r.json().catch(() => ({}));

    if (!r.ok) {
      const msg = body.error || body.message || `Server error (${r.status})`;
      // Meeting not started yet — moderators auto-start, so this shouldn't happen;
      // but if the backend returns scheduled for some reason, give a friendly message.
      if (body.status === 'scheduled') {
        return showError('The meeting hasn\'t been activated yet. Please wait and try again, or contact your administrator.');
      }
      if (body.status === 'ended' || body.status === 'cancelled') {
        return showError('This meeting has ended or been cancelled.');
      }
      throw new Error(msg);
    }

    const data = body.data || body;

    // This page is lecturers/moderators only
    if (!data.isModerator) {
      return showError('This page is for class hosts only. Students should use the Join Meeting link from the portal.');
    }

    const meetingUrl = data.meetingUrl;
    if (!meetingUrl) {
      return showError('The server did not return a meeting URL. Please contact support.');
    }

    setStatus('Launching meeting room…');

    // Full-page redirect — the only correct approach on mobile Safari.
    // Permissions (camera/microphone) are requested by Jitsi on meet.dikly.live,
    // not here, so there is no permission-grant reload loop.
    setTimeout(() => { window.location.href = meetingUrl; }, 350);

  } catch (err) {
    showError(err.message || 'Unexpected error. Please check your connection and try again.');
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function showError(msg) {
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errorScreen').style.display = 'flex';
}

// ── Run ───────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
