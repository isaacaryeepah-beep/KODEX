<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Joining Class — Dikly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --card: #151c2e;
      --border: rgba(255,255,255,.07);
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --green: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html { height: -webkit-fill-available; -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: calc(var(--sat) + 24px) 20px calc(var(--sab) + 24px);
      overflow: hidden; position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,110,247,.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(124,58,237,.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 0; position: relative; z-index: 1; }

    /* ── SHARED ── */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .brand-logo {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-weight: 800; font-size: 20px; color: #fff;
      box-shadow: 0 8px 32px rgba(79,110,247,.4);
    }
    .brand-name { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }

    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* ── LOADING ── */
    #loadScreen { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }

    .join-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(79,110,247,.12); border: 1px solid rgba(79,110,247,.25);
      color: #818cf8; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      letter-spacing: .3px; text-transform: uppercase;
      align-self: flex-start;
    }

    .meeting-title { font-size: 22px; font-weight: 700; letter-spacing: -.3px; line-height: 1.2; }

    .host-info { display: flex; align-items: center; gap: 10px; }
    .host-avatar {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .host-meta { display: flex; flex-direction: column; }
    .host-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .host-name { font-size: 14px; font-weight: 600; }

    .divider { height: 1px; background: var(--border); }

    .progress-area { display: flex; flex-direction: column; gap: 10px; }
    .progress-label { display: flex; justify-content: space-between; align-items: center; }
    .status-text { font-size: 14px; color: var(--muted); }
    .progress-bar { height: 3px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(79,110,247,.15);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
      align-self: center;
    }

    /* ── WAIT STATE ── */
    #waitScreen {
      display: none; flex-direction: column; align-items: center; gap: 28px; width: 100%;
    }
    .wait-card {
      border-color: rgba(245,158,11,.15) !important;
    }
    .wait-icon-wrap {
      width: 64px; height: 64px; border-radius: 20px;
      background: rgba(245,158,11,.1);
      display: grid; place-items: center;
      font-size: 32px; align-self: center;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }

    .wait-title { font-size: 20px; font-weight: 700; text-align: center; }
    .wait-msg { font-size: 14px; color: var(--muted); line-height: 1.65; text-align: center; }

    .countdown-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px; background: rgba(245,158,11,.06);
      border: 1px solid rgba(245,158,11,.15); border-radius: 14px;
    }
    .countdown-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .countdown-timer { font-size: 28px; font-weight: 800; color: #fcd34d; font-variant-numeric: tabular-nums; letter-spacing: -.5px; }

    /* ── ERROR STATE ── */
    #errorScreen { display: none; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
    .error-card { border-color: rgba(239,68,68,.15) !important; text-align: center; }
    .error-icon-wrap {
      width: 64px; height: 64px; border-radius: 20px;
      background: rgba(239,68,68,.1);
      display: grid; place-items: center; font-size: 28px; align-self: center;
    }
    .error-title { font-size: 20px; font-weight: 700; text-align: center; }
    .error-msg { font-size: 14px; color: var(--muted); line-height: 1.65; }

    /* ── BUTTONS ── */
    .actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      touch-action: manipulation; transition: transform .1s, opacity .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; box-shadow: 0 4px 20px rgba(79,110,247,.35);
    }
    .btn-warning {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.25);
      color: #fcd34d;
    }
    .btn-ghost {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border); color: var(--muted);
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- LOADING -->
  <div id="loadScreen">
    <div class="brand">
      <div class="brand-logo">D</div>
      <span class="brand-name">Dikly</span>
    </div>
    <div class="card" style="position:relative;">
      <button onclick="location.href='/index.html'" style="position:absolute;top:14px;left:14px;background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:8px;font-family:inherit;transition:color .15s" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.5)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
      <div class="join-badge">Joining Class</div>
      <div class="meeting-title" id="meetingTitle">Connecting to class…</div>
      <div class="host-info" id="hostInfo" style="display:none">
        <div class="host-avatar" id="hostAvatar">?</div>
        <div class="host-meta">
          <span class="host-label">Lecturer</span>
          <span class="host-name" id="hostName">—</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="progress-area">
        <div class="progress-label">
          <span class="status-text" id="statusText">Verifying your access</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- WAITING FOR LECTURER -->
  <div id="waitScreen">
    <div class="brand">
      <div class="brand-logo">D</div>
      <span class="brand-name">Dikly</span>
    </div>
    <div class="card wait-card">
      <div class="wait-icon-wrap">⏳</div>
      <div class="wait-title">Waiting for Lecturer</div>
      <div class="wait-msg" id="waitMsg">
        Your lecturer hasn't opened the room yet.<br>You'll be admitted automatically when they start.
      </div>
      <div class="countdown-wrap" id="countdownWrap">
        <span class="countdown-label">Checking again in</span>
        <span class="countdown-timer" id="countdownTimer">20s</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-warning" onclick="retryNow()">Check Now</button>
      <button class="btn btn-ghost" onclick="location.href='/index.html'">Go Back</button>
    </div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen">
    <div class="brand">
      <div class="brand-logo">D</div>
      <span class="brand-name">Dikly</span>
    </div>
    <div class="card error-card">
      <div class="error-icon-wrap">⚠️</div>
      <div class="error-title">Cannot Join Class</div>
      <div class="error-msg" id="errMsg">Something went wrong.</div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="init()">Try Again</button>
      <button class="btn btn-ghost" onclick="location.href='/index.html'">Go Back</button>
    </div>
  </div>

</div>
<script>
'use strict';

const _p = new URLSearchParams(location.search);
const MEETING_ID = _p.get('meeting') || _p.get('id') || '';

// Corporate wording — the app appends corp=1 for corporate-mode users so
// this shared page doesn't talk about "classes"/"lecturers".
const IS_CORP = _p.get('corp') === '1';

// Token handoff: accept ?dikly_auth= from the opener (contexts that don't
// share the app's storage, e.g. iOS PWA → in-app Safari viewer), persist it
// for this context, and strip it from the address bar.
const _handoff = _p.get('dikly_auth');
if (_handoff) {
  try { localStorage.setItem('token', _handoff); } catch (_) {}
  _p.delete('dikly_auth');
  history.replaceState(null, '', location.pathname + (_p.toString() ? '?' + _p.toString() : ''));
}

function getAuthToken() {
  try {
    const s = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
    if (s?.meetingId === MEETING_ID && s.authToken) return s.authToken;
  } catch (_) {}
  return localStorage.getItem('token') || localStorage.getItem('dikly_token') ||
         localStorage.getItem('jwt_token') || localStorage.getItem('auth_token') ||
         sessionStorage.getItem('token') || '';
}

const AUTH_TOKEN = getAuthToken();
let _retryTimer = null;
let _countdownTimer = null;

function setStatus(msg, pct) {
  document.getElementById('statusText').textContent = msg;
  if (pct !== undefined) document.getElementById('progressFill').style.width = pct + '%';
}

async function init() {
  clearTimers();
  show('loadScreen');
  setStatus('Verifying your access…', 10);

  if (!MEETING_ID) return showError('No meeting ID provided. Please go back and try again.');
  if (!AUTH_TOKEN) return showError('Your session has expired. Please log in to Dikly and try again.');

  await delay(300);
  setStatus('Connecting to server…', 35);

  try {
    const r = await fetch(`/api/meetings/${MEETING_ID}/join`, {
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
    });
    const body = await r.json().catch(() => ({}));

    if (!r.ok) {
      if (r.status === 402 && body.subscriptionExpired) { _subBlock(body.message, body.isAdmin); return; }
      if (body.status === 'scheduled') return showWait(body.scheduledStart, body.hostName);
      if (body.status === 'ended' || body.status === 'cancelled') return showError(`This ${IS_CORP ? 'meeting' : 'class'} has ended or been cancelled.`);
      throw new Error(body.error || body.message || `Server error (${r.status})`);
    }

    const data = body.data || body;

    if (data.isModerator) {
      window.location.replace(`/lecturer-meeting?meeting=${MEETING_ID}${IS_CORP ? '&corp=1' : ''}${AUTH_TOKEN ? '&dikly_auth=' + encodeURIComponent(AUTH_TOKEN) : ''}`);
      return;
    }

    // Show meeting info
    if (data.title) document.getElementById('meetingTitle').textContent = data.title;
    if (data.hostName) {
      document.getElementById('hostName').textContent = data.hostName;
      document.getElementById('hostAvatar').textContent = data.hostName.charAt(0).toUpperCase();
      document.getElementById('hostInfo').style.display = 'flex';
    }

    setStatus(IS_CORP ? 'Launching secure meeting room…' : 'Launching secure classroom…', 80);

    fetch(`/api/meetings/${MEETING_ID}/preflight`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
    }).catch(() => {});

    fetch(`/api/meetings/${MEETING_ID}/attendance/join`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
    }).catch(() => {});

    setStatus(IS_CORP ? 'Opening meeting room…' : 'Opening classroom…', 100);
    await delay(400);
    // Capacitor WebView blocks navigation to external domains; open in system browser
    if (window.Capacitor?.isNativePlatform?.()) {
      window.open(data.meetingUrl, '_system');
    } else {
      // Token handoff to the room page — ALWAYS, not just cross-origin: this
      // flow may be running in a context whose storage the room page can't
      // rely on (iOS PWA → in-app Safari viewer). stream-room ingests
      // ?dikly_auth= and strips it from the URL.
      let joinUrl = data.meetingUrl;
      try {
        const destUrl = new URL(joinUrl, location.origin);
        if (AUTH_TOKEN) {
          destUrl.searchParams.set('dikly_auth', AUTH_TOKEN);
          joinUrl = destUrl.toString();
        }
      } catch (_) {}
      window.location.href = joinUrl;
    }

  } catch (err) {
    showError(err.message || 'Unexpected error. Please check your connection and try again.');
  }
}

function showWait(scheduledStart, hostName) {
  show('waitScreen');
  let msg = (IS_CORP ? 'The host hasn\'t opened the room yet.' : 'Your lecturer hasn\'t opened the room yet.') + '\nYou\'ll be admitted automatically when they start.';
  if (scheduledStart) {
    const d = new Date(scheduledStart);
    msg += `\n\nScheduled for ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}.`;
  }
  document.getElementById('waitMsg').textContent = msg;
  startCountdown(20);
}

function startCountdown(seconds) {
  clearTimers();
  let remaining = seconds;
  const el = document.getElementById('countdownTimer');
  el.textContent = remaining + 's';
  _countdownTimer = setInterval(() => {
    remaining--;
    el.textContent = remaining + 's';
    if (remaining <= 0) {
      clearInterval(_countdownTimer);
      init();
    }
  }, 1000);
}

function retryNow() { clearTimers(); init(); }

function showError(msg) {
  clearTimers();
  show('errorScreen');
  document.getElementById('errMsg').textContent = msg;
}

function show(id) {
  ['loadScreen', 'waitScreen', 'errorScreen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'flex' : 'none';
  });
}

function clearTimers() {
  clearTimeout(_retryTimer);
  clearInterval(_countdownTimer);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function _subBlock(msg, isAdmin) {
  if (document.getElementById('_sub-bl')) return;
  const d = document.createElement('div');
  d.id = '_sub-bl';
  d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.97);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box';
  d.innerHTML = `<div style="background:#fff;border-radius:16px;max-width:440px;width:100%;padding:36px 28px;text-align:center"><div style="font-size:40px;margin-bottom:16px">🔒</div><h2 style="margin:0 0 12px;font-size:20px;color:#0f172a">Subscription Expired</h2><p style="margin:0 0 24px;font-size:14px;color:#475569;line-height:1.6">${msg||"Your institution's subscription has expired."}</p>${isAdmin?`<button onclick="location.href='/'" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;width:100%">Go to Subscription Page</button>`:'<div style="background:#f8fafc;border-radius:8px;padding:14px;font-size:13px;color:#64748b">Contact your <strong>institution administrator</strong> to renew.</div>'}<p style="margin:16px 0 0;font-size:12px;color:#94a3b8">Support: <strong>support@dikly.sbs</strong></p></div>`;
  document.body.appendChild(d);
  document.body.style.overflow = 'hidden';
}

init();
</script>
</body>
</html>
