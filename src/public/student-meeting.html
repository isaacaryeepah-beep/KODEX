<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>DIKLY — Joining Class</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:      #0a0c10;
      --surface: #12151c;
      --card:    #1a1e28;
      --border:  #2a2f3d;
      --accent:  #3b82f6;
      --danger:  #ef4444;
      --warning: #f59e0b;
      --text:    #e2e8f0;
      --muted:   #6b7280;
      --radius:  12px;
      /* iOS safe areas — fall back to 0px on non-notch devices */
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left,   0px);
      --sar: env(safe-area-inset-right,  0px);
      /* bar-content = logical height of the visible bar row */
      --bar-content: 46px;
      /* bar-h = total fixed height including status-bar area */
      --bar-h: calc(var(--bar-content) + var(--sat));
    }

    /* ── iOS viewport + scroll-bounce fix ─────────────────────────────── */
    html {
      /* Fills available height incl. address bar on iOS < 15 */
      height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      /* position:fixed is the most reliable way to kill rubber-band scroll on iOS */
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Top bar ── */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      /* Push content below status bar on iPhone */
      padding-top: var(--sat);
      background: rgba(10,12,16,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    #topBarInner {
      height: var(--bar-content);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 calc(14px + var(--sar)) 0 calc(14px + var(--sal));
    }

    .logo-chip {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--accent); border-radius: 7px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 13px; color: #fff;
    }
    #meetingTitle {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .live-badge {
      flex-shrink: 0;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171; border-radius: 99px;
      padding: 3px 9px; font-size: 10px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--danger);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── Jitsi embed — fills everything below the top bar ── */
    #jitsiWrap {
      position: fixed;
      top: var(--bar-h);
      left: 0; right: 0; bottom: 0;
      background: #000;
    }
    #jitsiMount {
      width: 100%; height: 100%;
    }
    /* Force the Jitsi-created iframe to fill its container */
    #jitsiMount iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
      display: block;
    }

    /* ── Loading overlay ── */
    #loadOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      padding: 32px 24px;
      padding-top:    calc(var(--sat) + 32px);
      padding-bottom: calc(var(--sab) + 32px);
    }
    #loadOverlay.hidden { display: none; }

    .load-logo {
      width: 60px; height: 60px;
      background: var(--accent); border-radius: 16px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 30px; color: #fff;
      box-shadow: 0 0 40px rgba(59,130,246,.35);
    }
    .load-title {
      font-size: 20px; font-weight: 700;
      letter-spacing: -.3px; text-align: center;
    }
    .load-sub {
      font-size: 13px; color: var(--muted);
      text-align: center; line-height: 1.5;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 26px; height: 26px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }

    /* ── Error overlay ── */
    #errorOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center;
      padding: 32px 28px;
      padding-top:    calc(var(--sat) + 32px);
      padding-bottom: calc(var(--sab) + 32px);
    }
    #errorOverlay.visible { display: flex; }

    .err-icon  { font-size: 52px; line-height: 1; }
    .err-title {
      font-size: 20px; font-weight: 700; color: var(--danger);
    }
    .err-msg   {
      font-size: 14px; color: var(--muted);
      max-width: 320px; line-height: 1.65;
    }
    .err-actions {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 280px;
      margin-top: 4px;
    }
    .err-btn {
      width: 100%; padding: 15px 20px;
      border-radius: var(--radius); border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      touch-action: manipulation;
      transition: opacity .15s, transform .1s;
    }
    .err-btn:active { opacity: .8; transform: scale(.98); }
    .err-btn.primary   { background: var(--accent); color: #fff; }
    .err-btn.secondary {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Violation overlay ── */
    #violationOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.97);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      text-align: center;
      padding: 32px 28px;
      padding-top:    calc(var(--sat) + 32px);
      padding-bottom: calc(var(--sab) + 32px);
    }
    #violationOverlay.visible { display: flex; }

    .viol-icon  { font-size: 52px; line-height: 1; }
    .viol-title { font-size: 22px; font-weight: 700; color: var(--danger); }
    .viol-msg   {
      font-size: 14px; color: var(--muted);
      max-width: 340px; line-height: 1.65;
    }
    .viol-count {
      font-size: 28px; font-weight: 800; color: var(--warning);
      background: rgba(245,158,11,.12);
      padding: 8px 24px; border-radius: 10px;
    }
    .viol-resume {
      width: 100%; max-width: 260px;
      padding: 16px 20px;
      border-radius: var(--radius); border: none;
      background: var(--danger); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      touch-action: manipulation;
      margin-top: 4px;
      transition: opacity .15s;
    }
    .viol-resume:active { opacity: .85; }

    /* ── Reconnect toast ── */
    #reconnectToast {
      position: fixed;
      /* sit just below the top bar */
      top: calc(var(--bar-h) + 10px);
      left: 50%; transform: translateX(-50%);
      z-index: 200;
      background: var(--warning); color: #000;
      padding: 8px 18px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap;
      display: none; align-items: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      pointer-events: none;
    }
    #reconnectToast.visible { display: flex; }

    /* ── Prevent horizontal overflow ── */
    * { max-width: 100%; }
    img, video, iframe { max-width: 100%; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadOverlay">
  <div class="load-logo">D</div>
  <div class="load-title">DIKLY Classes</div>
  <div class="spinner"></div>
  <div class="load-sub" id="loadStatus">Connecting to class…</div>
</div>

<!-- Error -->
<div id="errorOverlay">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Cannot Join Class</div>
  <div class="err-msg" id="errMsg">Something went wrong.</div>
  <div class="err-actions">
    <button class="err-btn primary"   onclick="location.reload()">Try Again</button>
    <button class="err-btn secondary" onclick="history.back()">Go Back</button>
  </div>
</div>

<!-- Violation overlay (anti-cheat) -->
<div id="violationOverlay">
  <div class="viol-icon">⚠️</div>
  <div class="viol-title" id="violTitle">Tab Switch Detected</div>
  <div class="viol-msg"   id="violMsg">You left the class window. This has been logged and reported to your lecturer.</div>
  <div class="viol-count" id="violCount">0 violations</div>
  <button class="viol-resume" onclick="dismissViolation()">Return to Class</button>
</div>

<!-- Reconnect toast -->
<div id="reconnectToast">
  <div class="spinner" style="width:13px;height:13px;border-width:2px"></div>
  Reconnecting…
</div>

<!-- Top bar -->
<div id="topBar">
  <div id="topBarInner">
    <div class="logo-chip">D</div>
    <div id="meetingTitle">Class Session</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</div>

<!-- Jitsi embed -->
<div id="jitsiWrap">
  <div id="jitsiMount"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const params     = new URLSearchParams(location.search);
const MEETING_ID = params.get('meeting') || params.get('id') || '';
const AUTH_TOKEN = params.get('token')
  || (() => {
    try {
      const sd = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
      if (sd?.meetingId === MEETING_ID) return sd.authToken;
    } catch (_) {}
    return null;
  })()
  || localStorage.getItem('token')
  || localStorage.getItem('jwt_token')
  || '';

const API_BASE = (() => {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return '';
  const parts = h.split('.');
  if (['app','student','monitor'].includes(parts[0])) {
    return location.protocol + '//api.' + parts.slice(1).join('.');
  }
  return '';
})();

// ── State ─────────────────────────────────────────────────────────────────────
let api            = null;
let sessionData    = null;
let violations     = 0;
let anticheatOn    = false;
let reconnectTimer = null;
let reconnectCount = 0;
const MAX_RECONNECT = 4;

// ── iOS: keep --bar-h CSS var in sync with visual viewport ───────────────────
// Handles keyboard appearance and orientation changes correctly on iOS Safari.
function patchViewport() {
  const sat = parseInt(
    getComputedStyle(document.documentElement).getPropertyValue('--sat') || '0'
  );
  // nothing to patch — CSS env() handles it, but trigger a reflow if needed
  document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
}
window.addEventListener('resize', patchViewport, { passive: true });
window.addEventListener('orientationchange', patchViewport, { passive: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', patchViewport, { passive: true });
}
patchViewport();

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  if (!MEETING_ID) return showError('No meeting ID provided.');
  if (!AUTH_TOKEN)  return showError('Not authenticated. Please log in to DIKLY.');

  // Check for pre-fetched session data from preflight
  let prefetched = null;
  try {
    const sd = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
    if (sd?.meetingId === MEETING_ID) prefetched = sd;
  } catch (_) {}

  setStatus('Loading class details…');
  try {
    const r = await fetch(`${API_BASE}/api/meetings/${MEETING_ID}/join`, {
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
    });
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.error || body.message || 'HTTP ' + r.status);
    }
    const body  = await r.json();
    sessionData  = body.data;

    if (sessionData?.isModerator) {
      window.location.replace(`/lecturer-meeting?meeting=${MEETING_ID}`);
      return;
    }

    document.getElementById('meetingTitle').textContent =
      sessionData.meeting?.title || 'Class Session';

    if (!sessionData.jitsiToken) {
      return showError('Session token missing. Please return to the preflight check and try again.');
    }

    setStatus('Starting class room…');
    await loadJitsiAPI(sessionData.jitsiConfig.domain);
    initJitsi();
    activateAnticheat();
  } catch (e) {
    showError(e.message);
  }
})();

// ── Load External API ─────────────────────────────────────────────────────────
function loadJitsiAPI(domain) {
  return new Promise((resolve, reject) => {
    if (window.JitsiMeetExternalAPI) return resolve();
    const s = document.createElement('script');
    s.src = `https://${domain}/external_api.js`;
    s.onload  = resolve;
    s.onerror = () => reject(new Error(`Cannot connect to class server (${domain})`));
    document.head.appendChild(s);
  });
}

// ── Init Jitsi ────────────────────────────────────────────────────────────────
function initJitsi() {
  if (api) { try { api.dispose(); } catch (_) {} api = null; }

  const cfg = sessionData.jitsiConfig;

  api = new JitsiMeetExternalAPI(cfg.domain, {
    roomName:   cfg.roomName,
    jwt:        sessionData.jitsiToken,
    width:      '100%',
    height:     '100%',
    parentNode: document.getElementById('jitsiMount'),
    userInfo:   { displayName: cfg.displayName, email: cfg.email || '' },
    configOverwrite: {
      ...cfg.configOverwrite,
      startWithAudioMuted:       true,
      prejoinPageEnabled:        false,
      prejoinConfig:             { enabled: false },
      enableWelcomePage:         false,
      disableDeepLinking:        true,
      disableThirdPartyRequests: true,
      tokenAuthUrl:              false,
      p2p:                       { enabled: false },
      subject:                   cfg.subject,
      applicationName:           'DIKLY',
    },
    interfaceConfigOverwrite: {
      ...cfg.interfaceConfigOverwrite,
      SHOW_JITSI_WATERMARK:      false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      SHOW_BRAND_WATERMARK:      false,
      SHOW_POWERED_BY:           false,
      MOBILE_APP_PROMO:          false,
      NATIVE_APP_NAME:           'DIKLY',
      PROVIDER_NAME:             'DIKLY',
      APP_NAME:                  'DIKLY Classes',
      DEFAULT_BACKGROUND:        '#0a0c10',
      AUTHENTICATION_ENABLE:     false,
    },
  });

  api.addEventListener('videoConferenceJoined', () => {
    hide('loadOverlay');
    reconnectCount = 0;
    hideReconnectToast();
    // Grant camera/mic permissions on iOS by ensuring the iframe has the
    // correct allow attribute — Jitsi External API creates the iframe without it.
    try {
      const iframe = document.querySelector('#jitsiMount iframe');
      if (iframe) {
        iframe.setAttribute('allow',
          'camera; microphone; display-capture; fullscreen; autoplay; clipboard-write');
        iframe.setAttribute('allowfullscreen', '');
      }
    } catch (_) {}
  });

  api.addEventListener('videoConferenceLeft', (data) => {
    if (data?.reason === 'kicked') {
      showError('You were removed from this class by the moderator.');
      return;
    }
    scheduleReconnect();
  });

  api.addEventListener('connectionFailed', scheduleReconnect);
}

// ── Reconnect ─────────────────────────────────────────────────────────────────
function scheduleReconnect() {
  if (reconnectCount >= MAX_RECONNECT) {
    showError('Connection to the class was lost. Please refresh the page.');
    return;
  }
  reconnectCount++;
  showReconnectToast();
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(async () => {
    try {
      // Notify server of reconnect for monitoring
      await fetch(`${API_BASE}/api/meetings/${MEETING_ID}/reconnect`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
      });
      // Refresh session data (and JWT) so long meetings don't hit token expiry
      const r = await fetch(`${API_BASE}/api/meetings/${MEETING_ID}/join`, {
        headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
      });
      if (r.ok) {
        const body = await r.json();
        if (body.data?.jitsiToken) sessionData = body.data;
      }
    } catch (_) {}
    initJitsi();
  }, Math.min(2000 * reconnectCount, 8000));
}

// ── Anti-cheat ────────────────────────────────────────────────────────────────
function activateAnticheat() {
  anticheatOn = true;
  document.addEventListener('visibilitychange', () => {
    if (!anticheatOn) return;
    if (document.hidden) triggerViolation('tab_switch', 'Tab Switch Detected',
      'You left the class tab. This event has been logged and reported to your lecturer.');
  });
  window.addEventListener('blur', () => {
    if (!anticheatOn || document.hidden) return;
    triggerViolation('window_blur', 'Window Focus Lost',
      'The class window lost focus. This has been logged.');
  });
  document.addEventListener('fullscreenchange', () => {
    if (!anticheatOn) return;
    if (!(document.fullscreenElement || document.webkitFullscreenElement)) {
      triggerViolation('fullscreen_exit', 'Fullscreen Exited',
        'You exited fullscreen. This may affect your session record.');
    }
  });
}

function triggerViolation(type, title, msg) {
  violations++;
  reportViolation(type);
  document.getElementById('violTitle').textContent  = title;
  document.getElementById('violMsg').textContent    = msg;
  document.getElementById('violCount').textContent  = violations + (violations === 1 ? ' violation' : ' violations');
  document.getElementById('violationOverlay').classList.add('visible');
}

function dismissViolation() {
  document.getElementById('violationOverlay').classList.remove('visible');
  try {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    }
  } catch (_) {}
}

function reportViolation(type) {
  if (!MEETING_ID || !AUTH_TOKEN) return;
  fetch(`${API_BASE}/api/meetings/${MEETING_ID}/proctoring/event`, {
    method:  'POST',
    headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
    body:    JSON.stringify({ type }),
  }).catch(() => {});
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('loadStatus').textContent = msg; }
function showError(msg) {
  hide('loadOverlay');
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errorOverlay').classList.add('visible');
}
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showReconnectToast() { document.getElementById('reconnectToast').classList.add('visible'); }
function hideReconnectToast() { document.getElementById('reconnectToast').classList.remove('visible'); }
</script>
</body>
</html>
