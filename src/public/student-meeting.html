<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Joining Class — DIKLY</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:      #0a0c10;
      --card:    #1a1e28;
      --border:  #2a2f3d;
      --accent:  #3b82f6;
      --danger:  #ef4444;
      --warning: #f59e0b;
      --text:    #e2e8f0;
      --muted:   #6b7280;
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html {
      height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      position: fixed; inset: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding:
        calc(var(--sat) + 28px)
        28px
        calc(var(--sab) + 28px);
    }

    .screen {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--accent);
      display: grid; place-items: center;
      font-size: 34px; font-weight: 800; color: #fff;
      box-shadow: 0 0 56px rgba(59,130,246,.35);
      flex-shrink: 0;
    }
    .title  { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    .status { font-size: 14px; color: var(--muted); line-height: 1.5; min-height: 22px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err-icon  { font-size: 52px; line-height: 1; }
    .err-title { font-size: 20px; font-weight: 700; color: var(--danger); }
    .err-msg   { font-size: 14px; color: var(--muted); max-width: 300px; line-height: 1.65; }

    .warn-icon  { font-size: 52px; line-height: 1; }
    .warn-title { font-size: 20px; font-weight: 700; color: var(--warning); }
    .warn-msg   { font-size: 14px; color: var(--muted); max-width: 300px; line-height: 1.65; }

    .actions {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%;
    }
    .btn {
      width: 100%; padding: 16px;
      border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-warning   { background: rgba(245,158,11,.2); border: 1px solid rgba(245,158,11,.4); color: #fcd34d; }
    .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>

<!-- Loading -->
<div class="screen" id="loadScreen">
  <div class="logo">D</div>
  <div class="title">DIKLY Classes</div>
  <div class="spinner"></div>
  <div class="status" id="status">Connecting to class…</div>
</div>

<!-- Not started yet (scheduled state) -->
<div class="screen" id="waitScreen" style="display:none">
  <div class="warn-icon">⏳</div>
  <div class="warn-title">Class Not Started</div>
  <div class="warn-msg" id="waitMsg">
    Your lecturer hasn't started this class yet. Wait for them to open the room.
  </div>
  <div class="actions">
    <button class="btn btn-warning" onclick="retryWait()">Check Again</button>
    <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
  </div>
</div>

<!-- Error -->
<div class="screen" id="errorScreen" style="display:none">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Cannot Join Class</div>
  <div class="err-msg" id="errMsg">Something went wrong.</div>
  <div class="actions">
    <button class="btn btn-primary"   onclick="init()">Try Again</button>
    <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
  </div>
</div>

<script>
'use strict';

const _params    = new URLSearchParams(location.search);
const MEETING_ID = _params.get('meeting') || _params.get('id') || '';

// API is served from the same origin as the frontend (same Express server).
function getApiBase() { return ''; }

function getAuthToken() {
  const urlToken = _params.get('token');
  if (urlToken) return urlToken;
  try {
    const s = JSON.parse(sessionStorage.getItem('dikly_jitsi_session') || 'null');
    if (s?.meetingId === MEETING_ID && s.authToken) return s.authToken;
  } catch (_) {}
  return (
    localStorage.getItem('token') ||
    localStorage.getItem('jwt_token') ||
    localStorage.getItem('auth_token') ||
    sessionStorage.getItem('token') ||
    ''
  );
}

const API_BASE   = getApiBase();
const AUTH_TOKEN = getAuthToken();

let _retryTimer = null;

async function init() {
  clearTimeout(_retryTimer);
  document.getElementById('loadScreen').style.display  = 'flex';
  document.getElementById('errorScreen').style.display = 'none';
  document.getElementById('waitScreen').style.display  = 'none';

  if (!MEETING_ID) {
    return showError('No meeting ID provided. Please go back and try again.');
  }
  if (!AUTH_TOKEN) {
    return showError('Your session has expired. Please log in to DIKLY and try again.');
  }

  setStatus('Connecting to class…');

  try {
    const r = await fetch(`${API_BASE}/api/meetings/${MEETING_ID}/join`, {
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN },
    });
    const body = await r.json().catch(() => ({}));

    if (!r.ok) {
      if (body.status === 'scheduled') {
        return showWait(body.scheduledStart);
      }
      if (body.status === 'ended' || body.status === 'cancelled') {
        return showError('This class has ended or been cancelled.');
      }
      throw new Error(body.error || body.message || `Server error (${r.status})`);
    }

    const data = body.data || body;

    // If this user is actually a moderator, hand off to the lecturer page
    if (data.isModerator) {
      window.location.replace(`/lecturer-meeting?meeting=${MEETING_ID}`);
      return;
    }

    const meetingUrl = data.meetingUrl;
    if (!meetingUrl) {
      return showError('The server did not return a meeting URL. Please contact support.');
    }

    setStatus('Launching secure classroom…');

    // Fire-and-forget: register participant in the monitoring system before leaving.
    // We don't await these — the redirect should not be blocked by monitoring calls.
    fetch(`${API_BASE}/api/meetings/${MEETING_ID}/preflight`, {
      method:  'POST',
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
    }).catch(() => {});

    fetch(`${API_BASE}/api/meetings/${MEETING_ID}/attendance/join`, {
      method:  'POST',
      headers: { Authorization: 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
    }).catch(() => {});

    // Full-page redirect to meet.dikly.live — camera/mic permissions are
    // requested by Jitsi on that domain, not here, avoiding Safari reload loops.
    setTimeout(() => { window.location.href = meetingUrl; }, 350);

  } catch (err) {
    showError(err.message || 'Unexpected error. Please check your connection and try again.');
  }
}

// Poll every 15 seconds while waiting for the lecturer to open the room
function retryWait() {
  document.getElementById('waitScreen').style.display = 'none';
  document.getElementById('loadScreen').style.display = 'flex';
  setStatus('Checking again…');
  init();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function showWait(scheduledStart) {
  document.getElementById('loadScreen').style.display = 'none';
  let msg = 'Your lecturer hasn\'t opened the room yet. Wait for them to start the class.';
  if (scheduledStart) {
    const d = new Date(scheduledStart);
    msg += ` Scheduled for ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}.`;
  }
  document.getElementById('waitMsg').textContent = msg;
  document.getElementById('waitScreen').style.display = 'flex';
  // Auto-retry after 20 seconds so student doesn't have to tap
  _retryTimer = setTimeout(init, 20000);
}

function showError(msg) {
  clearTimeout(_retryTimer);
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errorScreen').style.display = 'flex';
}

// ── Run ───────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
