# Self-Hosted Jitsi Stack for DIKLY
# ─────────────────────────────────────────────────────────────────────────────
# Required env vars — create a .env file alongside this file:
#
#   JITSI_DOMAIN            Jitsi public hostname       (e.g. meet.dikly.live)
#   JITSI_APP_ID            Must match DIKLY's JITSI_APP_ID
#   JITSI_APP_SECRET        Must match DIKLY's JITSI_APP_SECRET
#   JVB_ADVERTISE_IPS       Public IP of THIS server (REQUIRED for media to work)
#   JICOFO_AUTH_PASSWORD    Random password for Jicofo XMPP auth
#   JICOFO_COMPONENT_SECRET Random secret for Jicofo component
#   JVB_AUTH_PASSWORD       Random password for JVB XMPP auth
#   TURN_SECRET             Random secret for coturn HMAC credentials
#   LETSENCRYPT_EMAIL       Email for Let's Encrypt (when ENABLE_LETSENCRYPT=1)
#
# Quick start:
#   cp .env.example .env          # fill in the values above
#   mkdir -p jitsi-config
#   docker compose -f docker-compose.jitsi.yml up -d
#
# Firewall rules required on this VPS:
#   ufw allow 80/tcp
#   ufw allow 443/tcp
#   ufw allow 3478/udp       # STUN + TURN (coturn)
#   ufw allow 3478/tcp       # TURN over TCP (coturn)
#   ufw allow 5349/tcp       # TURNS — TURN over TLS (penetrates strict carrier NAT)
#   ufw allow 5349/udp       # TURNS over DTLS
#   ufw allow 4443/tcp       # JVB TCP fallback
#   ufw allow 10000/udp      # JVB primary media
#   ufw allow 49152:65535/udp  # coturn relay ports
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Coturn (TURN relay — required for mobile LTE and restrictive NAT) ──────
  # Without TURN, clients behind carrier-grade NAT (mobile LTE) cannot reach
  # JVB when both UDP 10000 and TCP 4443 are blocked. coturn relays media
  # through port 3478 which is universally reachable.
  #
  # Uses HMAC-based time-limited credentials via --use-auth-secret.
  # Prosody's turncredentials module generates these automatically and
  # distributes them to Jitsi clients over XMPP — no client-side changes needed.
  #
  # network_mode: host is required so the relay port range (49152-65535/UDP)
  # does not need to be explicitly mapped in Docker (mapping 16k+ ports is
  # impractical and causes container startup timeouts).
  coturn:
    image: coturn/coturn:4.6
    network_mode: host
    user: root
    restart: unless-stopped
    volumes:
      # Mount full letsencrypt dir so symlinks in live/ resolve to archive/ inside container.
      # Mounting only live/dikly.live breaks symlink resolution → coturn skips TLS on 5349.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: >
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${JITSI_DOMAIN}
      --external-ip=${JVB_ADVERTISE_IPS}
      --listening-port=3478
      --tls-listening-port=5349
      --cert=/etc/letsencrypt/live/dikly.live/fullchain.pem
      --pkey=/etc/letsencrypt/live/dikly.live/privkey.pem
      --min-port=49152
      --max-port=65535
      --fingerprint
      --no-rfc5780
      --no-loopback-peers
      --no-multicast-peers
      --no-cli
      --denied-peer-ip=0.0.0.0-0.255.255.255
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=100.64.0.0-100.127.255.255
      --denied-peer-ip=127.0.0.0-127.255.255.255
      --denied-peer-ip=169.254.0.0-169.254.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --denied-peer-ip=192.168.0.0-192.168.255.255
      --denied-peer-ip=198.18.0.0-198.19.255.255
      --denied-peer-ip=240.0.0.0-255.255.255.255
      --cipher-list=HIGH:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ['CMD-SHELL', 'ss -ulnp | grep -q :3478 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Jitsi Web (React frontend — HTTP only, nginx terminates SSL) ──────────
  web:
    image: jitsi/web:stable-9584
    restart: unless-stopped
    ports:
      # Bind only to localhost — nginx proxies https://meet.dikly.live → here
      - '127.0.0.1:${HTTP_PORT:-8080}:80'
    environment:
      # JWT authentication
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
      - ENABLE_GUESTS=0
      - ENABLE_LOBBY=${ENABLE_LOBBY:-0}
      - JWT_APP_ID=${JITSI_APP_ID}
      - JWT_APP_SECRET=${JITSI_APP_SECRET}
      # Public URL and XMPP domain routing
      - PUBLIC_URL=https://${JITSI_DOMAIN}
      - XMPP_DOMAIN=${JITSI_DOMAIN}
      - XMPP_AUTH_DOMAIN=auth.${JITSI_DOMAIN}
      - XMPP_BOSH_URL_BASE=https://${JITSI_DOMAIN}
      - XMPP_MUC_DOMAIN=conference.${JITSI_DOMAIN}
      # XMPP WebSocket — enables wss://meet.dikly.live/xmpp-websocket
      - ENABLE_XMPP_WEBSOCKET=1
      - XMPP_WEBSOCKET_URL=https://${JITSI_DOMAIN}/xmpp-websocket
      # Colibri WebSocket for JVB media bridge
      - ENABLE_COLIBRI_WEBSOCKET=1
      - COLIBRI_WEBSOCKET_URL=wss://${JITSI_DOMAIN}/colibri-ws
      # SSL handled by nginx
      - DISABLE_HTTPS=1
      - ENABLE_LETSENCRYPT=0
      # TURN — Jitsi web container uses these to embed TURN config in config.js
      - TURN_CREDENTIALS=on
      - TURN_HOST=${JITSI_DOMAIN}
      - TURN_PORT=3478
      - TURN_SECRET=${TURN_SECRET}
      - TURN_TLS=1
      - TZ=${TZ:-Africa/Accra}
    volumes:
      - ${CONFIG:-./jitsi-config}/web:/config:Z
      - ${CONFIG:-./jitsi-config}/web/letsencrypt:/etc/letsencrypt:Z
    networks:
      - jitsi-net
    depends_on:
      - prosody
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prosody (XMPP server — enforces JWT, manages MUC) ────────────────────
  prosody:
    image: jitsi/prosody:stable-9584
    restart: unless-stopped
    expose:
      - '5222'   # XMPP client-to-server
      - '5269'   # XMPP server-to-server
      - '5347'   # Jicofo component connection
      - '5280'   # BOSH / WebSocket
    environment:
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
      - ENABLE_GUESTS=0
      - ENABLE_LOBBY=${ENABLE_LOBBY:-0}
      # XMPP WebSocket — exposes /xmpp-websocket inside the container
      - ENABLE_XMPP_WEBSOCKET=1
      # JWT plugin config — must match DIKLY's JITSI_APP_ID / JITSI_APP_SECRET exactly
      - JWT_APP_ID=${JITSI_APP_ID}
      - JWT_APP_SECRET=${JITSI_APP_SECRET}
      - JWT_ACCEPTED_ISSUERS=${JITSI_APP_ID}
      - JWT_ACCEPTED_AUDIENCES=${JITSI_APP_ID}
      - JWT_ALLOW_EMPTY=0
      # XMPP domain topology
      - XMPP_DOMAIN=${JITSI_DOMAIN}
      - XMPP_AUTH_DOMAIN=auth.${JITSI_DOMAIN}
      - XMPP_GUEST_DOMAIN=guest.${JITSI_DOMAIN}
      - XMPP_MUC_DOMAIN=conference.${JITSI_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=internal.auth.${JITSI_DOMAIN}
      # Jicofo and JVB credentials
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      # TURN — Prosody's turncredentials module generates time-limited HMAC
      # credentials and distributes them to clients over XMPP automatically.
      # This is the recommended way to deliver TURN creds in Jitsi.
      - TURN_CREDENTIALS=on
      - TURN_HOST=${JITSI_DOMAIN}
      - TURN_PORT=3478
      - TURN_SECRET=${TURN_SECRET}
      - TURN_TLS=1
      - TZ=${TZ:-Africa/Accra}
    volumes:
      - ${CONFIG:-./jitsi-config}/prosody/config:/config:Z
      - ${CONFIG:-./jitsi-config}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
      - ${CONFIG:-./jitsi-config}/prosody/11-prosody-ws-ping.sh:/etc/cont-init.d/11-prosody-ws-ping
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      jitsi-net:
        aliases:
          - ${JITSI_DOMAIN}
          - auth.${JITSI_DOMAIN}
          - conference.${JITSI_DOMAIN}
          - internal.auth.${JITSI_DOMAIN}
          - guest.${JITSI_DOMAIN}

  # ── Jicofo (conference focus — JWT moderator enforcement, room control) ───
  jicofo:
    image: jitsi/jicofo:stable-9584
    restart: unless-stopped
    environment:
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
      # Without XMPP_SERVER Jicofo defaults to xmpp.meet.jitsi and fails DNS.
      # Set it to the prosody service name so Docker resolves it internally.
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=${JITSI_DOMAIN}
      - XMPP_AUTH_DOMAIN=auth.${JITSI_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=internal.auth.${JITSI_DOMAIN}
      - XMPP_MUC_DOMAIN=conference.${JITSI_DOMAIN}
      - JICOFO_XMPP_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      # JWT moderator flag — Jicofo reads context.user.moderator from the token
      - JWT_APP_ID=${JITSI_APP_ID}
      - JWT_APP_SECRET=${JITSI_APP_SECRET}
      # REST API — DIKLY connects to this for server-side participant kick
      - JICOFO_ENABLE_REST=1
      - JICOFO_REST_HOST=0.0.0.0
      - JICOFO_REST_PORT=8888
      - TZ=${TZ:-Africa/Accra}
    ports:
      - '127.0.0.1:${JICOFO_REST_PORT:-8888}:8888'
    volumes:
      - ${CONFIG:-./jitsi-config}/jicofo:/config:Z
    depends_on:
      - prosody
    networks:
      - jitsi-net
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      # nc not available in JVM image; use bash TCP redirect to check port 8888
      test: ['CMD-SHELL', 'bash -c "</dev/tcp/localhost/8888" 2>/dev/null']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── JVB (Jitsi Video Bridge — all media streams) ─────────────────────────
  jvb:
    image: jitsi/jvb:stable-9584
    restart: unless-stopped
    ports:
      - '${JVB_PORT:-10000}:10000/udp'    # RTP media (primary, UDP — must be open on firewall)
      - '${JVB_TCP_PORT:-4443}:4443'      # RTP media (TCP fallback for restrictive networks / mobile)
    expose:
      - '9090'   # Colibri WebSocket — proxied internally by web container nginx
    environment:
      - XMPP_AUTH_DOMAIN=auth.${JITSI_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=internal.auth.${JITSI_DOMAIN}
      - XMPP_SERVER=prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=${JVB_PORT:-10000}
      # TCP fallback — critical for mobile networks and restrictive firewalls
      - JVB_TCP_HARVESTER_DISABLED=false
      - JVB_TCP_PORT=${JVB_TCP_PORT:-4443}
      # PUBLIC IP — REQUIRED. Without this JVB advertises its private Docker IP
      # and clients (especially mobile/remote) cannot reach it for media.
      # Set JVB_ADVERTISE_IPS to the PUBLIC IP of this server in your .env.
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS:?JVB_ADVERTISE_IPS must be set to the server public IP}
      - PUBLIC_URL=https://${JITSI_DOMAIN}
      # Colibri WebSocket — enables wss://meet.dikly.live/colibri-ws/<id>/...
      - COLIBRI_WEBSOCKET_ENABLED=true
      # JVM heap — cap at 1.5 GB so JVB doesn't OOM the VPS under load.
      # G1GC reduces GC pause spikes that cause brief audio/video freezes.
      - JAVA_SYS_PROPS=-Xmx1500m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+HeapDumpOnOutOfMemoryError
      - TZ=${TZ:-Africa/Accra}
    volumes:
      - ${CONFIG:-./jitsi-config}/jvb:/config:Z
      # Post-init patch: runs after 10-config generates jvb.conf, fixes
      # websockets.enabled, server-id, and advertise-private-candidates.
      - ${CONFIG:-./jitsi-config}/jvb/11-patch.sh:/etc/cont-init.d/11-patch
    depends_on:
      - prosody
    networks:
      - jitsi-net
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9090/about/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  jitsi-net:
    driver: bridge
