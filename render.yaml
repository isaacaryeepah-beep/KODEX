## Render Blueprint for Dikly/KODEX.
##
## What this deploys: the Node/Express app only (src/server.js + src/public/).
## MongoDB is Atlas (external, not managed here).
##
## This file only holds non-secret configuration. Every real secret
## (API keys, JWT secrets, DB URI) is marked `sync: false`, meaning Render
## will prompt for it once in the dashboard and never store the value in
## this repo — this repo is public.
##
## Single instance is still the current setting, but NOT for the reason it
## used to be. Both prior blockers to horizontal scaling are now fixed:
##   - The rate limiter (src/middleware/rateLimiter.js) is Redis-backed when
##     REDIS_URL is set, with an in-memory fallback -- no longer per-process-only.
##   - The cron jobs / recurring intervals in server.js now run behind Redis
##     leader election (src/services/leaderElection.js), so exactly one
##     instance runs them instead of once per instance.
## Both are no-ops (exact original single-instance behavior) as long as
## REDIS_URL is unset, which is why numInstances is still 1 here: raising it
## requires actually provisioning a REDIS_URL first (a Render Key Value
## instance, or any external Redis), and directly changes the monthly bill --
## left as a deliberate choice for whoever owns that decision, not something
## to flip silently in this file.
##
## Video: GetStream is primary, LiveKit is the fallback (see
## src/services/livekitService.js, .env.example). Self-hosted Jitsi is a
## last-resort fallback only, not required — JITSI_* below is optional.

services:
  - type: web
    name: dikly
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: true
    numInstances: 1
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /health

    envVars:
      # ── Non-secret configuration ──────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PLATFORM_DOMAIN
        value: dikly.sbs
      - key: APP_BASE_URL
        value: https://dikly.sbs
      - key: API_BASE_URL
        value: https://api.dikly.sbs
      - key: MONITOR_BASE_URL
        value: https://monitor.dikly.sbs
      - key: ADMIN_BASE_URL
        value: https://admin.dikly.sbs
      - key: MEET_BASE_URL
        value: https://meet.dikly.sbs
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: SMS_PROVIDER
        value: arkesel
      - key: SMS_SENDER_ID
        value: DIKLY

      # ── Database (Atlas, external — same cluster the data already lives on)
      - key: MONGODB_URI
        sync: false

      # ── Redis (optional — dashboard caching + Redis-backed rate limiting +
      # leader election for cron jobs). Unset by default: the app falls back
      # to exact single-instance behavior everywhere Redis would be used
      # (src/services/cacheService.js, rateLimiter.js, leaderElection.js).
      # Required before raising numInstances above 1.
      - key: REDIS_URL
        sync: false

      # ── Auth tokens — JWT_REFRESH_SECRET is a hard requirement, the app
      # refuses to run safely without a real 64-char value here.
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: MEETING_TOKEN_SECRET
        sync: false

      # ── Cloudinary (image/media storage — src/services/storage/) ──────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Web Push (VAPID) — src/services/push/providers/webPushProvider.js ──
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

      # ── FCM (Electron desktop push) — src/services/push/providers/fcmProvider.js
      # See .env.example for how to obtain these from a Firebase project.
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SENDER_ID
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false

      # ── Traffic (ArrivalIQ) — src/services/traffic/trafficService.js
      # Pick one: Google Maps, Mapbox, or TomTom (see .env.example for the tradeoff)
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: TRAFFIC_PROVIDER
        sync: false

      # ── Video — GetStream primary, LiveKit fallback ────────────────────────
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      # Self-hosted Jitsi — last-resort fallback only, leave unset unless
      # actually running a Jitsi server matching these values.
      - key: JITSI_APP_SECRET
        sync: false

      # ── Email ───────────────────────────────────────────────────────────────
      - key: MAILERSEND_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

      # ── SMS ─────────────────────────────────────────────────────────────────
      - key: ARKESEL_API_KEY
        sync: false
      - key: MNOTIFY_API_KEY
        sync: false

      # ── Payments ────────────────────────────────────────────────────────────
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false

      # ── AI ──────────────────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # ── Error monitoring (optional — leave unset to disable) ──────────────
      - key: SENTRY_DSN
        sync: false
