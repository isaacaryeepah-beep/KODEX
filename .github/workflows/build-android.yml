name: Build Android (Capacitor)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons
        run: |
          sudo apt-get install -y librsvg2-bin --quiet
          pip install Pillow --quiet --break-system-packages
          rsvg-convert -w 1024 -h 1024 src/public/dikly-icon.svg -o /tmp/dikly-icon.png
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/drawable-land
          python3 scripts/gen_icons.py

      - name: Ensure strings.xml
        run: |
          mkdir -p android/app/src/main/res/values
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">DIKLY</string>
              <string name="title_activity_main">DIKLY</string>
              <string name="package_name">sbs.dikly.attendance</string>
              <string name="custom_url_scheme">sbs.dikly.attendance</string>
              <string name="capacitor_server_url">https://dikly.sbs</string>
          </resources>
          EOF
          fi

      - name: Bundle web app into www/
        run: |
          cp -r src/public/. www/

      - name: Mirror live site assets (pages, JS, CSS, images)
        run: |
          sudo apt-get install -y wget --quiet
          # Mirror all reachable pages and static assets from dikly.sbs
          wget \
            --mirror \
            --page-requisites \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --timeout=30 \
            --tries=2 \
            --wait=0 \
            --no-check-certificate \
            --reject "*.mp4,*.webm,*.zip,*.tar.gz" \
            --directory-prefix=/tmp/site-mirror/ \
            https://dikly.sbs 2>&1 | tail -5 || true
          # Copy mirrored assets into www/ (overwrites with live versions)
          if [ -d /tmp/site-mirror/dikly.sbs ]; then
            cp -r /tmp/site-mirror/dikly.sbs/. www/ 2>/dev/null || true
            echo "Mirrored site size:"
            du -sh /tmp/site-mirror/dikly.sbs/
          fi

      - name: Bundle Google Fonts offline (DM Sans + Inter)
        run: |
          mkdir -p www/fonts
          pip install requests --quiet --break-system-packages

          python3 - <<'PYEOF'
          import os, re, requests

          headers = {"User-Agent": "Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36"}
          font_queries = [
            "family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000",
            "family=Inter:wght@100;200;300;400;500;600;700;800;900",
            "family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600",
          ]
          saved = 0
          for q in font_queries:
            url = f"https://fonts.googleapis.com/css2?{q}&display=swap"
            try:
              css = requests.get(url, headers=headers, timeout=15).text
              font_urls = re.findall(r"url\((https://fonts\.gstatic\.com/[^)]+)\)", css)
              for fu in font_urls:
                fname = fu.split("/")[-1].split("?")[0]
                out = f"www/fonts/{fname}"
                if not os.path.exists(out):
                  data = requests.get(fu, timeout=15).content
                  with open(out, "wb") as f:
                    f.write(data)
                  saved += 1
            except Exception as e:
              print(f"  skip {q}: {e}")
          print(f"Downloaded {saved} font files")
          PYEOF

          echo "Font bundle size:"
          du -sh www/fonts/

      - name: Report total www/ bundle size
        run: |
          echo "Total www/ size:"
          du -sh www/
          echo "File count: $(find www/ -type f | wc -l)"

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Bump SDK versions and set versionCode
        run: |
          if [ -f android/variables.gradle ]; then
            sed -i -E 's/compileSdkVersion = [0-9]+/compileSdkVersion = 35/' android/variables.gradle
            sed -i -E 's/targetSdkVersion = [0-9]+/targetSdkVersion = 35/' android/variables.gradle
          fi
          sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 35/' android/app/build.gradle
          sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 35/' android/app/build.gradle
          sed -i -E 's/targetSdkVersion[[:space:]]+[0-9]+/targetSdkVersion 35/' android/app/build.gradle
          sed -i -E 's/targetSdk[[:space:]]+[0-9]+/targetSdk 35/' android/app/build.gradle
          sed -i -E "s/versionCode[[:space:]]+[0-9]+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          echo "versionCode: ${{ github.run_number }}"

      - name: Configure release signing in build.gradle
        run: |
          KEYSTORE_PATH="${{ github.workspace }}/ci/release.p12"
          # Inject signingConfigs block before the existing android { block content
          python3 - <<'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file("${{ github.workspace }}/ci/release.p12")
                      storePassword "DiklySecure2026"
                      keyAlias "dikly"
                      keyPassword "DiklySecure2026"
                      storeType "PKCS12"
                  }
              }
          """

          # Only inject if not already present
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_block, 1)

          # Point release buildType to the signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patched with signing config")
          PYEOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── AAB (required for Google Play) ────────────────────────────────────
      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 60

      # ── APK (for sideloading / testing) ───────────────────────────────────
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 60
