name: Build Android (Capacitor)

# Path-filtered on purpose: this workflow used to fire on every push to
# main/claude/are-you-there-hjdx9r regardless of whether anything mobile-
# relevant changed, racking up 1400+ runs. Each run uploads an AAB + APK as
# workflow artifacts, and those artifacts (not just the published release)
# ate into the account's shared GitHub Actions storage quota until uploads
# started failing outright ("Artifact storage quota has been hit"), which
# silently broke the "Publish to Dikly_releases" step that makes the APK
# downloadable -- the app's live download link 404'd with no build ever
# having failed loudly enough to notice.
on:
  push:
    branches: [main, claude/are-you-there-hjdx9r]
    paths:
      - 'src/public/**'
      - 'scripts/gen_icons.py'
      - 'scripts/patch-android-splash.sh'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons
        run: |
          sudo apt-get install -y librsvg2-bin --quiet
          pip install Pillow --quiet --break-system-packages
          rsvg-convert -w 1024 -h 1024 src/public/dikly-icon.svg -o /tmp/dikly-icon.png
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/drawable-land
          python3 scripts/gen_icons.py

      - name: Patch Android splash screen — dark background, no white flash
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-v31

          # Replace splash drawable with a dark background layer-list plus
          # the Dikly mark centered on top (ic_splash.png — 288px,
          # safe-zone padded, written by gen_icons.py, which runs before
          # this step). Previously this was a *plain* colour layer-list
          # with no icon at all on pre-Android-12 devices (Android 12+ got
          # an icon separately, via the values-v31 SplashScreen theme below
          # — pre-12 got nothing but a flat colour flash). This gives both
          # cases the same look.
          cat > android/app/src/main/res/drawable/splash.xml << 'SPLASHEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item><color android:color="#080F20"/></item>
              <item>
                  <bitmap
                      android:src="@drawable/ic_splash"
                      android:gravity="center" />
              </item>
          </layer-list>
          SPLASHEOF
          echo "splash.xml written (dark #080F20 background + centered ic_splash icon)"

          # Pre-Android 12: ensure the launch theme uses AppTheme.NoActionBar as
          # parent and sets the window background to our dark colour explicitly.
          STYLES=android/app/src/main/res/values/styles.xml
          if [ -f "$STYLES" ]; then
            # Change parent from Theme.SplashScreen -> AppTheme.NoActionBar
            sed -i 's/parent="Theme\.SplashScreen"/parent="AppTheme.NoActionBar"/g' "$STYLES"
            # Inject explicit dark background into NoActionBarLaunch if not present
            python3 - << 'PYEOF'
          import re
          with open('android/app/src/main/res/values/styles.xml') as f:
              s = f.read()
          if 'NoActionBarLaunch' in s and 'android:background' not in s:
              s = re.sub(
                  r'(<style name="AppTheme\.NoActionBarLaunch"[^>]*>)',
                  r'\1\n        <item name="android:background">#080F20</item>',
                  s
              )
          with open('android/app/src/main/res/values/styles.xml', 'w') as f:
              f.write(s)
          print('styles.xml patched with dark windowBackground for pre-Android 12')
          PYEOF
          fi

          # Android 12+ (API 31): SplashScreen API — dark background, Dikly icon.
          # ic_splash.png is written by gen_icons.py (288px, safe-zone padded).
          cat > android/app/src/main/res/values-v31/styles.xml << 'V31EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
                  <item name="android:windowSplashScreenBackground">#080F20</item>
                  <item name="android:windowSplashScreenAnimatedIcon">@drawable/ic_splash</item>
                  <item name="android:windowSplashScreenIconBackgroundColor">#080F20</item>
              </style>
          </resources>
          V31EOF
          echo "values-v31/styles.xml written (dark Android 12+ splash)"

      - name: Ensure strings.xml
        run: |
          mkdir -p android/app/src/main/res/values
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">DIKLY</string>
              <string name="title_activity_main">DIKLY</string>
              <string name="package_name">sbs.dikly.attendance</string>
              <string name="custom_url_scheme">sbs.dikly.attendance</string>
              <string name="capacitor_server_url">https://dikly.sbs</string>
          </resources>
          EOF
          fi

      - name: Bundle web app into www/
        run: |
          cp -r src/public/. www/

      - name: Minify JS for Android bundle
        run: |
          npm install -g terser --silent
          for f in www/js/app.js www/js/pages-academic.js www/js/pages-device.js www/js/pages-corporate.js www/js/pages-faq.js www/js/manager-portal.js www/js/offline-idb.js www/js/faq-widget.js www/js/faq-assistant.js; do
            if [ -f "$f" ]; then
              terser "$f" --compress --mangle --output "$f" && echo "Minified $f"
            fi
          done
          echo "JS sizes after minification:"
          du -sh www/js/

      - name: Bundle Google Fonts offline (DM Sans + DM Mono + Inter)
        run: |
          mkdir -p www/fonts
          pip install requests --quiet --break-system-packages

          python3 - <<'PYEOF'
          import os, re, requests

          headers = {"User-Agent": "Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36"}
          font_queries = [
            "family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400",
            "family=DM+Mono:wght@400;500",
            "family=Inter:wght@300;400;500;600;700;800",
          ]
          css_files = []
          saved = 0
          for q in font_queries:
            url = f"https://fonts.googleapis.com/css2?{q}&display=swap"
            try:
              css = requests.get(url, headers=headers, timeout=20).text
              font_urls = re.findall(r"url\((https://fonts\.gstatic\.com/[^)]+)\)", css)
              for fu in font_urls:
                fname = fu.split("/")[-1].split("?")[0]
                out = f"www/fonts/{fname}"
                if not os.path.exists(out):
                  data = requests.get(fu, timeout=20).content
                  with open(out, "wb") as f:
                    f.write(data)
                  saved += 1
              # Rewrite CSS to use local font paths
              local_css = re.sub(r"url\(https://fonts\.gstatic\.com/[^/]+/([^)]+)\)",
                lambda m: f"url(/fonts/{m.group(0).split('/')[-1].rstrip(')')})", css)
              css_files.append(local_css)
            except Exception as e:
              print(f"  skip {q}: {e}")
          print(f"Downloaded {saved} font files")
          # Write combined offline font CSS
          with open("www/fonts/fonts.css", "w") as f:
            f.write("\n".join(css_files))
          PYEOF

          echo "Font bundle size:"
          du -sh www/fonts/

      - name: Bundle MathJax offline
        run: |
          mkdir -p www/mathjax
          pip install requests --quiet --break-system-packages
          python3 - <<'PYEOF'
          import requests, os

          # Download the MathJax tex-chtml bundle (all-in-one, ~7MB)
          url = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
          out = "www/mathjax/tex-chtml.js"
          if not os.path.exists(out):
            try:
              data = requests.get(url, timeout=60).content
              with open(out, "wb") as f:
                f.write(data)
              print(f"Downloaded MathJax: {len(data)//1024}KB")
            except Exception as e:
              print(f"MathJax download failed: {e}")
          PYEOF
          echo "MathJax bundle size:"
          du -sh www/mathjax/

      - name: Patch index.html for offline assets
        run: |
          # Point MathJax to local bundle
          sed -i 's|https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js|/mathjax/tex-chtml.js|g' www/index.html
          # Inject offline font CSS link (before </head>)
          sed -i 's|</head>|  <link rel="stylesheet" href="/fonts/fonts.css">\n</head>|' www/index.html
          # Remove the Google Fonts @import from CSS so fonts load locally
          sed -i "s|@import url('https://fonts.googleapis.com/css2[^']*');||g" www/css/style.css
          echo "index.html patched"

      - name: Report total www/ bundle size
        run: |
          echo "Total www/ size:"
          du -sh www/
          echo "File count: $(find www/ -type f | wc -l)"
          echo "--- Size breakdown ---"
          du -sh www/fonts/ www/mathjax/ www/js/ www/css/ 2>/dev/null || true

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Bump SDK versions and set versionCode
        run: |
          if [ -f android/variables.gradle ]; then
            sed -i -E 's/compileSdkVersion = [0-9]+/compileSdkVersion = 35/' android/variables.gradle
            sed -i -E 's/targetSdkVersion = [0-9]+/targetSdkVersion = 35/' android/variables.gradle
          fi
          sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 35/' android/app/build.gradle
          sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 35/' android/app/build.gradle
          sed -i -E 's/targetSdkVersion[[:space:]]+[0-9]+/targetSdkVersion 35/' android/app/build.gradle
          sed -i -E 's/targetSdk[[:space:]]+[0-9]+/targetSdk 35/' android/app/build.gradle
          sed -i -E "s/versionCode[[:space:]]+[0-9]+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          echo "versionCode: ${{ github.run_number }}"

      - name: Configure release signing in build.gradle
        run: |
          KEYSTORE_PATH="${{ github.workspace }}/ci/release.p12"
          # Inject signingConfigs block before the existing android { block content
          python3 - <<'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file("${{ github.workspace }}/ci/dikly-upload.jks")
                      storePassword "DiklyUpload2026"
                      keyAlias "dikly"
                      keyPassword "DiklyUpload2026"
                      storeType "JKS"
                  }
              }
          """

          # Only inject if not already present
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_block, 1)

          # Point release buildType to the signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patched with signing config")
          PYEOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── AAB (required for Google Play) ────────────────────────────────────
      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 3

      # ── APK (for sideloading / testing) ───────────────────────────────────
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3

      # ── GitHub Release (publicly downloadable APK) ────────────────────────
      - name: Rename APK for release
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found at $APK"
            exit 1
          fi
          cp "$APK" dikly.apk
          echo "APK size: $(du -sh dikly.apk | cut -f1)"

      # Publish to the PUBLIC dikly-releases repo so downloads work without GitHub login.
      # Requires RELEASES_PAT secret: a fine-grained PAT with Contents write on dikly-releases.
      #
      # This workflow triggers on push to both `main` and
      # `claude/are-you-there-hjdx9r` (see the `on:` block above), and the
      # standard post-merge routine pushes the same commit to both branches
      # within seconds of each other. That fires two parallel runs for the
      # same SHA, and delete-then-create against the same `apk-latest` tag
      # is a race: whichever run's `gh release create` lands second sees
      # "a release with the same tag name already exists" and fails, even
      # though both runs produced an equally valid APK for the same commit.
      # Retrying the delete+create pair tolerates that race without
      # serializing the whole job (which would double build time on every
      # merge) and without depending on `gh release create --clobber`
      # semantics we have no local `gh` install to verify.
      - name: Publish to Dikly_releases (public repo)
        run: |
          for attempt in 1 2 3 4 5; do
            gh release delete apk-latest --yes \
              --repo isaacaryeepah-beep/Dikly_releases 2>/dev/null || true
            gh api -X DELETE /repos/isaacaryeepah-beep/Dikly_releases/git/refs/tags/apk-latest 2>/dev/null || true

            if gh release create apk-latest dikly.apk \
              --repo isaacaryeepah-beep/Dikly_releases \
              --title "DIKLY App — Latest Build" \
              --notes "**DIKLY Android App** — latest build (build #${{ github.run_number }}).

          ### How to install
          1. Download **dikly.apk** below
          2. On your Android phone: open the file and tap **Install**
             *(If prompted, enable \"Install from unknown sources\" in Settings)*

          > iOS App Store release coming soon." \
              --latest; then
              echo "Published on attempt $attempt"
              exit 0
            fi

            echo "Publish attempt $attempt failed (likely a concurrent run for the same commit) — retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done

          echo "ERROR: failed to publish apk-latest after 5 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
