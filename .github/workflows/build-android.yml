name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Create missing strings.xml if needed
        run: |
          mkdir -p android/app/src/main/res/values
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">DIKLY</string>
              <string name="title_activity_main">DIKLY</string>
              <string name="package_name">sbs.dikly.attendance</string>
              <string name="custom_url_scheme">sbs.dikly.attendance</string>
              <string name="capacitor_server_url">https://dikly.sbs</string>
          </resources>
          EOF
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
