name: CodeQL Security Audit

# Disabled automatic triggers: this repo is private and GitHub Advanced
# Security (required for CodeQL's SARIF upload / code-scanning results on
# private repos) isn't enabled, so every run fails at the upload step with
# "Code scanning is not enabled for this repository." Left as
# workflow_dispatch-only so it's a one-line change to restore push/PR/
# schedule triggers once Advanced Security is turned on.
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Extra query packs for Node.js / Express specific patterns
          packs: |
            codeql/javascript-queries

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
