name: Deploy to Production (VPS)

# Deploys src/, docker-compose.yml, etc. to dikly.sbs whenever main changes.
# Mirrors the exact procedure already used by scripts/deploy-webhook.js /
# .github/workflows/setup-deploy-agent.yml, run directly over SSH instead of
# depending on the deploy-agent container already being up -- so this works
# even before that container has ever been started.
#
# Does NOT touch dikly_flutter/ (that has its own GitHub Pages deploy) or
# firmware/ (flashed separately, never auto-deployed).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.172.76 >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Pull latest main and rebuild app container
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              root@194.163.172.76 bash -s << 'ENDSSH'
          set -e
          cd /root/KODEX

          echo "==> Pulling latest code..."
          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          echo "==> Rebuilding and restarting app..."
          docker compose -f /root/KODEX/docker-compose.yml up -d --build --force-recreate --remove-orphans app

          echo "==> Reloading nginx..."
          docker restart kodex-web-1 2>/dev/null || true

          echo "==> Deploy complete: $(git rev-parse --short HEAD)"
          ENDSSH
