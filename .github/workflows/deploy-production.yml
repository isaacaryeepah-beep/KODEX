name: Deploy to Production (VPS)

# Deploys src/, docker-compose.yml, etc. to dikly.sbs whenever main changes.
# Runs on a self-hosted runner installed directly on the VPS -- GitHub's
# cloud runners cannot reach the VPS over SSH (port 22 is firewalled), so
# this flips the connection direction: the runner dials out to GitHub, and
# the job then runs locally with normal access to git/Docker. No SSH key,
# no secrets, nothing needs to be opened on the firewall. Registered via
# Settings -> Actions -> Runners -> "New self-hosted runner" on the VPS.
#
# Does NOT touch dikly_flutter/ (that has its own GitHub Pages deploy) or
# firmware/ (flashed separately, never auto-deployed).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest main and rebuild app container
        run: |
          set -e
          cd /root/KODEX

          echo "==> Pulling latest code..."
          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          echo "==> Rebuilding and restarting app..."
          docker compose -f /root/KODEX/docker-compose.yml up -d --build --force-recreate --remove-orphans app

          echo "==> Reloading nginx..."
          docker restart kodex-web-1 2>/dev/null || true

          echo "==> Deploy complete: $(git rev-parse --short HEAD)"
