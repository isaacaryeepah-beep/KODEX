name: SonarCloud Analysis

# Disabled automatic push/pull_request triggers: this is a duplicate of the
# "SonarCloud Code Analysis" check that already runs on every PR via
# SonarCloud's native GitHub App integration (SonarCloud's own infra, not a
# GitHub-hosted runner) -- that check already covers the same analysis for
# free. This workflow re-ran the identical scan through a GitHub Actions
# runner for no added benefit, while also counting against the account's
# capped Actions budget. Left as workflow_dispatch-only.
on:
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
