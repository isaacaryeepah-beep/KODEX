name: Semgrep SAST

# Disabled automatic triggers: the scan step itself succeeds, but the
# "Upload Semgrep results to GitHub Security" step fails on every run
# because this private repo doesn't have GitHub Advanced Security enabled
# (same root cause as codeql.yml -- see that file's comment). Left as
# workflow_dispatch-only so it's a one-line change to restore push/PR/
# schedule triggers once Advanced Security is turned on.
on:
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config "p/nodejs" \
            --config "p/express" \
            --config "p/jwt" \
            --config "p/mongodb" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --sarif > semgrep.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep
