name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: copy resources\icon.png electron\icon.png
        shell: cmd

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Windows installer
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Windows
          path: electron/dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: cp resources/icon.png electron/icon.png

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Mac DMG
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Mac
          path: electron/dist/*.dmg
          retention-days: 30
