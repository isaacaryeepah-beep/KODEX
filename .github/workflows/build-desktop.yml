name: Build Desktop App

on:
  push:
    branches: [main, claude/update-resume-aVv3d]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: copy resources\icon.png electron\icon.png
        shell: cmd

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Windows installer
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: dir electron\dist /s /b
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Windows
          path: electron/dist/
          retention-days: 30

      # ── Publish Windows to GitHub Releases ────────────────────────────────
      - name: Find Windows installer
        id: find_exe
        run: |
          $EXE = Get-ChildItem -Path electron\dist -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $EXE) { Write-Error "ERROR: .exe not found"; exit 1 }
          Copy-Item "$EXE" dikly-windows-setup.exe
          Write-Output "Found: $EXE"
        shell: pwsh

      - name: Publish Windows to Dikly_releases
        run: |
          gh release delete windows-latest --yes --cleanup-tag --repo isaacaryeepah-beep/Dikly_releases 2>$null; $true
          gh release create windows-latest dikly-windows-setup.exe `
            --repo isaacaryeepah-beep/Dikly_releases `
            --title "DIKLY Desktop — Windows (Latest)" `
            --notes "**DIKLY Desktop App for Windows** — build #${{ github.run_number }}.`n`n### How to install`n1. Download **dikly-windows-setup.exe** below`n2. Run the installer and follow the prompts`n3. Launch DIKLY from your Start Menu or Desktop shortcut" `
            --latest=false
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: cp resources/icon.png electron/icon.png

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Mac DMG
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: ls -la electron/dist/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Mac
          path: electron/dist/
          retention-days: 30

      # ── Publish Mac to GitHub Releases ────────────────────────────────────
      - name: Find Mac DMG
        id: find_dmg
        run: |
          DMG=$(find electron/dist -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then echo "ERROR: .dmg not found"; exit 1; fi
          cp "$DMG" dikly-mac.dmg
          echo "Found: $DMG ($(du -sh dikly-mac.dmg | cut -f1))"

      - name: Publish Mac to Dikly_releases
        run: |
          gh release delete mac-latest --yes --cleanup-tag --repo isaacaryeepah-beep/Dikly_releases 2>/dev/null || true
          gh release create mac-latest dikly-mac.dmg \
            --repo isaacaryeepah-beep/Dikly_releases \
            --title "DIKLY Desktop — macOS (Latest)" \
            --notes "**DIKLY Desktop App for macOS** — build #${{ github.run_number }}.

          ### How to install
          1. Download **dikly-mac.dmg** below
          2. Open the DMG and drag DIKLY to your Applications folder
          3. Launch DIKLY from Applications

          > If macOS shows \"app can't be opened\", right-click → Open → Open anyway." \
            --latest=false
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
