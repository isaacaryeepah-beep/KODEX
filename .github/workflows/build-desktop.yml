name: Build Desktop App

on:
  push:
    branches: [main, claude/update-resume-aVv3d]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: copy resources\icon.png electron\icon.png
        shell: cmd

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Windows installer
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: dir electron\dist /s /b
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Windows
          path: electron/dist/
          retention-days: 30

      # ── Publish Windows to GitHub Releases ────────────────────────────────
      - name: Find Windows installer
        id: find_exe
        run: |
          $EXE = Get-ChildItem -Path electron\dist -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $EXE) { Write-Error "ERROR: .exe not found"; exit 1 }
          Copy-Item "$EXE" dikly-windows-setup.exe
          Write-Output "Found: $EXE"
        shell: pwsh

      - name: Delete previous windows-latest release (if exists)
        run: gh release delete windows-latest --yes --cleanup-tag --repo isaacaryeepah-beep/Dikly_releases 2>$null; exit 0
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}

      - name: Publish Windows to dikly-releases (public repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: isaacaryeepah-beep/Dikly_releases
          tag_name: windows-latest
          name: "DIKLY Desktop — Windows (Latest)"
          body: |
            **DIKLY Desktop App for Windows** — build #${{ github.run_number }}.

            ### How to install
            1. Download **dikly-windows-setup.exe** below
            2. Run the installer and follow the prompts
            3. Launch DIKLY from your Start Menu or Desktop shortcut
          files: dikly-windows-setup.exe
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy icon
        run: cp resources/icon.png electron/icon.png

      - name: Install dependencies
        run: npm install
        working-directory: electron

      - name: Build Mac DMG
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: ls -la electron/dist/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Mac
          path: electron/dist/
          retention-days: 30

      # ── Publish Mac to GitHub Releases ────────────────────────────────────
      - name: Find Mac DMG
        id: find_dmg
        run: |
          DMG=$(find electron/dist -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then echo "ERROR: .dmg not found"; exit 1; fi
          cp "$DMG" dikly-mac.dmg
          echo "Found: $DMG ($(du -sh dikly-mac.dmg | cut -f1))"

      - name: Delete previous mac-latest release (if exists)
        run: gh release delete mac-latest --yes --cleanup-tag --repo isaacaryeepah-beep/Dikly_releases 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}

      - name: Publish Mac to dikly-releases (public repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: isaacaryeepah-beep/Dikly_releases
          tag_name: mac-latest
          name: "DIKLY Desktop — macOS (Latest)"
          body: |
            **DIKLY Desktop App for macOS** — build #${{ github.run_number }}.

            ### How to install
            1. Download **dikly-mac.dmg** below
            2. Open the DMG and drag DIKLY to your Applications folder
            3. Launch DIKLY from Applications

            > **Note:** If macOS shows "app can't be opened because Apple cannot check it for malicious software",
            > right-click the app → Open → Open anyway. This is normal for apps outside the App Store.
          files: dikly-mac.dmg
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}
