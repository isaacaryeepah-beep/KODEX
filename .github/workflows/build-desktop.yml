name: Build Desktop App

# Path-filtered (see build-android.yml for why): this was firing on every
# backend/unrelated push, and its artifacts share the same account-wide
# GitHub Actions storage quota that build-android.yml was exhausting.
on:
  push:
    branches: [main, claude/are-you-there-hjdx9r]
    paths:
      - 'electron/**'
      - 'resources/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

concurrency:
  group: desktop-release
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate Windows icon (ICO)
        run: |
          pip install Pillow --quiet
          python scripts/gen_win_icon.py
        shell: pwsh

      - name: Install dependencies
        run: npm install
        working-directory: electron

      # electron-updater needs a version that strictly increases release to
      # release to detect an update is available — there's no manual bump
      # process, so derive one from the run number (monotonic across every
      # build regardless of branch).
      - name: Set build version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version
        working-directory: electron
        shell: pwsh

      - name: Build Windows installer
        run: npm run dist:publish
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}

      - name: List dist folder
        run: dir electron\dist /s /b
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Windows
          path: electron/dist/
          retention-days: 3

      # ── Publish Windows to GitHub Releases ────────────────────────────────
      - name: Find Windows installer
        id: find_exe
        run: |
          $EXE = Get-ChildItem -Path electron\dist -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $EXE) { Write-Error "ERROR: .exe not found"; exit 1 }
          Copy-Item "$EXE" dikly-windows-setup.exe
          Write-Output "Found: $EXE"
        shell: pwsh

      # Upsert instead of delete-then-create: a delete followed immediately
      # by a create of the same tag can race against another build doing
      # the same thing (this workflow's own concurrency cancellation isn't
      # instant), which once left windows-latest deleted with nothing to
      # replace it — `gh release create` failed with "already exists"
      # because a concurrent run's create had already recreated it in the
      # gap. Uploading with --clobber to an existing release has no such
      # gap: whichever run finishes last just wins, no error either way.
      - name: Publish Windows to Dikly_releases
        run: |
          $notes = "**DIKLY Desktop App for Windows** — build #${{ github.run_number }}.`n`n### How to install`n1. Download **dikly-windows-setup.exe** below`n2. Run the installer and follow the prompts`n3. Launch DIKLY from your Start Menu or Desktop shortcut"
          gh release view windows-latest --repo isaacaryeepah-beep/Dikly_releases *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload windows-latest dikly-windows-setup.exe --repo isaacaryeepah-beep/Dikly_releases --clobber
            gh release edit windows-latest --repo isaacaryeepah-beep/Dikly_releases --title "DIKLY Desktop — Windows (Latest)" --notes $notes
          } else {
            gh release create windows-latest dikly-windows-setup.exe --repo isaacaryeepah-beep/Dikly_releases --title "DIKLY Desktop — Windows (Latest)" --notes $notes --latest=false
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate Mac icon (ICNS)
        run: |
          pip3 install Pillow --quiet --break-system-packages
          python3 - <<'PYEOF'
          from PIL import Image
          import os, shutil

          img = Image.open("resources/icon.png").convert("RGBA")
          shutil.copy("resources/icon.png", "electron/icon.png")

          # Build iconset for iconutil
          iconset = "/tmp/dikly.iconset"
          os.makedirs(iconset, exist_ok=True)
          sizes = {
            "icon_16x16": 16, "icon_16x16@2x": 32,
            "icon_32x32": 32, "icon_32x32@2x": 64,
            "icon_128x128": 128, "icon_128x128@2x": 256,
            "icon_256x256": 256, "icon_256x256@2x": 512,
            "icon_512x512": 512, "icon_512x512@2x": 1024,
          }
          for name, px in sizes.items():
            img.resize((px, px), Image.LANCZOS).save(f"{iconset}/{name}.png")
          print("Iconset written")
          PYEOF
          iconutil --convert icns /tmp/dikly.iconset --output electron/icon.icns
          echo "icon.icns created: $(du -sh electron/icon.icns)"

      - name: Install dependencies
        run: npm install
        working-directory: electron

      # Keep in lockstep with the Windows job's versioning (see its comment)
      # so both platforms publish under the same version per build.
      - name: Set build version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version
        working-directory: electron

      - name: Build Mac DMG
        run: npm run dist:publish
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}

      - name: List dist folder
        run: ls -la electron/dist/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIKLY-Mac
          path: electron/dist/
          retention-days: 3

      # ── Publish Mac to GitHub Releases ────────────────────────────────────
      - name: Find Mac DMG
        id: find_dmg
        run: |
          DMG=$(find electron/dist -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then echo "ERROR: .dmg not found"; exit 1; fi
          cp "$DMG" dikly-mac.dmg
          echo "Found: $DMG ($(du -sh dikly-mac.dmg | cut -f1))"

      # Upsert instead of delete-then-create — see the matching comment in
      # the Windows job for why (a delete+create race once left
      # windows-latest deleted with nothing to replace it).
      - name: Publish Mac to Dikly_releases
        run: |
          NOTES="**DIKLY Desktop App for macOS** — build #${{ github.run_number }}.

          ### How to install
          1. Download **dikly-mac.dmg** below
          2. Open the DMG and drag DIKLY to your Applications folder
          3. Launch DIKLY from Applications

          > If macOS shows \"app can't be opened\", right-click → Open → Open anyway."
          if gh release view mac-latest --repo isaacaryeepah-beep/Dikly_releases >/dev/null 2>&1; then
            gh release upload mac-latest dikly-mac.dmg --repo isaacaryeepah-beep/Dikly_releases --clobber
            gh release edit mac-latest --repo isaacaryeepah-beep/Dikly_releases --title "DIKLY Desktop — macOS (Latest)" --notes "$NOTES"
          else
            gh release create mac-latest dikly-mac.dmg --repo isaacaryeepah-beep/Dikly_releases --title "DIKLY Desktop — macOS (Latest)" --notes "$NOTES" --latest=false
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
