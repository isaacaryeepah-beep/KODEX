name: Build Flutter APK

# Path-filtered (see build-android.yml for why): this was firing on every
# backend/unrelated push, and its artifacts share the same account-wide
# GitHub Actions storage quota that build-android.yml was exhausting.
on:
  push:
    branches: [main, claude/update-resume-aVv3d]
    paths:
      - 'dikly_flutter/**'
      - '.github/workflows/build-flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-release
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: dikly_flutter
        run: flutter pub get

      - name: Generate app icons
        working-directory: dikly_flutter
        run: dart run flutter_launcher_icons

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dikly_flutter/android/app/dikly-release.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../app/dikly-release.jks\n' \
            "${{ secrets.KEY_STORE_PASSWORD }}" \
            "${{ secrets.KEY_STORE_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            > dikly_flutter/android/key.properties

      - name: Build Release APK
        working-directory: dikly_flutter
        run: flutter build apk --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dikly-Android-APK
          path: dikly_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 3

      - name: Build Release AAB (Play Store)
        working-directory: dikly_flutter
        run: flutter build appbundle --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Dikly-Android-AAB
          path: dikly_flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 3

      - name: Publish APK to public Dikly_releases repo
        run: |
          cp dikly_flutter/build/app/outputs/flutter-apk/app-release.apk dikly-flutter.apk
          gh release delete flutter-latest --yes --cleanup-tag \
            --repo isaacaryeepah-beep/Dikly_releases 2>/dev/null || true
          gh release create flutter-latest dikly-flutter.apk \
            --repo isaacaryeepah-beep/Dikly_releases \
            --title "DIKLY Flutter App — Latest Build" \
            --notes "**DIKLY Flutter Android App** — latest build (build #${{ github.run_number }}).

          ### How to install
          1. Download **dikly-flutter.apk** below
          2. On your Android phone: open the file and tap **Install**
             *(Enable \"Install from unknown sources\" in Settings if prompted)*

          > iOS version coming soon." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
