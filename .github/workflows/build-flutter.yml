name: Build Flutter APK

on:
  push:
    branches: [main, claude/update-resume-aVv3d]
    paths:
      - 'dikly_flutter/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: dikly_flutter
        run: flutter pub get

      - name: Generate app icons
        working-directory: dikly_flutter
        run: dart run flutter_launcher_icons

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > dikly_flutter/android/app/dikly-release.jks

      - name: Create key.properties
        run: |
          cat > dikly_flutter/android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../app/dikly-release.jks
          EOF

      - name: Build Release APK
        working-directory: dikly_flutter
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dikly-Android-APK
          path: dikly_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build Release AAB (Play Store)
        working-directory: dikly_flutter
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Dikly-Android-AAB
          path: dikly_flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
