name: Deploy to VPS

on:
  push:
    branches: [main, claude/update-resume-aVv3d]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@194.163.172.76 << 'ENDSSH'
            set -e
            cd /root/KODEX

            git fetch origin main
            git checkout jitsi-config/web/custom-config.js
            git reset --hard origin/main

            docker restart kodex-app-1
            docker restart kodex-web-1

            git diff HEAD~1 --name-only 2>/dev/null | grep -q docker-compose.jitsi.yml \
              && docker compose -f docker-compose.jitsi.yml restart coturn \
              || true

            echo "Deploy complete"
          ENDSSH
