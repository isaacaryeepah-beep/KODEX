name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.172.76 >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              root@194.163.172.76 bash << 'ENDSSH'
          set -e
          cd /root/KODEX

          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          docker compose up -d --build app
          docker restart kodex-web-1 2>/dev/null || true

          git diff HEAD~1 --name-only 2>/dev/null | grep -q docker-compose.jitsi.yml \
            && docker compose -f docker-compose.jitsi.yml restart coturn \
            || true

          mkdir -p /etc/nginx/snippets
          printf '%s\n' \
            'set $cors_origin "";' \
            'if ($http_origin ~* "github\.io") { set $cors_origin $http_origin; }' \
            "add_header 'Access-Control-Allow-Origin' \$cors_origin always;" \
            "add_header 'Access-Control-Allow-Credentials' 'true' always;" \
            "add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;" \
            "add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,x-device-id,x-session-token' always;" \
            > /etc/nginx/snippets/cors-github.conf

          for CONF in /etc/nginx/sites-enabled/*; do
            if grep -q "dikly.sbs" "$CONF" 2>/dev/null && ! grep -q "cors-github.conf" "$CONF"; then
              sed -i "s|server_name dikly.sbs|include /etc/nginx/snippets/cors-github.conf;\n    server_name dikly.sbs|g" "$CONF" || true
            fi
          done

          nginx -t && systemctl reload nginx || true

          echo "Deploy complete"
          ENDSSH
