name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.172.76 >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              root@194.163.172.76 bash << 'ENDSSH'
          set -e
          cd /root/KODEX

          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          docker compose up -d --build app
          docker restart kodex-web-1 2>/dev/null || true

          git diff HEAD~1 --name-only 2>/dev/null | grep -q docker-compose.jitsi.yml \
            && docker compose -f docker-compose.jitsi.yml restart coturn \
            || true

          sleep 5

          echo "=== CORS TEST (direct to Node.js port 5000) ==="
          curl -s -o /dev/null -D - -X OPTIONS \
            -H "Origin: https://isaacaryeepah-beep.github.io" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type,authorization" \
            http://localhost:5000/api/auth/login | grep -i "access-control\|HTTP/"

          echo "=== CORS TEST (through nginx at dikly.sbs) ==="
          curl -s -o /dev/null -D - -X OPTIONS \
            -H "Origin: https://isaacaryeepah-beep.github.io" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type,authorization" \
            https://dikly.sbs/api/auth/login | grep -i "access-control\|HTTP/"

          echo "Deploy complete"
          ENDSSH

      - name: Test CORS from runner
        run: |
          echo "=== CORS TEST from GitHub Actions runner ==="
          curl -sv -X OPTIONS \
            -H "Origin: https://isaacaryeepah-beep.github.io" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type,authorization" \
            https://dikly.sbs/api/auth/login 2>&1 | grep -i "access-control\|< HTTP"
