name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          EXIT_CODE=1
          for attempt in 1 2 3 4; do
            echo "==> Deploy attempt $attempt / 4"
            set +e
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST https://dikly.live/deploy \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
              --max-time 20)
            EXIT_CODE=$?
            set -e
            if [ "$RESPONSE" = "200" ]; then
              echo "==> Deploy triggered successfully (HTTP 200)"
              EXIT_CODE=0
              break
            fi
            echo "==> Attempt $attempt failed (HTTP $RESPONSE, curl exit $EXIT_CODE)"
            if [ $attempt -lt 4 ]; then
              WAIT=$((attempt * 2))
              echo "==> Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          exit $EXIT_CODE
