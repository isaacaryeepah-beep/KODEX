name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Build Flutter web
        working-directory: dikly_flutter
        run: |
          flutter pub get
          flutter build web --release --base-href /app/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.172.76 >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy server code
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              root@194.163.172.76 bash << 'ENDSSH'
          set -e
          cd /root/KODEX

          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          mkdir -p /root/dikly-flutter-web

          docker compose up -d --build app
          docker restart kodex-web-1 2>/dev/null || true

          git diff HEAD~1 --name-only 2>/dev/null | grep -q docker-compose.jitsi.yml \
            && docker compose -f docker-compose.jitsi.yml restart coturn \
            || true

          echo "Server deploy complete"
          ENDSSH

      - name: Copy Flutter web to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r dikly_flutter/build/web/* \
              root@194.163.172.76:/root/dikly-flutter-web/
          echo "Flutter web files copied"
