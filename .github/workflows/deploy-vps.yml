name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Build Flutter web
        working-directory: dikly_flutter
        run: |
          flutter pub get
          flutter build web --release --base-href /app/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.172.76 >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy server code
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              root@194.163.172.76 bash << 'ENDSSH'
          set -e
          cd /root/KODEX

          git fetch origin main
          git checkout jitsi-config/web/custom-config.js 2>/dev/null || true
          git reset --hard origin/main

          mkdir -p /root/dikly-flutter-web

          docker compose up -d --build app
          docker restart kodex-web-1 2>/dev/null || true

          git diff HEAD~1 --name-only 2>/dev/null | grep -q docker-compose.jitsi.yml \
            && docker compose -f docker-compose.jitsi.yml restart coturn \
            || true

          # Diagnose and fix nginx for /app/ proxy
          echo "=== nginx sites-enabled ==="
          ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "none"
          echo "=== nginx conf.d ==="
          ls /etc/nginx/conf.d/ 2>/dev/null || echo "none"
          NGINX_CONF=$(grep -rl "dikly.sbs" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ /etc/nginx/ 2>/dev/null | grep -v ".dpkg\|default" | head -1)
          if [ -z "$NGINX_CONF" ]; then
            NGINX_CONF=$(ls /etc/nginx/sites-enabled/ 2>/dev/null | head -1)
            NGINX_CONF="/etc/nginx/sites-enabled/$NGINX_CONF"
          fi
          echo "=== Using nginx config: $NGINX_CONF ==="
          cat "$NGINX_CONF" 2>/dev/null || echo "File not found"
          echo "=== End nginx config ==="
          if [ -f "$NGINX_CONF" ] && ! grep -q "location /app" "$NGINX_CONF"; then
            awk '/^[[:space:]]*location[[:space:]]+[=^~]*[[:space:]]*\/[[:space:]]*\{/{
              if (!done) {
                print "    location ^~ /app {"
                print "        proxy_pass http://127.0.0.1:5000;"
                print "        proxy_http_version 1.1;"
                print "        proxy_set_header Host $host;"
                print "        proxy_set_header X-Real-IP $remote_addr;"
                print "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;"
                print "        proxy_set_header X-Forwarded-Proto $scheme;"
                print "    }"
                done=1
              }
            }
            {print}' "$NGINX_CONF" > /tmp/nginx_app.conf \
              && mv /tmp/nginx_app.conf "$NGINX_CONF" \
              && nginx -t \
              && systemctl reload nginx \
              && echo "nginx reloaded with /app proxy" \
              || echo "nginx config test failed — not reloading"
          elif [ -f "$NGINX_CONF" ]; then
            echo "nginx /app already configured"
          fi

          echo "Server deploy complete"
          ENDSSH

      - name: Copy Flutter web to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r dikly_flutter/build/web/* \
              root@194.163.172.76:/root/dikly-flutter-web/
          echo "Flutter web files copied"
