name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          DEPLOY_TOKEN=$(printf '%s' "${{ secrets.VPS_SSH_KEY }}" | sha256sum | awk '{print $1}')
          EXIT_CODE=1
          for attempt in 1 2 3 4; do
            echo "==> Deploy attempt $attempt / 4"
            set +e
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST https://dikly.live/deploy \
              -H "X-Deploy-Token: $DEPLOY_TOKEN" \
              --max-time 20)
            CURL_EXIT=$?
            set -e
            if [ "$RESPONSE" = "200" ]; then
              echo "==> Deploy triggered successfully (HTTP 200)"
              EXIT_CODE=0
              break
            fi
            echo "==> Attempt $attempt failed (HTTP $RESPONSE, curl exit $CURL_EXIT)"
            if [ $attempt -lt 4 ]; then
              WAIT=$((attempt * 2))
              echo "==> Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          exit $EXIT_CODE
