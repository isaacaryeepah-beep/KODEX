# ── meet.dikly.live — self-hosted Jitsi ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name meet.dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 0;

    # CORS — allow DIKLY app subdomains to load external_api.js and make XHR calls
    set $cors_origin '';
    if ($http_origin ~* '^https://(app|monitor|admin)\.(dikly\.sbs|dikly\.live)$') {
        set $cors_origin $http_origin;
    }
    add_header 'Access-Control-Allow-Origin'  $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    # Jitsi must be embeddable inside DIKLY iframes — do NOT set X-Frame-Options here

    # OPTIONS preflight
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Content-Length' 0;
        return 204;
    }

    # BOSH (HTTP long-polling XMPP — fallback for environments blocking WebSocket)
    location /http-bind {
        proxy_pass         http://127.0.0.1:8080/http-bind;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # XMPP WebSocket — primary XMPP transport for all modern browsers/mobile
    location /xmpp-websocket {
        proxy_pass         http://127.0.0.1:8080/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering    off;
        tcp_nodelay        on;
    }

    # Colibri WebSocket (JVB media bridge control channel)
    # Web container's internal nginx proxies this onward to jvb:9090
    location ~ ^/colibri-ws {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering    off;
        tcp_nodelay        on;
    }

    # Everything else → Jitsi web container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
