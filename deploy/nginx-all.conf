# ─────────────────────────────────────────────────────────────────────────────
# DIKLY — Complete nginx configuration
# Covers: dikly.live, www.dikly.live, app.dikly.live, api.dikly.live,
#         admin.dikly.live, monitor.dikly.live, meet.dikly.live
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (catch-all for all domains) ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dikly.live www.dikly.live app.dikly.live api.dikly.live
                admin.dikly.live monitor.dikly.live meet.dikly.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www → apex redirect ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://dikly.live$request_uri;
}

# ── dikly.live — main website ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSE / streaming support
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering, keep connection alive
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       86400s;
        proxy_send_timeout       86400s;
        proxy_connect_timeout    60s;

        chunked_transfer_encoding on;
    }
}

# ── app.dikly.live — student/lecturer dashboard ───────────────────────────────
