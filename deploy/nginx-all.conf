# DIKLY — All Subdomains (single nginx config)
# Place at: /etc/nginx/sites-available/dikly-all
# Enable:   ln -s /etc/nginx/sites-available/dikly-all /etc/nginx/sites-enabled/dikly-all
# Remove old separate configs if present:
#   rm -f /etc/nginx/sites-enabled/dikly /etc/nginx/sites-enabled/jitsi
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect for all subdomains ─────────────────────────────────
server {
    listen 80;
    server_name dikly.live www.dikly.live app.dikly.live monitor.dikly.live
                api.dikly.live admin.dikly.live meet.dikly.live
                dikly.sbs www.dikly.sbs app.dikly.sbs monitor.dikly.sbs
                api.dikly.sbs admin.dikly.sbs;
    return 301 https://$host$request_uri;
}

# ── www redirect ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://dikly.live$request_uri;
}

# ── Common proxy settings (macro-style via include) ───────────────────────────
# Shared upstream for DIKLY Node.js app
upstream dikly_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ── dikly.live — main website ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://dikly_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

