# Jitsi Meet — meet.dikly.live
# Place at: /etc/nginx/sites-available/jitsi
# Enable: ln -s /etc/nginx/sites-available/jitsi /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name meet.dikly.live;
    return 301 https://meet.dikly.live$request_uri;
}

server {
    # so_keepalive: send TCP keepalive probes every 25s — prevents carrier NAT
    # from expiring the connection state on idle WebSocket connections (Colibri).
    listen 443 ssl http2 so_keepalive=25s:5s:5;
    server_name meet.dikly.live;

    ssl_certificate     /etc/letsencrypt/live/dikly.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikly.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # No body size limit (screen sharing, large payloads)
    client_max_body_size 0;

    # Force no-cache for Jitsi config files — Safari caches these aggressively,
    # which prevents custom-config.js fixes from taking effect after updates.
    location = /custom-config.js {
        proxy_pass         http://127.0.0.1:8080/custom-config.js;
        proxy_set_header   Host $host;
        # Hide upstream cache headers before setting ours — prevents duplicate/conflicting
        # Cache-Control headers that let Safari prefer a max-age from the upstream.
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;
        add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header         Pragma "no-cache" always;
        expires            -1;
    }

    location = /config.js {
        proxy_pass         http://127.0.0.1:8080/config.js;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;
        add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header         Pragma "no-cache" always;
        expires            -1;
    }

    # BOSH (HTTP long-polling XMPP)
    # Each BOSH poll is a long-lived HTTP request held open by Prosody for up
    # to bosh_default_wait=30s. proxy_read_timeout must exceed that hold time.
    location /http-bind {
        proxy_pass         http://127.0.0.1:8080/http-bind;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # XMPP WebSocket
    location /xmpp-websocket {
        proxy_pass             http://127.0.0.1:8080/xmpp-websocket;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     900s;
        proxy_send_timeout     900s;
        proxy_socket_keepalive on;
    }

    # Colibri WebSocket (JVB media bridge control channel)
    # so_keepalive on the listen directive sends TCP keepalives client→nginx.
    # proxy_socket_keepalive keeps the nginx→upstream leg alive too, preventing
    # the Jitsi web container from closing an idle upstream connection.
    location ~ ^/colibri-ws/ {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     900s;
        proxy_send_timeout     900s;
        proxy_socket_keepalive on;
    }

    # Everything else → Jitsi web container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
