<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; }
  .card {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4f46e5 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 72px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    top: -200px; right: -100px;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: -150px; left: 200px;
  }
  .left { z-index: 2; }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .logo-box {
    width: 64px; height: 64px;
    background: #fff;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900; color: #4f46e5;
    letter-spacing: -2px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .app-name {
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }
  .tagline {
    font-size: 18px;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
    max-width: 480px;
    margin-bottom: 32px;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    font-weight: 500;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #818cf8;
    flex-shrink: 0;
  }
  .right {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .badge {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 14px 22px;
    text-align: center;
    min-width: 160px;
    backdrop-filter: blur(4px);
  }
  .badge-icon { font-size: 28px; margin-bottom: 4px; }
  .badge-label { color: rgba(255,255,255,0.6); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .badge-value { color: #fff; font-size: 15px; font-weight: 700; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="logo-row">
      <div class="logo-box">D</div>
      <div class="app-name">DIKLY</div>
    </div>
    <div class="tagline">Smart attendance, quizzes &amp; assignments<br>for modern institutions.</div>
    <div class="features">
      <div class="feature"><div class="dot"></div>QR &amp; biometric attendance tracking</div>
      <div class="feature"><div class="dot"></div>Live snap quizzes &amp; AI-generated questions</div>
      <div class="feature"><div class="dot"></div>Assignments, gradebook &amp; analytics</div>
      <div class="feature"><div class="dot"></div>Announcements &amp; course management</div>
    </div>
  </div>
  <div class="right">
    <div class="badge">
      <div class="badge-icon">📋</div>
      <div class="badge-label">Attendance</div>
      <div class="badge-value">Real-time</div>
    </div>
    <div class="badge">
      <div class="badge-icon">⚡</div>
      <div class="badge-label">Quizzes</div>
      <div class="badge-value">AI-powered</div>
    </div>
    <div class="badge">
      <div class="badge-icon">🎓</div>
      <div class="badge-label">Institutions</div>
      <div class="badge-value">All types</div>
    </div>
  </div>
</div>
</body>
</html>
