name: dikly
description: DIKLY Academic & Corporate Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  cupertino_icons: ^1.0.8
  go_router: ^13.2.4
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.7.0
  shared_preferences: ^2.2.3
  device_info_plus: ^10.1.2
  uuid: ^4.3.3
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon.png"

