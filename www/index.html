<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <title>DIKLY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #4f46e5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .wrap { text-align: center; color: #fff; }
    .logo-box {
      width: 96px; height: 96px; border-radius: 24px;
      background: rgba(255,255,255,.18); display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .brand { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .tagline { font-size: 14px; opacity: .75; margin-bottom: 36px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-box">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
    </div>
    <div class="brand">DIKLY</div>
    <div class="tagline">Smart Attendance &amp; Academic Management</div>
    <div class="spinner"></div>
  </div>
  <script>
    // If opened in a regular browser (not Capacitor), redirect to the live site
    if (typeof window.Capacitor === 'undefined') {
      setTimeout(() => { window.location.replace('https://dikly.sbs'); }, 800);
    }
  </script>
</body>
</html>
